  # ──────────────────────────────────────────────────────────────────────────────

  - id: hero-terminal-split
    name: "Terminal split developer hero"
    intent: >-
      The developer-product opener: a copy column (claim, support, install/quickstart
      COMMAND as visible text, action pair) beside a code/terminal panel — a real
      product/terminal screenshot from brand assets, or a text code sample on the
      brand's panel surface in its mono face.
    structure: { archetype: split, scaffoldRef: section-split }
    anatomy:
      alignment:
        context: splitColumn
        counterweight: media
      slots:
        - { slot: kicker, role: register label (version/SDK tag), contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: developer claim, contract: heading, required: true, textLen: medium, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: "what it does, precisely", contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: command, role: install/quickstart one-liner as TEXT at mono/caption register, contract: label, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: actionGroup, role: "'Read docs' primary + quiet sibling", contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        - { slot: media, role: "code/terminal panel — screenshot asset, or authored code text on the brand panel surface", contract: image, required: true, mediaAspect: landscape, width: media, z: mid }
    geometry:
      bandHeight: standard
      mediaFraction: { min: 0.45, max: 0.55 }
      textMeasure: split-column measure; the command line hugs, never wraps mid-token
      containment: content-container
    useCases:
      pageTypes: [developer, homepage, product]
      taskIntents: ["API/SDK product pitch", "CLI tool opener",
                    "docs-adjacent marketing page"]
      affinity: >-
        The default developer opener. Prefer hero-search-first for docs LANDING
        pages (task = find, not evaluate). Degrade: a brand with no mono face
        captured renders the command at its caption register on the panel surface —
        the skeleton survives.
    variantKnobs:
      panelSide: { type: enum, values: [right, left], default: right }
      commandRow: { type: enum, values: [on, off], default: on }
    exemplar:
      instance: >-
        The API-platform mold: left claim + support + `npm install <pkg>` line +
        'Start building' pair; right a dark terminal panel with a short annotated
        request/response sample.
      skeleton: >-
        Split; the code panel reads as a working surface (panel surface + hairline +
        the brand's radius); the command line sits between support and actions at a
        distinct quiet register.
      take: >-
        The command-as-text placement (copyable, honest); the panel-as-media
        treatment; precision voice in the support line.
      ignore: >-
        Terminal theme colors (panel = brand surface tokens; code sample = brand's
