  # ──────────────────────────────────────────────────────────────────────────────
  # EVENT / LAUNCH
  # ──────────────────────────────────────────────────────────────────────────────

  - id: hero-event-meta-forward
    name: "Meta-forward event hero"
    intent: >-
      An event opener where the LOGISTICS lead: a date/venue/format meta row above or
      beside the event title, one support line, a register action pair. The meta row
      is the identity device — the facts ARE the pitch.
    structure: { archetype: stack, scaffoldRef: section-stack }
    anatomy:
      alignment:
        context: standaloneStack
        counterweight: none
      slots:
        - { slot: meta, role: date · venue · format row at a tracked quiet register, contract: label, required: true, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: event name/claim, contract: heading, required: true, textLen: short, sizeClass: hero, width: hug, z: front }
        - { slot: subheading, role: one line on why attend, contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: actionGroup, role: "'Register' primary + quiet agenda sibling", contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        # agenda rail (2026-07-14, copy-first growth): agenda-at-a-glance as a quiet
        # row of the brand's OWN product/track marks + one caption line — the event
        # genre's proof device when the story is breadth (what's covered), not people.
        # Real files only (AS-33); never louder than the name.
        - { slot: agenda, role: agenda-at-a-glance mark row + one caption line below the actions, contract: logo-bar, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: media, role: optional venue/last-year atmosphere photo below, contract: image, required: false, mediaAspect: wide, width: media, z: back }
    geometry:
      bandHeight: tall
      mediaFraction: { min: 0.0, max: 0.4 }
      textMeasure: stack measure; the meta row hugs and NEVER wraps mid-fact
      containment: content-container
    useCases:
      pageTypes: [event]
      taskIntents: ["conference/summit registration", "webinar signup",
                    "launch-event save-the-date"]
      affinity: >-
        The default event opener. Prefer hero-announcement-crest for product LAUNCH
        pages (the product, not the gathering, is the star). Countdown behavior is
        out of scope — the date renders as authored meta text.
    variantKnobs:
      metaPlacement: { type: enum, values: [above-heading, below-heading], default: above-heading }
      atmosphereMedia: { type: enum, values: [on, off], default: off }
      agendaRail: { type: enum, values: [on, off], default: off }
    exemplar:
      instance: >-
        The product-conference mold: 'OCT 14–15 · SF + VIRTUAL' tracked caption, the
        event wordmark-scale title, one line, Register + View agenda pair.
      skeleton: >-
        Standalone stack; meta at tracked caption register (the brand's own tracking/
        case facts); title may take the hero register — this page's identity moment;
        actions per the brand's actionGroup law.
      take: >-
        The meta-first ordering; the tracked-caption device; the two-action pattern
        (register primary, agenda quiet).
      ignore: >-
        Tracking/case values (brand type facts), title face, palette, copy.
    slopTraps:
      - "AS-59: Register AND agenda both filled — agenda takes the quiet register."
      - "meta wrap: the date/venue row breaking mid-fact at narrow widths — it
         collapses to stacked lines, never re-flows."
      - "hero-register abuse: the event title at hero scale is licensed HERE; the
         support line must not also inflate (AS-51)."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, stackMeasure]

  - id: hero-announcement-crest
    name: "Announcement crest launch hero"
    intent: >-
      A launch opener: a NEW/version badge kicker, an announcement statement, one
      support line, a primary + quiet pair — and the product frame CRESTING into the
      band from below (top edge visible, body cropped by the band's end). Ship-day
      energy; the page below reveals the rest.
    structure: { archetype: stack, scaffoldRef: section-stack,
                 note: "the crest is the below-stack media with bottom-crop license; a banded variant registers the frame to the seam" }
    requiresOffGrid: true    # the crest's bottom-crop/bleed license is an off-grid device
    anatomy:
      alignment:
        context: standaloneStack
        counterweight: none
      slots:
        - { slot: kicker, role: NEW/version badge + one-line what shipped, contract: badge, required: true, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: the announcement, contract: heading, required: true, textLen: medium, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: one support line, contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: actionGroup, role: try/read primary + quiet changelog sibling, contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        - { slot: media, role: the shipped product frame cresting the band bottom, contract: image, required: true, mediaAspect: wide, width: media, z: mid }
    geometry:
      bandHeight: viewport
      mediaFraction: { min: 0.35, max: 0.5 }   # the visible crest portion
      textMeasure: stack measure; heading wraps 2 lines max — announcements are terse
      containment: content-container
    useCases:
      pageTypes: [event, product, homepage]
      taskIntents: ["product/version launch", "feature announcement page",
                    "launch-week landing"]
      affinity: >-
        Prefer over hero-centered-statement-canvas when a real product frame exists
        AND the brief is a dated announcement; the badge kicker binds the brand's own
        badge/pill recipe where one exists (brand kicker recipes win).
    variantKnobs:
      crestDepth: { type: enum, values: [light, medium, heavy], default: medium }
      badgeStyle: { type: enum, values: [badge, plain-kicker], default: badge }
    exemplar:
      instance: >-
        The launch-day mold: an outlined 'NEW · v2.0' badge, a two-line announcement,
        one sentence, Try it now + Read the changelog, the new UI cresting from the
        band bottom at ~40% visibility.
      skeleton: >-
        Centered/brand-anchored stack; the badge is a real bounded primitive (brand
        pill/badge anatomy); the product frame's TOP edge and chrome visible, body
        cropped by the band end — a deliberate reveal, not an overflow bug.
      take: >-
        The badge-kicker device; the crest reveal with its crop license; terse
        announcement register.
      ignore: >-
        Badge geometry (brand primitive), frame chrome, palette, copy.
    slopTraps:
      - "accidental-overflow reading: the crest must be a DECLARED crop (media slot
         with its registration), never content escaping containment (AS-56)."
      - "AS-51: the announcement is the display moment — the badge label must stay
         caption register, not shout."
      - "AS-23: the cresting frame's loading state — a half-visible broken image is
         twice as loud."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, stackMeasure, assetFidelity]

  # ──────────────────────────────────────────────────────────────────────────────
  # COMPARISON / MIGRATION
  # ──────────────────────────────────────────────────────────────────────────────

  - id: hero-comparison-dual
    name: "Dual-panel comparison hero"
    intent: >-
      A vs/alternative page opener: a centered claim over TWO mirrored panels — 'with
      us' vs 'the other way' (or us vs named competitor) — each panel a short titled
      list; one action pair beneath. The structure performs the comparison.
    structure: { archetype: split, scaffoldRef: section-split,
                 note: "header row above the split rides the standalone grammar; the two panels are the split cells" }
    anatomy:
      alignment:
        context: standaloneStack     # the header row; panels mirror beneath
        counterweight: none
      slots:
        - { slot: kicker, role: register label ('<Us> vs <Them>' / 'Why switch'), contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: the comparison claim, contract: heading, required: true, textLen: medium, sizeClass: display, width: hug, z: front }
        - { slot: panels, role: two mirrored panels — title + 3–5 point list each; OUR panel takes the brand's emphasis surface, contract: card, required: true, textLen: medium, sizeClass: body, width: stretch, z: front }
        - { slot: actionGroup, role: switch/migrate primary + quiet comparison sibling, contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
    geometry:
      bandHeight: tall
      mediaFraction: { min: 0.5, max: 0.65 }   # the panel pair's share
      textMeasure: header at stack measure; panel copy at card register
      containment: content-container
    useCases:
      pageTypes: [comparison]
      taskIntents: ["vs-competitor landing", "migration pitch",
                    "build-vs-buy argument page"]
      affinity: >-
        The structural choice for comparison briefs; prefer hero-stat-forward when
        the argument is numeric rather than feature-by-feature. Emphasis asymmetry
        comes from the brand's surface roles (panel vs primary), never invented
        good/bad colors.
    variantKnobs:
      panelBalance: { type: enum, values: [equal, ours-dominant], default: equal }
      pointCount: { type: enum, values: [3, 4, 5], default: 4 }
    exemplar:
      instance: >-
        The migration-page mold: centered 'Why teams switch', left panel 'With
        <other approach>' (plain surface, pain points), right panel 'With us'
        (emphasis surface, mirrored gains), one Switch CTA beneath.
      skeleton: >-
        Header row, then two equal-width panels sharing radius/padding anatomy; OUR
        panel differentiated by the brand's emphasis surface role + one badge; point
        lists line-aligned across panels so rows compare 1:1.
      take: >-
        The mirrored-anatomy discipline (rows align across panels); emphasis via
        surface ROLE; the comparison living in structure, not adjectives.
      ignore: >-
        Panel surface hues, list markers, competitor naming strategy, copy.
    slopTraps:
      - "AS-12 asymmetric emptiness: one panel with 5 points, the other with 2 —
         point counts match or the rows visibly misalign."
      - "invented judgment colors: red/green verdict paint the brand never shipped
         (AS-01 family: surfaces come from the brand's roles)."
      - "AS-59: the pair beneath must keep register hierarchy — 'See full comparison'
         stays quiet."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, gridEqualize]

  # ──────────────────────────────────────────────────────────────────────────────
  # ATMOSPHERIC / EXPRESSIVE (style-gated: off-grid devices need the style unlock)
  # ──────────────────────────────────────────────────────────────────────────────

  - id: hero-banded-seam-straddle
    name: "Banded seam-straddle hero"
    requiresOffGrid: true    # media-over-seam straddle is an off-grid geometry device
    intent: >-
      A dual-surface opener with a hard horizontal seam (dark band over canvas, per
      the BRAND's rhythm) where the product frame straddles the seam — copy on the
      top surface, media crossing into the bottom. The seam gives the page an
      architectural first beat.
    structure: { archetype: banded, scaffoldRef: section-stack }
    anatomy:
      alignment:
        context: standaloneStack
        counterweight: none
      slots:
        - { slot: kicker, role: register label, contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: claim on the top surface, contract: heading, required: true, textLen: medium, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: support copy on the top surface, contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: actionGroup, role: primary + surface-variant sibling, contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        - { slot: media, role: product frame registered to the seam (media-over-seam), contract: image, required: true, mediaAspect: wide, width: media, z: front }
    geometry:
      bandHeight: viewport
      mediaFraction: { min: 0.45, max: 0.6 }
      textMeasure: stack measure on the top surface
      containment: content-container
    useCases:
      pageTypes: [homepage, product, event]
      taskIntents: ["architectural first impression", "dark-opening brands that show
                    UI", "launch pages wanting depth without photography"]
      affinity: >-
        Requires the brand's pageRhythm to license an opening dark band (surface
        fidelity rules derive the budget); an all-light brand renders the seam as a
        panel/canvas change or doesn't get this archetype. Media-over-seam needs no
        text sanction — the copy never sits on the media.
    variantKnobs:
      seamPosition: { type: enum, values: [0.55, 0.62, 0.7], default: 0.62 }   # fraction of band height
      mediaCorner: { type: enum, values: [centered, right], default: centered }
    exemplar:
      instance: >-
        The platform-launch mold: deep band with centered claim + pair; a wide
        product frame whose top half sits on the dark band and bottom half on the
        white canvas; the seam runs clean behind it.
      skeleton: >-
        ONE banded section (hard cut, two surface roles from the brand's rhythm);
        media slot registered toSlot:seam with declared depth; button secondary
        swaps to its dark-surface variant on the top surface.
      take: >-
        The single-banded-section modeling; seam registration as the device;
        per-surface button variants.
      ignore: >-
        Band hues (brand rhythm), seam fraction fine-tuning, frame chrome, copy.
    slopTraps:
      - "gradient seam: the cut must be HARD (banded contract) — a gradient blend is
         a different (and here unsanctioned) device."
      - "AS-10 state leakage across surfaces: hover inks tuned for the dark band
         failing on the canvas half — interaction tokens re-scope per surface."
      - "two-section fake (same as plan-peek): one banded section, never stacked
         overlapping sections."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, textOnMedia, assetFidelity]

  - id: hero-ghostword-atmospheric
    name: "Ghost-word atmospheric hero"
    intent: >-
      An expressive opener: an oversized low-contrast ghost word (the brand's own
      wordmark/category word) layered behind a compact copy stage and placed media.
      Editorial gravity for brands whose style unlocks off-grid devices.
    structure: { archetype: collage, scaffoldRef: section-stack,
                 note: "style-gated: ghost-word is a style-identity device (legal regardless of offGrid flag) but suits editorial-leaning SaaS only" }
    requiresOffGrid: true    # ghost z-depth + submerged type need the off-grid license
    anatomy:
      alignment:
        context: splitColumn
        counterweight: ghostword
      slots:
        - { slot: ghostword, role: oversized ghost word at ghost opacity class, contract: heading, required: true, textLen: word, sizeClass: colossal, width: full-bleed, z: back }
        - { slot: kicker, role: register label, contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: display heading, contract: heading, required: true, textLen: medium, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: support copy, contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: actionGroup, role: primary + quiet sibling, contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        - { slot: media, role: placed product/brand media, contract: image, required: false, mediaAspect: landscape, width: media, z: mid }
    geometry:
      bandHeight: viewport
      mediaFraction: { min: 0.0, max: 0.55 }
      textMeasure: stack measure for the stage; the ghost word bleeds by design (tagged release)
      containment: content-container   # the STAGE contains; only the ghost layer bleeds
    useCases:
      pageTypes: [homepage, about, event]
      taskIntents: ["category-word branding", "design-led SaaS wanting editorial
                    weight", "event identity moment"]
      affinity: >-
        Offer only when the style layer's expressive envelope is open and the brand's
        neverDo carries no watermark prohibition; the ghost word is the brand's OWN
        word (wordmark/category), never decoration text.
    variantKnobs:
      ghostAnchor: { type: enum, values: [behind-media, straddle-media, margin], default: behind-media }
      ghostScale: { type: enum, values: [large, colossal], default: large }
    exemplar:
      instance: >-
        The standard library's hero-ghostword-atmospheric pattern
        (contracts/layout-patterns/hero.yaml) — generalized from the harvest's
        oversized_atmospheric_wordmark clusters — is this archetype's blessed
        reference skeleton.
      skeleton: >-
        Ghost layer z:back at ghost opacity; a compact left-anchored stage (kicker,
        heading, support, actions); optional media at z:mid between ghost and stage.
      take: >-
        The three-layer z discipline; ghost-at-ghost-opacity (texture, not message);
        the compact stage measure against the oversized backdrop.
      ignore: >-
        The ghost word itself, face, palette, opacity exact value (brand token).
    slopTraps:
      - "ghost legibility inversion: the ghost word competing with the heading —
         opacityClass ghost is the contract; if it reads first, it's broken."
      - "AS-31-family scale gates: colossal register must resolve through the brand's
         ladder, not a hardcoded rem wall."
      - "transplant without surface re-fit: moving this to a dark band without
         re-resolving the ghost ink (AS-22 — the parked wildcard recipe's exact
         failure)."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, stackMeasure]

  - id: hero-marquee-canvas
    name: "Marquee-canvas hero"
    intent: >-
      A kinetic opener for community/scale stories: a compact claim stack over a
      full-width MARQUEE band of real marks/covers/community items drifting
      horizontally at the band's foot. Motion says volume; the copy stays still.
    structure: { archetype: stack, scaffoldRef: section-stack }
    anatomy:
      alignment:
        context: standaloneStack
        counterweight: none
      slots:
        - { slot: kicker, role: register label, contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: scale/community claim, contract: heading, required: true, textLen: short, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: one support line, contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: actionGroup, role: primary + quiet sibling, contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        - { slot: marquee, role: full-width drifting rail of real marks/tiles at the band foot, contract: logo-bar, required: true, textLen: none, sizeClass: caption, width: full-bleed, z: mid }
    geometry:
      bandHeight: standard
      mediaFraction: { min: 0.25, max: 0.4 }   # the marquee rail's share
      textMeasure: stack measure; the rail bleeds full-width (tagged release)
      containment: content-container
    useCases:
      pageTypes: [homepage, customers, event]
      taskIntents: ["community/marketplace volume story", "integration breadth with
                    motion", "event speaker/sponsor energy"]
      affinity: >-
        Prefer over hero-social-proof-embedded when VOLUME (dozens of items) is the
        story and the brand's motion dial licenses movement; a motion:low brand gets
        the static spaced row instead (same skeleton, marquee off).
    variantKnobs:
      motion: { type: enum, values: [drift, static], default: drift }   # brand voice.dials.motion outranks
      rowCount: { type: enum, values: [1, 2], default: 1 }
    exemplar:
      instance: >-
        The community-platform mold: centered claim + pair; beneath, one full-width
        row of member/customer tiles drifting slowly, seamless loop, pausable.
      skeleton: >-
        Standalone stack at the top; the marquee rail full-bleed at the band foot,
        items at measured boxes, seam invisible; the rail respects
        prefers-reduced-motion (drops to static).
      take: >-
        The still-copy/moving-proof contrast; the foot placement; measured item
        boxes on the rail.
      ignore: >-
        Tile content/styling, drift speed exact values (brand motion tokens), copy.
    slopTraps:
      - "AS-42 seam math: the loop must not jump or change speed with content width —
         the marquee contract's exact failure register."
      - "AS-57/reduced-motion: no pause affordance / ignoring
         prefers-reduced-motion."
      - "AS-33: rail items are real files; a marquee of invented tiles is high-speed
         slop."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, assetFidelity, interaction, motion]

  - id: hero-showreel-band
    name: "Showreel band hero"
    intent: >-
      A cinematic opener: a compact claim stack, then a wide inline SHOWREEL band —
      brand/product film with native controls and a poster from brand assets —
      spanning the content width below. For brands whose strongest asset is footage.
    structure: { archetype: stack, scaffoldRef: section-stack }
    anatomy:
      alignment:
        context: standaloneStack
        counterweight: none
      slots:
        - { slot: kicker, role: register label, contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: claim heading, contract: heading, required: true, textLen: short, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: one support line, contract: paragraph, required: false, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: actionGroup, role: primary + quiet sibling, contract: button, required: true, textLen: short, sizeClass: control, width: hug, z: front }
        - { slot: reel, role: "inline film band — native controls, brand poster, NO lightbox", contract: video, required: true, mediaAspect: wide, width: media, z: mid }
    geometry:
      bandHeight: tall
      mediaFraction: { min: 0.5, max: 0.65 }
      textMeasure: stack measure above the reel
      containment: content-container
    useCases:
      pageTypes: [about, customers, event, homepage]
      taskIntents: ["brand-film-led story", "event aftermovie opener",
                    "customer-story montage"]
      affinity: >-
        Choose only when a REAL film/poster asset exists in the brand dir; no modal
        interaction contract exists, so the reel is inline (native controls) — a
        poster linking out is the degrade, a fake play button over a static image is
        forbidden.
    variantKnobs:
      reelWidth: { type: enum, values: [content, framed], default: content }
      autoplayMuted: { type: enum, values: [off, on], default: off }   # on requires visible pause + reduced-motion respect
    exemplar:
      instance: >-
        The brand-film mold: short claim + one line + pair; a 21:9 film band below
        with a real poster frame, native controls, no overlay chrome.
      skeleton: >-
        Stack hands off to the reel after one full rung; the reel is the band's
        visual majority; controls are the platform's (honest affordances).
      take: >-
        The inline-reel honesty (no fake lightbox); poster-from-assets; the
        copy-then-film rhythm.
      ignore: >-
        Footage content, aspect fine-choice, palette, copy.
    slopTraps:
      - "fake play affordance: a play glyph painted on a static image with no video
         behind it (AS-23's dishonest cousin) — the reel slot requires a real asset."
      - "autoplay without pause/reduced-motion discipline (AS-57, motion contract)."
      - "AS-13: if the film carries the argument, the copy must still state it in
         text."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      actionGroup, surfaceContrast, assetFidelity, interaction, motion]
