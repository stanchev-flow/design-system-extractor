    anatomy:
      alignment:
        context: splitColumn
        counterweight: case
      slots:
        - { slot: kicker, role: register label ('Customer stories'), contract: eyebrow, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
        - { slot: heading, role: hub claim, contract: heading, required: true, textLen: short, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: what readers will find, contract: paragraph, required: true, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: case, role: featured case card — customer mark + pulled stat + outcome line + read action, contract: card, required: true, textLen: medium, sizeClass: title, width: media, z: mid }
        - { slot: proof, role: quiet mark run of further customers, contract: logo-bar, required: false, textLen: none, sizeClass: caption, width: hug, z: front }
    geometry:
      bandHeight: standard
      mediaFraction: { min: 0.45, max: 0.55 }
      textMeasure: split-column measure; the pulled stat rides the brand's large numeral register inside the card
      containment: content-container
    useCases:
      pageTypes: [customers, homepage]
      taskIntents: ["proof-led hub opener", "enterprise social proof",
                    "sales-enablement stories page"]
      affinity: >-
        Prefer over hero-stat-forward when ONE named story outranks aggregate numbers;
        the case card needs real content (mark file + stat + outcome from the brief).
    variantKnobs:
      caseSide: { type: enum, values: [right, left], default: right }
      furtherMarks: { type: enum, values: [on, off], default: on }
    exemplar:
      instance: >-
        The customers-page mold: left hub claim; right a bounded card — customer
        mark top, '3× pipeline' numeral, one outcome sentence, 'Read the story'
        text action; five further marks in a quiet row below the split.
      skeleton: >-
        Split with a single bounded card as counterweight; card anatomy per the
        brand's card contract (media-well/plate, pinned action); further marks at
        measured boxes.
      take: >-
        The one-story focus; stat-inside-card placement; the pinned read action; the
        subordinate further-marks row.
      ignore: >-
        Card surface/radius, which customer, palette, copy.
    slopTraps:
      - "AS-52 phantom media: the case card is ATTRIBUTED content — only the real
