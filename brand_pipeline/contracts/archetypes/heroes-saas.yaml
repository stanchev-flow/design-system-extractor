# contracts/archetypes/heroes-saas.yaml — the SaaS HERO GENRE ARCHETYPE LIBRARY.
#
# WHAT THIS IS. A genre-level STRUCTURAL vocabulary for hero sections, selected by
# brief + page type at generation time. It sits ABOVE the two-tier layout-pattern
# library (spec/archetype-library.md):
#
#   scaffold (structural shell)      contracts/scaffolds.yaml
#     ^ archetypeRef
#   layout pattern (observed shape)  contracts/layout-patterns/*.yaml + runs/<brand>/brand/layout-library.yaml
#     ^ brand recipes WIN over…
#   GENRE ARCHETYPE (this file)      structural options the SOURCE SITE never had to show
#
# THE LAW (user-approved architecture; normative text in spec/archetype-library.md):
#   - STYLE IS INVARIANT   — every instantiation draws tokens, type personality, surface
#     grammar, spacing rhythm, recipes, and voice from the ACTIVE BRAND's extracted data.
#     Nothing in this file names a color, face, radius, or copy voice.
#   - STRUCTURE IS VARIABLE — the skeleton comes from here, chosen by page task, NOT
#     limited to what the source site showed.
#   - PHYSICS IS ALWAYS HARD — containment law, measure caps, actionGroup facts,
#     contrast/readability, one-primary-per-group (AS-59), interaction contracts bind
#     in creative mode exactly as in replica mode.
#
# PRECEDENCE. A brand's OWN hero pattern / recipes / layoutGrammar beat this library
# wherever they conflict (extracted-over-designed ratchet, brand-schema §5.3). An
# archetype is a starting skeleton the brand's facts instantiate — never a template
# that overrides a fact.
#
# DATA, NEVER A CODE ENUM. This file is consumed by generation prompt assembly
# (generate_composition) the way seed patterns are; no shared code may hardcode the
# archetype ids or the genre taxonomy. New genres (editorial, ecommerce) are sibling
# files, not code branches.
#
# VOCABULARY. Slot fields reuse layout-patterns.v1 classes exactly (textLen, sizeClass,
# width, mediaAspect, z — brand-schema §4.4); `contract` names keys from
# contracts/primitives.yaml + contracts/blocks.yaml; `structure.archetype` is the
# composition.v1 drawable enum (stack | split | stack-fullbleed | cards | collage |
# interlock | overlay | banded) so phase-2 consumption needs no translation layer.
# All geometry is RANGES/CHARACTER CLASSES, never px — values resolve against the
# active brand's measured tokens at instantiation.
#
# bandHeight character vocabulary (resolved against the brand's own section padding +
# type scale; NOT a fixed px ladder):
#   compact  — a working masthead; hands off fast to the content below (hub indexes,
#              pricing). Roughly heading + one support row of the brand's rhythm.
#   standard — a full opening beat (heading, support, actions, media) without claiming
#              the whole viewport.
#   tall     — a statement beat with generous band padding (bookend character).
#   viewport — the band claims ~one viewport (the classic opening-bookend min-height).
#
# physicsBindings vocabulary (the fact families that MUST bind at instantiation; each
# name anchors to existing law — see spec/archetype-library.md §4 for the full map):
#   containment      — fix3 container law: content spans/caps at the shared measure
#                      (spacing-conformance §Container law; AS-45, AS-56)
#   headingTier      — sizeClass resolves to the brand's MEASURED type ladder; display
#                      register belongs to the opener (AS-32, AS-51)
#   headerContext    — alignment rides layoutGrammar.headerContext resolution
#                      (brand-schema §4.4b; AS-49); explicit facts outrank it
#   relationalRhythm — seams ride the brand's relational ladder rungs (C15; AS-48, AS-54)
#   actionGroup      — measured multi-action law: gap/orientation/align/registers
#                      (brand-schema §4.4f; AS-59, AS-60, AS-61)
#   surfaceContrast  — resting AND state inks pass contrast on their real surface
#                      (AS-01, AS-10; contrast_audit.mjs)
#   stackMeasure     — the copy column caps at the brand's measured stack column where
#                      captured, else the archetype's textMeasure character (AS-45)
#   textOnMedia      — type over photography ONLY as the sanctioned hero device with a
#                      FLAT scrim fill (AS-22; composition treatment `sanctioned: true`)
#   gridEqualize     — card rows ride the brand's equalization stance + slack anatomy
#                      (brand-schema §4.4d; AS-50, AS-55)
#   controlMeasure   — any control/form slot carries an explicit width/sizeRel; never
#                      an unspecified stretch (brand-schema §4.4 control-measure; AS-26)
#   assetFidelity    — only real on-disk brand assets bind; no invented filenames, no
#                      borrowed art, no phantom media in attributed modules
#                      (AS-33, AS-34, AS-52)
#   interaction      — any interactive device ships its WAI-ARIA contract family
#                      (spec/interaction-contracts.md; AS-40, AS-41, AS-57)
#   motion           — device motion rides the brand's captured motion tokens or
#                      degrades to instant; never an invented 200ms (AS-47)
#
# EVERY archetype binds at minimum: containment, headingTier, headerContext,
# relationalRhythm, surfaceContrast. Per-archetype lists below are COMPLETE (core +
# additive) so one entry can be rendered into a prompt self-contained.
#
# INSTANTIABILITY BAR. Every archetype below is instantiable by a brand carrying only
# the standard extraction facts (tokens/type ladder/spacing + relational ladder,
# surfaces + pageRhythm, buttons variant matrix, layoutGrammar.headerContext +
# .actionGroup, patterns/recipes, section-copy voice, tagged assets, chrome). No entry
# requires data the extraction pipeline does not capture; where a slot benefits from an
# OPTIONAL fact (e.g. mono type for a code panel), the entry names the degrade.

schemaVersion: hero-archetypes.v1
genre: saas
useCase: hero
origin: designed          # genre knowledge, hand-authored; overridable by brand facts
overridable: true
spec: ../../spec/archetype-library.md
pageTypes: [homepage, pricing, product, about, blog, careers, demo, developer, event,
            signup, customers, comparison]
