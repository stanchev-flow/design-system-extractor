      - "AS-51 double display: the card title rising to display register beside the
         hub heading."
      - "AS-14 purposeless subscribe: the capture row must state what arrives (the
         hub promise line covers it)."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
                      surfaceContrast, stackMeasure, controlMeasure, assetFidelity,
                      interaction]

  - id: hero-index-masthead
    name: "Index masthead hero"
    intent: >-
      The thinnest hero in the library: a working masthead for feed/index pages —
      hub title, one promise line, a category/filter link row — then straight into
      the grid below. Navigation furniture, done with type discipline.
    structure: { archetype: stack, scaffoldRef: section-stack }
    anatomy:
      alignment:
        context: standaloneStack
        counterweight: none
      slots:
        - { slot: heading, role: hub title, contract: heading, required: true, textLen: short, sizeClass: display, width: hug, z: front }
        - { slot: subheading, role: one promise line, contract: paragraph, required: false, textLen: medium, sizeClass: body, width: hug, z: front }
        - { slot: categories, role: "category/filter LINK row (text links, active state honest)", contract: link, required: true, textLen: short, sizeClass: caption, width: hug, z: front }
    geometry:
      bandHeight: compact
      mediaFraction: { min: 0.0, max: 0.0 }
      textMeasure: stack measure; the category row wraps rather than truncates
      containment: content-container
    useCases:
      pageTypes: [blog, customers, developer]
      taskIntents: ["feed/index page opener", "docs hub landing", "changelog index"]
      affinity: >-
        The utilitarian choice — prefer whenever the content GRID is the page and
        the hero must not compete. Category links are real anchors, not decorative
        pills.
    variantKnobs:
      categoryStyle: { type: enum, values: [text-links, pills], default: text-links }  # pills only when the brand's own control family shows them
    exemplar:
      instance: >-
        The library-index mold: 'Customer stories' at display register, one line, a
        row of six category text-links with the active one marked by the brand's
        link-active device.
      skeleton: >-
        Compact stack; category row separated by a full rung; band bottom padding
        tight so the grid below joins the thought.
      take: >-
        The restraint; the active-category device from the brand's OWN link states;
        the hand-off rhythm.
      ignore: >-
        Active-state paint (brand link/hover facts), category names, palette.
    slopTraps:
      - "AS-61 unhugged links: category text-links stretching their boxes — underline
         ink must hug the label."
      - "AS-43 faked active state: the active category shown by opacity instead of
         the brand's real state colors."
      - "band inflation: this masthead going viewport-height defeats its purpose."
    physicsBindings: [containment, headingTier, headerContext, relationalRhythm,
