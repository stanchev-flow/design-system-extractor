      slots:
        - { slot: heading, role: help prompt heading, contract: heading, required: true, textLen: short, sizeClass: display, width: hug, z: front }
        - { slot: search, role: one search field + submit, contract: form, required: true, textLen: short, sizeClass: control, width: media, z: front }
        - { slot: popular, role: "popular-topic links row ('Popular: x, y, z')", contract: link, required: false, textLen: short, sizeClass: caption, width: hug, z: front }
    geometry:
      bandHeight: compact
      mediaFraction: { min: 0.0, max: 0.0 }
      textMeasure: ONE shared measure for heading + search row; popular links hug beneath
