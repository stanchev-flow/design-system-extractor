    distinguishers:
      grid-typographic: "Poster-typographic uses extreme, uneven scale jumps for pure impact; grid-typographic uses a visible, even baseline grid where type is disciplined, not oversized."
      high-contrast-mono: "Poster-typographic allows one accent hue for impact; high-contrast-mono stays strictly black/white with that accent used only 'rarely, loudly.'"
