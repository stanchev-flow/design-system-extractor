# provenance: authored-prior (Claude design chat, 2026-07-16 export) — NOT evidence;
#   expert-authored LEVEL-2 DEFAULTS only: every value here is beaten by any measured brand fact
#   (resolution-model precedence). confidence: unmeasured for every style below — set by expert
#   judgment (font/color/shape logic + real-world exemplar knowledge), not screenshots.
#   Status: UNCALIBRATED — calibration explicitly deferred; signature-check thresholds refine over
#   time via the runs/style-calibration workflow (measure exemplars ONCE, adjust check values,
#   retire the shots). Live in style_resolver.py as level-2 defaults since 2026-07-16.
# import 2026-07-16: NINE color defects fixed transparently — the WCAG self-consistency floors
#   (text/bg ≥ 4.5, text/surface ≥ 4.5, muted/bg ≥ 3.0; rgba surfaces composited over bg; dark
#   styles compute identically — contrast math is symmetric) failed on the delivered hex mirrors
#   for 8 styles: y2k muted 2.84 · vaporwave text/surface 3.95 · psychedelic text/surface 3.00 ·
#   glassmorphism text/composited-surface 3.81 · claymorphism muted 2.80 · boutique-wellness
#   muted 2.89 · maximalist text/surface 4.16 · anti-design text/bg 4.39 AND muted/bg 2.30.
#   Each fixed by the smallest oklch-L step to compliance on the axis with headroom (the pilot's
#   neumorphism protocol; the near-white texts of vaporwave/psychedelic/glassmorphism and the
#   near-black text of maximalist had no headroom, so their surface/bg stepped instead) — inline
#   comment at every touched value. Everything else verbatim from the delivery.
#   Audit + format lock: tests/test_style_presets_generated.py; changelog: ../changes.md.
#
# Presets + signatures for the 45 non-pilot styles. The pilot 5 (swiss, editorial-magazine,
# neumorphism, scandinavian, japandi) live in pilot-presets.yaml, are richer/hand-tuned, and WIN
# if an id ever appears in both files. dark-mode (1 of 51 directives) has NO preset in either
# file yet — it resolves directive-only, byte-identical to pre-preset behavior.
# Adds ONLY new blocks (preset / signatures / neighbors / distinguishers / exemplars) keyed to
# existing directives.yaml ids — does not alter the 17 directive keys. oklch is canonical; hex is
# an sRGB approximation (out-of-gamut oklch clamps). Signature modes: always/never plus six
# `sometimes` rows (optional motifs) — prompt guidance only, never a gate.
# EXEMPLAR USAGE POLICY (applies to every 'exemplars' entry below):
#   usage: calibration-only  —  measure ONCE to set signature thresholds, then discard the image.
#   NOT generation input      —  never placed in the composing agent's prompt (would cause mimicry).
#   NOT pixel-compared        —  the taste gate checks the abstracted signature numbers, not closeness
#                                 to any screenshot; outputs must fall inside the ENVELOPE the
#                                 exemplars span, never near a single point.
#   Delivery gap: 17 styles carry ONE exemplar (short of the 2-3 target) — queued for the deferred
#   calibration pass to top up: y2k, vaporwave, pixel-8bit, psychedelic, art-deco, art-nouveau,
#   skeuomorphic, ios-hig, fluent, hand-drawn, collage, organic, grunge, textured-paper,
#   anti-design, cyberpunk, poster-typographic.

styles:

  # ---------------------------------------------------------------- Foundational
  bauhaus:
    preset:
      font:
        display: { family: "Josefin Sans", stack: "Josefin Sans, Futura, Century Gothic, sans-serif", weights: [600, 700], googleFont: "Josefin Sans" }
        body:    { family: "Work Sans",    stack: "Work Sans, Futura, Century Gothic, sans-serif",     weights: [400, 500], googleFont: "Work Sans" }
      type: { baseSizePx: 17, scaleRatio: 1.333, lineHeight: { display: 1.05, body: 1.55 }, measureCh: { body: 62, lead: 40 } }
      color:
        bg: { oklch: "oklch(0.97 0.01 90)", hex: "#f7f2e4" }
        surface: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        text: { oklch: "oklch(0.14 0 0)", hex: "#1c1c1c" }
        muted: { oklch: "oklch(0.5 0.01 90)", hex: "#7d7770" }
        border: { oklch: "oklch(0.85 0.01 90)", hex: "#d8d2c4" }
        accentPrimary: { oklch: "oklch(0.55 0.22 25)", hex: "#cc2b21" }
        accentSecondary: { oklch: "oklch(0.45 0.18 255)", hex: "#1c4fa0" }
        accentTertiary: { oklch: "oklch(0.85 0.16 95)", hex: "#e8b400" }
      space: { basePx: 8, stepsPx: [8, 16, 24, 40, 64], sectionRhythmPx: 88 }
      shape: { radiusPx: { button: 0, card: 0, input: 0 }, borderWidthPx: 2, shadow: "none" }
      layout: { maxWidthPx: 1200, gutterPx: 24, columns: 12 }
      imagery: { subjects: "geometric abstraction — circles/squares/triangles as subject, rarely photography", lighting: "flat", backdrop: "solid color fields, black or white", treatment: "flat, poster-like, high contrast", aspectHabits: ["1:1", "4:3"] }
    signatures:
      - { id: primary-triad-restraint, kind: accent-scope, mode: always, claim: "Exactly the red/blue/yellow triad on black-or-white — never blended, never a 4th hue.", check: { maxPaintSharePct: 15, allowedHueCount: 3, palette: vivid } }
      - { id: geometric-shape-vocabulary, kind: shape-motif, mode: always, claim: "Circle/triangle/square recur as structural, load-bearing composition — not decoration.", check: { buttons: { radiusPx: 0 }, cards: { radiusPx: 0 } } }
      - { id: grotesk-only, kind: type-treatment, mode: always, claim: "Geometric grotesk throughout, no serif.", check: { probes: [{ on: display, familyIncludesAny: ["Josefin Sans", "Futura", "Century Gothic"] }] } }
      - { id: sharp-corners, kind: shape-motif, mode: never, claim: "No rounding anywhere.", check: { buttons: { radiusPx: 0 }, cards: { radiusPx: 0 } } }
      - { id: asymmetric-grid-balance, kind: spacing-habit, mode: always, claim: "Off-center compositions balanced by shape weight, not symmetry.", check: { minSectionPaddingPx: 64, whitespaceRatioMin: 0.3 } }
    neighbors: [swiss, memphis]
    distinguishers:
      swiss: "Bauhaus permits the full red/blue/yellow triad and literal shape-as-content; Swiss restricts to one structural accent and treats grid as invisible scaffolding."
      memphis: "Bauhaus shapes are structural and load-bearing; Memphis shapes are decorative confetti scattered over an otherwise ordinary layout."
    exemplars:
      - { name: "Herbert Bayer Universal type specimens", url: "https://www.bauhaus.de/", lookAt: "geometric type, triad restraint", usage: "calibration-only" }
      - { name: "Vitra Design Museum — Bauhaus", url: "https://design-museum.de/", lookAt: "shape-as-structure compositions", usage: "calibration-only" }

  modernist:
    preset:
      font:
        display: { family: "Work Sans", stack: "Work Sans, Univers, Helvetica Neue, sans-serif", weights: [500, 600], googleFont: "Work Sans" }
        body:    { family: "Work Sans", stack: "Work Sans, Helvetica Neue, sans-serif", weights: [400, 500], googleFont: "Work Sans" }
      type: { baseSizePx: 17, scaleRatio: 1.25, lineHeight: { display: 1.1, body: 1.55 }, measureCh: { body: 64, lead: 42 } }
      color:
        bg: { oklch: "oklch(0.97 0.003 250)", hex: "#f5f6f7" }
        surface: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        text: { oklch: "oklch(0.18 0.004 250)", hex: "#1f2124" }
        muted: { oklch: "oklch(0.53 0.01 250)", hex: "#787c82" }
        border: { oklch: "oklch(0.88 0.005 250)", hex: "#dcdee1" }
        accent: { oklch: "oklch(0.5 0.15 230)", hex: "#3a6ea8" }
      space: { basePx: 8, stepsPx: [4, 8, 16, 24, 48, 80], sectionRhythmPx: 104 }
      shape: { radiusPx: { button: 4, card: 6, input: 4 }, borderWidthPx: 1, shadow: "none" }
      layout: { maxWidthPx: 1180, gutterPx: 24, columns: 12 }
      imagery: { subjects: "architecture and industrial objects in use", lighting: "even", backdrop: "real environments", treatment: "restrained color, documentary", aspectHabits: ["3:2", "1:1"] }
    signatures:
      - { id: function-over-ornament, kind: spacing-habit, mode: always, claim: "No decorative element lacks a UI role.", check: { minSectionPaddingPx: 96, whitespaceRatioMin: 0.4 } }
      - { id: restrained-functional-blue, kind: accent-scope, mode: always, claim: "One muted functional blue, never a loud hue.", check: { maxPaintSharePct: 3, allowedRoles: [action-primary, arrow-link] } }
      - { id: soft-not-sharp, kind: shape-motif, mode: always, claim: "4px radius signals function, distinguishing from Swiss's 0px.", check: { buttons: { radiusPx: 4 }, cards: { radiusPx: 6 } } }
      - { id: even-visible-grid, kind: spacing-habit, mode: always, claim: "Grid stays visible but quiet.", check: { minSectionPaddingPx: 96 } }
      - { id: quiet-documentary-imagery, kind: type-treatment, mode: always, claim: "Photography is documentary, never staged/glossy.", check: { probes: [{ on: display, familyIncludesAny: ["Work Sans", "Univers", "Helvetica"] }] } }
    neighbors: [swiss, minimalist]
    distinguishers:
      swiss: "Modernist softens corners slightly (4px) and mutes its accent to functional blue; Swiss stays sharp-cornered with a loud structural red."
      minimalist: "Modernist keeps a visible grid and functional accent; minimalist suppresses both toward near-invisibility."
    exemplars:
      - { name: "Dieter Rams / Braun design archive", url: "https://www.ramsdesign.org/", lookAt: "restrained duotone, functional accent use", usage: "calibration-only" }
      - { name: "Vitsœ", url: "https://www.vitsoe.com/", lookAt: "functional grid, documentary photography", usage: "calibration-only" }

  minimalist:
    preset:
      font:
        display: { family: "Inter", stack: "Inter, system-ui, sans-serif", weights: [400, 500], googleFont: "Inter" }
        body:    { family: "Inter", stack: "Inter, system-ui, sans-serif", weights: [400], googleFont: "Inter" }
      type: { baseSizePx: 16, scaleRatio: 1.2, lineHeight: { display: 1.2, body: 1.6 }, measureCh: { body: 60, lead: 42 } }
      color:
        bg: { oklch: "oklch(0.99 0 0)", hex: "#fefefe" }
        surface: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        text: { oklch: "oklch(0.2 0 0)", hex: "#212121" }
        muted: { oklch: "oklch(0.6 0 0)", hex: "#8f8f8f" }
        border: { oklch: "oklch(0.93 0 0)", hex: "#ececec" }
        accent: { oklch: "oklch(0.3 0.02 250)", hex: "#2e3238" }
      space: { basePx: 8, stepsPx: [8, 16, 32, 56, 96, 144], sectionRhythmPx: 128 }
      shape: { radiusPx: { button: 4, card: 6, input: 4 }, borderWidthPx: 0, shadow: "none" }
      layout: { maxWidthPx: 1040, gutterPx: 24, columns: 12 }
      imagery: { subjects: "single isolated object or figure", lighting: "soft neutral", backdrop: "seamless white or negative space", treatment: "desaturated, low-contrast", aspectHabits: ["1:1"] }
    signatures:
      - { id: near-zero-accent, kind: accent-scope, mode: always, claim: "Accent is optional; when present it's desaturated near-black, essentially zero paint share.", check: { maxPaintSharePct: 1 } }
      - { id: maximal-whitespace, kind: spacing-habit, mode: always, claim: "The widest whitespace ratio in the system.", check: { whitespaceRatioMin: 0.55, minSectionPaddingPx: 120 } }
      - { id: one-thing-per-screen, kind: spacing-habit, mode: always, claim: "A single focal element per view, no competing elements.", check: { minSectionPaddingPx: 120 } }
      - { id: no-border-no-shadow, kind: surface-habit, mode: never, claim: "Never a border or shadow.", check: { shadow: none, sectionMinLuminance: 0.97 } }
      - { id: restraint-as-content, kind: type-treatment, mode: always, claim: "Remove until it breaks, then add one back.", check: { probes: [{ on: display, familyIncludesAny: ["Inter"] }] } }
    neighbors: [swiss, japandi]
    distinguishers:
      swiss: "Minimalist strips the accent that Swiss treats as essential; grid is felt, not seen."
      japandi: "Minimalist is cool/neutral with zero warmth signal; Japandi is warm and material-driven."
    exemplars:
      - { name: "Kinfolk", url: "https://kinfolk.com/", lookAt: "maximal whitespace, one focal element", usage: "calibration-only" }
      - { name: "Teenage Engineering", url: "https://teenage.engineering/", lookAt: "near-zero accent, restraint", usage: "calibration-only" }

  grid-typographic:
    preset:
      font:
        display: { family: "Space Grotesk", stack: "Space Grotesk, Neue Haas Unica, sans-serif", weights: [500, 700], googleFont: "Space Grotesk" }
        body:    { family: "IBM Plex Sans", stack: "IBM Plex Sans, sans-serif", weights: [400, 500], googleFont: "IBM Plex Sans" }
      type: { baseSizePx: 16, scaleRatio: 1.333, lineHeight: { display: 1.0, body: 1.5 }, measureCh: { body: 60, lead: 40 }, tracking: { display: "-0.03em", body: "0" } }
      color:
        bg: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        surface: { oklch: "oklch(0.97 0 0)", hex: "#f7f7f7" }
        text: { oklch: "oklch(0.12 0 0)", hex: "#151515" }
        muted: { oklch: "oklch(0.55 0 0)", hex: "#8c8c8c" }
        border: { oklch: "oklch(0.85 0 0)", hex: "#d9d9d9" }
        accent: { oklch: "oklch(0.55 0.2 30)", hex: "#c33a1e" }
      space: { basePx: 8, stepsPx: [4, 8, 16, 24, 40], sectionRhythmPx: 72 }
      shape: { radiusPx: { button: 0, card: 0, input: 0 }, borderWidthPx: 1, shadow: "none" }
      layout: { maxWidthPx: 1280, gutterPx: 16, columns: 16 }
      imagery: { subjects: "none typical; type-only pages", lighting: "n/a", backdrop: "n/a", treatment: "n/a", aspectHabits: [] }
    signatures:
      - { id: type-is-only-content, kind: type-treatment, mode: always, claim: "Imagery is absent almost by default; type carries the whole page.", check: { probes: [{ on: display, familyIncludesAny: ["Space Grotesk"] }] } }
      - { id: visible-baseline-grid, kind: spacing-habit, mode: always, claim: "Every text block snaps to a shared leading grid.", check: { minSectionPaddingPx: 56, whitespaceRatioMin: 0.3 } }
      - { id: numeral-ornament, kind: shape-motif, mode: always, claim: "Page/section numbers render large as decoration.", check: { buttons: { radiusPx: 0 }, cards: { radiusPx: 0 } } }
      - { id: fine-16-col-grid, kind: spacing-habit, mode: always, claim: "A finer grid (16 cols) than Swiss's 12.", check: { minSectionPaddingPx: 56 } }
      - { id: tight-tracking-display, kind: type-treatment, mode: always, claim: "Display tracking pulled tight.", check: { probes: [{ on: display, familyIncludesAny: ["Space Grotesk"] }] } }
    neighbors: [swiss, brutalist]
    distinguishers:
      swiss: "Grid-typographic drops imagery almost entirely and uses numerals as ornament; Swiss keeps documentary photography central."
      brutalist: "Grid-typographic is disciplined and aligned; brutalist is raw and intentionally unstyled."
    exemplars:
      - { name: "Experimental Jetset", url: "https://www.experimentaljetset.nl/", lookAt: "type-only grid discipline", usage: "calibration-only" }
      - { name: "Base Design", url: "https://www.basedesign.com/", lookAt: "baseline grid, numeral ornament", usage: "calibration-only" }

  flat:
    preset:
      font:
        display: { family: "Poppins", stack: "Poppins, Proxima Nova, sans-serif", weights: [600, 700], googleFont: "Poppins" }
        body:    { family: "Open Sans", stack: "Open Sans, sans-serif", weights: [400, 600], googleFont: "Open Sans" }
      type: { baseSizePx: 16, scaleRatio: 1.25, lineHeight: { display: 1.2, body: 1.55 }, measureCh: { body: 62, lead: 42 } }
      color:
        bg: { oklch: "oklch(0.97 0.01 200)", hex: "#f3f8f8" }
        surface: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        text: { oklch: "oklch(0.2 0.02 240)", hex: "#232a33" }
        muted: { oklch: "oklch(0.55 0.02 240)", hex: "#7c8592" }
        border: { oklch: "oklch(0.9 0.01 200)", hex: "#e2e8e8" }
        accentPrimary: { oklch: "oklch(0.62 0.18 155)", hex: "#2ecc71" }
        accentSecondary: { oklch: "oklch(0.7 0.17 55)", hex: "#f39c12" }
      space: { basePx: 8, stepsPx: [8, 16, 24, 32, 48], sectionRhythmPx: 72 }
      shape: { radiusPx: { button: 8, card: 10, input: 8 }, borderWidthPx: 1, shadow: "none" }
      layout: { maxWidthPx: 1200, gutterPx: 24, columns: 12 }
      imagery: { subjects: "simple flat illustration — icons, abstracted people/objects", lighting: "none, flat fill only", backdrop: "solid color", treatment: "2D flat fill, no gradient, no bevel", aspectHabits: ["1:1", "4:3"] }
    signatures:
      - { id: zero-depth-cues, kind: surface-habit, mode: never, claim: "No gradient AND no shadow AND no bevel — stricter than material.", check: { shadow: none, sectionMinLuminance: 0.94 } }
      - { id: flat-icon-language, kind: shape-motif, mode: always, claim: "Single-weight line or filled icons, never photoreal.", check: { buttons: { radiusPx: 8 }, cards: { radiusPx: 10 } } }
      - { id: bold-solid-fills, kind: accent-scope, mode: always, claim: "Color blocks as section dividers.", check: { maxPaintSharePct: 15, palette: vivid } }
      - { id: rounded-not-sharp, kind: shape-motif, mode: always, claim: "8px radius signals approachable, not severe.", check: { buttons: { radiusPx: 8 } } }
      - { id: duo-to-vivid-palette, kind: accent-scope, mode: always, claim: "Two saturated accents, never a gradient blend.", check: { maxPaintSharePct: 15 } }
    neighbors: [material, corporate-memphis]
    distinguishers:
      material: "Flat forbids shadow entirely; material uses shadow as its core signal (elevation)."
      corporate-memphis: "Flat is geometric/iconographic; corporate-memphis centers on blob-people illustration specifically."
    exemplars:
      - { name: "Slack brand illustrations", url: "https://slack.com/brand", lookAt: "flat fills, no gradient/shadow", usage: "calibration-only" }
      - { name: "Trello", url: "https://trello.com/", lookAt: "bold solid color blocks", usage: "calibration-only" }

  material:
    preset:
      font:
        display: { family: "Roboto", stack: "Roboto, Google Sans, sans-serif", weights: [500, 700], googleFont: "Roboto" }
        body:    { family: "Roboto", stack: "Roboto, sans-serif", weights: [400, 500], googleFont: "Roboto" }
      type: { baseSizePx: 16, scaleRatio: 1.25, lineHeight: { display: 1.15, body: 1.5 }, measureCh: { body: 60, lead: 40 } }
      color:
        bg: { oklch: "oklch(0.98 0.002 250)", hex: "#f7f8fa" }
        surface: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        text: { oklch: "oklch(0.18 0 0)", hex: "#1c1c1c" }
        muted: { oklch: "oklch(0.5 0.01 250)", hex: "#787c85" }
        border: { oklch: "oklch(0.9 0.005 250)", hex: "#e2e4e8" }
        accentPrimary: { oklch: "oklch(0.5 0.19 265)", hex: "#4759b8" }
        accentSecondary: { oklch: "oklch(0.68 0.17 15)", hex: "#e8536b" }
      space: { basePx: 8, stepsPx: [4, 8, 16, 24, 32, 48], sectionRhythmPx: 80 }
      shape: { radiusPx: { button: 8, card: 12, input: 8 }, borderWidthPx: 1, shadow: "0 1px 2px rgba(0,0,0,.12), 0 1px 3px rgba(0,0,0,.24)" }
      layout: { maxWidthPx: 1200, gutterPx: 24, columns: 12 }
      imagery: { subjects: "photography, product-in-context", lighting: "bright neutral", backdrop: "clean", treatment: "true color, moderate saturation", aspectHabits: ["16:9", "1:1"] }
    signatures:
      - { id: layered-elevation-shadow, kind: surface-habit, mode: always, claim: "Distinct shadow depths per z-level (1/2/3/4/6/8/12/16dp).", check: { shadow: allowed, sectionMinLuminance: 0.9 } }
      - { id: primary-plus-accent-role-system, kind: accent-scope, mode: always, claim: "Exactly 2 named colors with fixed roles.", check: { maxPaintSharePct: 6, palette: duo } }
      - { id: fab-primary-action, kind: shape-motif, mode: always, claim: "A circular/pill FAB for the single primary action.", check: { buttons: { radiusPx: 8 }, cards: { radiusPx: 12 } } }
      - { id: ripple-implied-interactivity, kind: type-treatment, mode: always, claim: "Interactive surfaces imply a ripple/press response.", check: { probes: [{ on: display, familyIncludesAny: ["Roboto"] }] } }
      - { id: eight-px-baseline-grid, kind: spacing-habit, mode: always, claim: "All spacing steps are multiples of 8px.", check: { minSectionPaddingPx: 64 } }
    neighbors: [flat, saas-product]
    distinguishers:
      flat: "Material adds elevation shadow as its whole point; flat forbids shadow entirely."
      saas-product: "Material follows a literal named elevation scale; saas-product is looser with softer ad-hoc shadows."
    exemplars:
      - { name: "Google Material Design", url: "https://m3.material.io/", lookAt: "elevation scale, FAB pattern", usage: "calibration-only" }
      - { name: "Google Workspace", url: "https://workspace.google.com/", lookAt: "primary+accent role system", usage: "calibration-only" }

  # ---------------------------------------------------------------- Editorial
  newspaper:
    preset:
      font:
        display: { family: "Bitter", stack: "Bitter, Cheltenham, Georgia, serif", weights: [700, 900], googleFont: "Bitter" }
        body:    { family: "PT Serif", stack: "PT Serif, Georgia, serif", weights: [400, 700], googleFont: "PT Serif" }
      type: { baseSizePx: 15, scaleRatio: 1.2, lineHeight: { display: 1.05, body: 1.45 }, measureCh: { body: 42, lead: 30 } }
      color:
        bg: { oklch: "oklch(0.96 0.006 80)", hex: "#efece3" }
        surface: { oklch: "oklch(1 0 0)", hex: "#ffffff" }
        text: { oklch: "oklch(0.14 0.005 60)", hex: "#1b1a17" }
        muted: { oklch: "oklch(0.48 0.01 60)", hex: "#6f6c64" }
        border: { oklch: "oklch(0.75 0.005 60)", hex: "#bcb9b0" }
        accent: { oklch: "oklch(0.4 0.16 20)", hex: "#8f2318" }
      space: { basePx: 6, stepsPx: [6, 12, 18, 24, 36], sectionRhythmPx: 48 }
      shape: { radiusPx: { button: 0, card: 0, input: 0 }, borderWidthPx: 2, shadow: "none" }
      layout: { maxWidthPx: 1320, gutterPx: 16, columns: 6 }
      imagery: { subjects: "reportage photography, halftone-friendly", lighting: "available-light", backdrop: "real-world", treatment: "black & white or muted, halftone dot feel", aspectHabits: ["4:3", "3:2"] }
    signatures:
      - { id: multi-column-narrow-measure, kind: spacing-habit, mode: always, claim: "42ch or less per column, several columns per row.", check: { minSectionPaddingPx: 32, whitespaceRatioMin: 0.15 } }
      - { id: hairline-story-rules, kind: surface-habit, mode: always, claim: "Every story separated by a thin rule.", check: { shadow: none, sectionMinLuminance: 0.9 } }
      - { id: dateline-byline-convention, kind: type-treatment, mode: always, claim: "Small-caps/condensed byline block above every story.", check: { probes: [{ on: display, familyIncludesAny: ["Bitter", "Cheltenham"] }] } }
      - { id: condensed-serif-headlines, kind: type-treatment, mode: always, claim: "Condensed serif carries headlines.", check: { probes: [{ on: display, familyIncludesAny: ["Bitter"] }] } }
      - { id: tight-density, kind: spacing-habit, mode: always, claim: "The tightest section padding of any editorial style.", check: { minSectionPaddingPx: 32 } }
    neighbors: [editorial-magazine, book-literary]
    distinguishers:
      editorial-magazine: "Newspaper is dense and multi-column with hairline rules; editorial-magazine is airy, single dominant column with huge display jumps."
      book-literary: "Newspaper is columnar and rule-divided; book-literary is one long uninterrupted reading column."
    exemplars:
      - { name: "The Guardian", url: "https://www.theguardian.com/", lookAt: "multi-column measure, hairline rules", usage: "calibration-only" }
      - { name: "Le Monde", url: "https://www.lemonde.fr/", lookAt: "dateline/byline convention", usage: "calibration-only" }

  serif-classic:
    preset:
      font:
        display: { family: "EB Garamond", stack: "EB Garamond, Garamond, serif", weights: [500, 600], googleFont: "EB Garamond" }
        body:    { family: "EB Garamond", stack: "EB Garamond, Garamond, serif", weights: [400], googleFont: "EB Garamond" }
