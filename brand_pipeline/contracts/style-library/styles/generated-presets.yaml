      shape: { radiusPx: { button: 20, card: 24, input: 16 }, borderWidthPx: 1, shadow: "hard (mixed — inconsistent on purpose)" }
      layout: { maxWidthPx: 1200, gutterPx: 16, columns: "bento" }
      imagery: { subjects: "layered patterns, mixed photography+illustration+type, dense collage-adjacent", lighting: "mixed", backdrop: "pattern-filled", treatment: "high-saturation, multiple textures/patterns overlapping", aspectHabits: ["mixed"] }
    signatures:
      - { id: more-is-more-layering, kind: surface-habit, mode: always, claim: "Multiple pattern/texture/color layers stack on the SAME surface simultaneously.", check: { shadow: allowed, sectionMinLuminance: 0.5 } }
      - { id: deliberate-clash, kind: accent-scope, mode: always, claim: "Type, color, and scale are chosen to clash on purpose, not harmonize.", check: { maxPaintSharePct: 30, palette: vivid } }
      - { id: dense-edge-to-edge-composition, kind: spacing-habit, mode: always, claim: "Minimal negative space anywhere — the opposite pole from minimalist.", check: { minSectionPaddingPx: 24, whitespaceRatioMin: 0.08 } }
      - { id: inconsistent-shape-language, kind: shape-motif, mode: always, claim: "Radius/shadow/border vary element to element rather than following one rule.", check: { buttons: { radiusPx: 20 }, cards: { radiusPx: 24 } } }
      - { id: five-plus-simultaneous-hues, kind: accent-scope, mode: always, claim: "More concurrent saturated colors on screen than any other style, including memphis.", check: { maxPaintSharePct: 30 } }
    neighbors: [collage, memphis]
    distinguishers:
      collage: "Maximalist layers many distinct elements densely without necessarily overlapping physically; collage's density is specifically overlapping torn-paper scraps."
      memphis: "Maximalist clashes color, pattern, AND density together; memphis's clash is specifically confetti/squiggle shapes over an otherwise plain page."
    exemplars:
      - { name: "Gucci seasonal campaigns", url: "https://www.gucci.com/", lookAt: "layered pattern+photo+type", usage: "calibration-only" }
      - { name: "Ssense editorial", url: "https://www.ssense.com/editorial", lookAt: "dense edge-to-edge composition", usage: "calibration-only" }

