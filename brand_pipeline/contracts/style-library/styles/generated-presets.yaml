      space: { basePx: 8, stepsPx: [8, 16, 24, 40, 64], sectionRhythmPx: 104 }
      shape: { radiusPx: { button: 4, card: 6, input: 4 }, borderWidthPx: 1, shadow: "none" }
      layout: { maxWidthPx: 1160, gutterPx: 24, columns: "grid-aligned" }
      imagery: { subjects: "B&W or grayscale-treated photography exclusively", lighting: "high-contrast", backdrop: "neutral", treatment: "true grayscale or single-hue duotone, zero chroma elsewhere", aspectHabits: ["1:1", "3:2"] }
    signatures:
      - { id: zero-chroma-discipline, kind: accent-scope, mode: always, claim: "No hue anywhere except optionally a single duotone wash on imagery — the strictest palette rule here.", check: { maxPaintSharePct: 0, palette: mono } }
      - { id: value-not-color-contrast, kind: surface-habit, mode: always, claim: "All hierarchy signaled by lightness steps of one neutral, never a second hue.", check: { shadow: none, sectionMinLuminance: 0.94 } }
      - { id: grayscale-photography-only, kind: type-treatment, mode: always, claim: "Every image is B&W or single-tone duotone, no exceptions.", check: { probes: [{ on: display, familyIncludesAny: ["Archivo"] }] } }
      - { id: tonal-accent-as-darkest-step, kind: accent-scope, mode: always, claim: "The 'accent' role is simply the darkest neutral used more assertively, not a distinct hue.", check: { maxPaintSharePct: 0 } }
      - { id: clean-grid-without-color-cues, kind: spacing-habit, mode: always, claim: "Grid/hierarchy read through spacing and weight, not color.", check: { minSectionPaddingPx: 88, whitespaceRatioMin: 0.36 } }
    neighbors: [swiss, high-contrast-mono]
    distinguishers:
      swiss: "Monochrome forbids hue entirely, even structurally; Swiss keeps one loud red hue as its defining structural accent."
      high-contrast-mono: "Monochrome favors value gradation across grays for a softer, editorial tonal range; high-contrast-mono pushes to pure black/white extremes with almost no midtone."
    exemplars:
      - { name: "COS", url: "https://www.cosstores.com/", lookAt: "zero-chroma tonal discipline", usage: "calibration-only" }
      - { name: "Byredo", url: "https://www.byredo.com/", lookAt: "grayscale photography", usage: "calibration-only" }

