        text: { oklch: "oklch(0 0 0)", hex: "#000000" }
        muted: { oklch: "oklch(0.5 0 0)", hex: "#808080" }
        border: { oklch: "oklch(0 0 0)", hex: "#000000" }
        accent: { oklch: "oklch(0.55 0.24 25)", hex: "#dd1f10" }
      space: { basePx: 8, stepsPx: [8, 16, 24, 40, 64], sectionRhythmPx: 88 }
      shape: { radiusPx: { button: 0, card: 0, input: 0 }, borderWidthPx: 1, shadow: "none" }
      layout: { maxWidthPx: 1160, gutterPx: 24, columns: "grid-aligned" }
      imagery: { subjects: "stark B&W photography, extreme contrast, no midtone-heavy images", lighting: "hard-directional", backdrop: "pure-white-or-black", treatment: "pushed contrast, crushed shadows, blown highlights", aspectHabits: ["1:1", "4:5"] }
    signatures:
      - { id: pure-black-white-only, kind: surface-habit, mode: always, claim: "Text/bg are literal #000/#fff, not near-black/off-white — the strictest binary in the system.", check: { shadow: none, sectionMinLuminance: 1.0 } }
      - { id: rare-loud-accent, kind: accent-scope, mode: always, claim: "The accent appears at most once or twice per screen but at full saturation when it does.", check: { maxPaintSharePct: 2, allowedRoles: [action-primary] } }
      - { id: sharp-edges-strong-hierarchy, kind: shape-motif, mode: never, claim: "Zero radius anywhere, hierarchy driven by weight+size extremes.", check: { buttons: { radiusPx: 0 }, cards: { radiusPx: 0 } } }
      - { id: invertible-palette, kind: surface-habit, mode: always, claim: "The whole system is designed to flip cleanly to black-bg/white-text as an equally valid mode.", check: { shadow: none } }
      - { id: crushed-contrast-photography, kind: type-treatment, mode: always, claim: "Images treated to push toward pure black/white, minimal midtone.", check: { probes: [{ on: display, familyIncludesAny: ["Archivo"] }] } }
