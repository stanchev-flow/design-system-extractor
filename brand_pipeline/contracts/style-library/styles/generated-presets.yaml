    signatures:
      - { id: deliberately-wrong-color-pairing, kind: accent-scope, mode: always, claim: "Hues chosen specifically because they clash uncomfortably, never even loosely harmonized.", check: { maxPaintSharePct: 30, palette: vivid } }
      - { id: system-default-typography, kind: type-treatment, mode: always, claim: "Literal Times/Arial/Verdana at inconsistent sizes, refusing custom type design.", check: { probes: [{ on: display, familyIncludesAny: ["Georgia", "Times New Roman"] }, { on: body, familyIncludesAny: ["Arial", "Verdana"] }] } }
      - { id: erratic-unsystematic-scale, kind: type-treatment, mode: always, claim: "No visible ratio governs heading sizes — arbitrarily chosen.", check: { probes: [{ on: display, familyIncludesAny: ["Georgia"] }] } }
      - { id: broken-alignment-on-purpose, kind: spacing-habit, mode: always, claim: "Elements sit slightly off-grid or overflow their container intentionally.", check: { minSectionPaddingPx: 16, whitespaceRatioMin: 0.1 } }
      - { id: clip-art-and-stretched-imagery, kind: shape-motif, mode: always, claim: "Low-fidelity or deliberately distorted-aspect imagery.", check: { cards: { radiusPx: 0 } } }
    neighbors: [brutalist, grunge]
    distinguishers:
      brutalist: "Anti-design actively chooses ugly/clashing decisions; brutalist simply omits styling decisions with no color clash at all."
      grunge: "Anti-design's wrongness is compositional/color; grunge's edge comes from surface texture on an otherwise coherent dark palette."
    exemplars:
      - { name: "Web Design Museum", url: "https://www.webdesignmuseum.org/", lookAt: "deliberately clashing color/type", usage: "calibration-only" }

