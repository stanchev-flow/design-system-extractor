layouts:
  - id: navbar
    archetype: nav
    index: 0
    surfaceMode: { mode: "Container" }
    useCase: "Two-tier chrome on white: utility row (language picker, High Contrast toggle, Customer Support, Contact Sales | search, Log in, About) above the primary row (orange wordmark, four mega tabs w/ chevrons — active tab underlined, small filled-orange 'Get a demo' + orange-outlined 'Get started free')."
    whenToUse: "Always — global chrome."
    slots:
      - { name: "brand",    type: media,   role: "HubSpot orange wordmark w/ sprocket", asset: "hubspot-wordmark.svg" }
      - { name: "navlinks", type: content, role: "primary mega tabs (16px w400 ink, chevron 16px, active tab underlined)" }
      - { name: "actions",  type: content, role: "small filled primary + small outlined secondary" }
    gridRules:  { columns: "auto", justify: "space-between", align: center }
    widthRules: { container: "contained", measure: "1080px content max" }
  - id: hero
    archetype: stack
    index: 1
    patternRef: { lib: project, id: hero-photo-overlay }
    surfaceMode: { mode: "Inverse", note: "full-bleed tinted photograph band; cream ink" }
    surfaceIntent: surface/photo-hero
    useCase: "Photographic hero: centered cream stack (uppercase eyebrow → 80px serif display w/ orange period → 18px body → large filled-orange + white-secondary buttons) on the warm office photo."
    whenToUse: "Page opener."
    slots:
      - { name: "eyebrow", type: content, role: "uppercase cream microlabel ('HUBSPOT AGENTIC CUSTOMER PLATFORM')" }
      - { name: "heading", type: content, role: "80px serif display (sentence, orange period)" }
      - { name: "body",    type: content, role: "supporting paragraph (18px light, cream)" }
      # fix1 2026-07 item-3: the role must NAME the outlined treatment — the demo
      # pair-builder hints each button from these words; "white secondary" carried
      # no style word, so both buttons resolved to the primary register. Measured:
      # hero secondary = white fill / 2px #ff4800 border / #ff4800 ink
      # (computed-styles.json .cl-button.-secondary.-large — the light outline family).
      - { name: "actions", type: content, role: "large filled primary + outlined white secondary" }
      - { name: "background", type: media, role: "full-bleed warm office photograph", assets: [ "018-hs-full-bleed-1-optmised.webp" ] }
    gridRules:  { columns: "single", justify: "center", align: center }
    widthRules: { container: "full-bleed", measure: "centered stack ~780px" }
  - id: logo-wall
    archetype: stack
    index: 2
    patternRef: { lib: project, id: logo-proof-strip }
    surfaceMode: { mode: "base (Primary)" }
    surfaceIntent: surface/primary
    useCase: "Customer-proof strip: centered 22px sans stat heading over ONE row of 5 real customer logo vectors (~30px, wide gaps)."
    whenToUse: "Directly after the hero."
    slots:
      - { name: "heading", type: content, role: "sans stat heading ('299,000+ customers…')" }
      - { name: "logos",   type: media,   role: "5 customer logo vectors, spaced row", assets: [ "019-ebay-logo.svg", "020-doordash-logo.svg", "021-reddit-logo.svg", "022-tripadvisor-logo.svg", "023-eventbrite-logo.svg" ] }
    gridRules:  { columns: "logo row", justify: "center", align: center }
    widthRules: { container: "contained", measure: "~130px column gap" }
  - id: platform-carousel
    archetype: split
    index: 3
    patternRef: { lib: project, id: platform-showcase-carousel }
    surfaceMode: { mode: "base (Primary)" }
    surfaceIntent: surface/primary
    useCase: "Platform showcase carousel: centered 48px serif h2 + subhead; slide rows split 40px serif slide-heading + body LEFT / layered platform illustration RIGHT; round prev/next + 3-dot rail below."
    whenToUse: "Platform architecture story."
    slots:
      - { name: "heading", type: content, role: "48px serif section heading + subhead" }
      - { name: "list",    type: content, role: "3 slide copy stacks (40px serif h3 + body)" }
      - { name: "media",   type: media,   role: "layered isometric platform illustration — the ACTIVE slide's art (JS-off truth; slides 2-3's art rides layoutCopy items)", assets: [ "024-customer-20platform-20graphic-20-20smart-20crm1-5x-20-1.png" ] }
      - { name: "controls", type: content, role: "round neutral prev/next + 3 dots" }
    gridRules:  { columns: "1fr 1fr", justify: "space-between", align: center }
    widthRules: { container: "contained", measure: "~80px column gap" }
  - id: product-grid
    archetype: cards
    index: 4
    patternRef: { lib: project, id: product-grid-split }
    surfaceMode: { mode: "base (Primary)", note: "peach→pink gradient seam at the bottom edge" }
    surfaceIntent: surface/primary
    useCase: "Product family: copy rail LEFT (bordered 'Powered by AI' pill, 40px serif h2, body, filled+outlined buttons) beside a 2-col grid of TEN white icon-checklist cards RIGHT."
    whenToUse: "Product/feature family overview."
    slots:
      - { name: "eyebrow", type: content, role: "bordered eyebrow pill ('Powered by AI')" }
      - { name: "heading", type: content, role: "40px serif section heading" }
      - { name: "body",    type: content, role: "supporting paragraph" }
      - { name: "actions", type: content, role: "filled primary + outlined secondary (medium)" }
      - { name: "cards",   type: content, role: "10 icon-checklist product cards", assets: [ "028-producticons-marketinghub-icon-orange.webp", "029-producticons-saleshub-icon-orange.webp", "030-producticons-servicehub-icon-orange.webp", "031-producticons-contenthub-icon-orange.webp", "032-producticons-datahub-icon-orange.webp", "033-producticons-commercehub-icon-orange.webp", "034-producticons-smartcrm-icon-orange.webp", "035-breeze-20icon.svg", "009-small-business.svg", "027-ai-20sparkle.svg" ] }
    gridRules:  { columns: "repeat(2)", gap: "2rem" }
    widthRules: { container: "contained", measure: "copy rail ~35% / grid ~65%" }
  - id: agent-carousel
    archetype: cards
    index: 5
    patternRef: { lib: project, id: agent-card-carousel }
    surfaceMode: { mode: "base (Primary)", note: "warm gradient band (surface/accent-wash): pink→peach art; white cards float on it" }
    surfaceIntent: surface/accent-wash
    useCase: "AI-agent showcase on the warm gradient band: sparkle-chip + dotted-rule + outlined-pill header rail; 40px serif heading left / body right; edge-cut autoplay card track (sand media wells + 24px sans headings); round white controls + pause."
    whenToUse: "Feature-set showcase with product-UI proof."
    slots:
      - { name: "eyebrow", type: content, role: "icon chip + dotted rule + outlined CTA rail", assets: [ "027-ai-20sparkle.svg" ] }
      - { name: "heading", type: content, role: "40px serif heading (left)" }
      - { name: "body",    type: content, role: "supporting paragraph (right column)" }
      - { name: "cards",   type: content, role: "3 agent cards w/ product-UI media wells", assets: [ "036-customer-agent-en-2x.png", "037-prospecting-agent-en-2x.png", "038-data-hub-en-2x.png" ] }
      - { name: "controls", type: content, role: "round white prev/next + pause" }
    gridRules:  { columns: "3-up edge-cut track", gap: "2rem" }
    widthRules: { container: "full-bleed track", measure: "cards ~430px" }
  - id: integration-banner
    archetype: split
    index: 6
    patternRef: { lib: project, id: integration-collage-banner }
    surfaceMode: { mode: "Container", note: "inset 16px-radius white panel on the canvas" }
    surfaceIntent: surface/primary
    useCase: "Integration proof banner: 22px sans heading + orange-underlined ink link LEFT / colorful app-logo collage RIGHT, inside an inset white panel."
    whenToUse: "Ecosystem proof moment."
    slots:
      - { name: "heading", type: content, role: "sans banner heading ('Works with the tools you already use…')" }
      - { name: "action",  type: content, role: "ink link w/ orange underline ('See all app integrations')" }
      - { name: "media",   type: media,   role: "app-logo collage (6 tool vectors)", assets: [ "044-slack-icon-2.svg", "042-zapier-icon-2.svg", "041-mailchimp-icon-3.svg", "039-gmail-icon-3.svg", "040-shopify-icon-3.svg", "043-google-ads-icon-2.svg" ] }
    gridRules:  { columns: "1fr 1fr", justify: "space-between", align: center }
    widthRules: { container: "contained", measure: "panel inset, ~40px gap" }
  - id: case-study-header
    archetype: generic-flow   # a 240px header RAIL (pill/rule/CTA + 2-col heading/body) — no media half; the split composer would invent an art panel here
    index: 7
    patternRef: { lib: project, id: case-study-header-rail }
    surfaceMode: { mode: "base (Primary)" }
    surfaceIntent: surface/primary
    useCase: "Editorial header rail: bordered 'Case Studies' pill + dotted rule + outlined 'See all case studies' CTA; 40px serif heading LEFT / body RIGHT. Zero bottom padding — the testimonial band completes it."
    whenToUse: "Proof-section opener."
    slots:
      - { name: "eyebrow", type: content, role: "bordered pill + dotted rule + outlined CTA rail" }
      - { name: "heading", type: content, role: "40px serif heading (left column)" }
      - { name: "body",    type: content, role: "supporting paragraph (right column)" }
    gridRules:  { columns: "1fr 1fr", justify: "space-between", align: start }
    widthRules: { container: "contained" }
  - id: testimonial-tabs
    archetype: split
    index: 8
    patternRef: { lib: project, id: testimonial-tab-stats }
    surfaceMode: { mode: "base (Primary)" }
    surfaceIntent: surface/primary
    useCase: "Tabbed case-study proof: 3 pill tabs (Enterprise/Mid-Sized/Small); hairline card w/ workplace photo LEFT / quote + author + orange-underlined link RIGHT; serif stat pair under the quote split by a vertical rule."
    whenToUse: "Social proof with segmentation."
    slots:
      - { name: "tabs",  type: content, role: "segment pill run — 3 tab pills ('Enterprise' active; Mid-Sized Business; Small Business), 14px w500, r16 wash" }
      - { name: "media", type: media,   role: "ACTIVE panel case-study photograph (4px radius, warehouse scene)", assets: [ "045-unipart-1.png" ] }
      - { name: "support-statement", type: content, role: "supporting statement — the active panel's verbatim customer words + author attribution" }
      - { name: "stat-rows", type: content, role: "ruled stat list — 2 serif numerals w/ descriptions" }
    gridRules:  { columns: "photo 40% / quote 60%", justify: "space-between", align: stretch }
    widthRules: { container: "contained" }
    note: "The live band is a 3-tab switcher; JS-off truth (and the replica) is the ACTIVE Enterprise panel. All three panels' verbatim copy is preserved under layoutCopy.testimonial-tabs.panels."
  - id: badge-row
    archetype: split
    index: 9
