# brand.yaml — canonical design language for HubSpot (hubspot.com) — "HubSpot v2"
# Authored 2026-07-10 by the extraction agent from the FRESH live capture
# (screenshots/hubspot-v2/, Playwright 1440x900, webfonts downloaded into the
# capture) through the evidence-first flow (run_brand_extraction.py mine-dom →
# mine-css → mine-motion → measure → slice → ground → curate;
# spec/layout-analyst-skill.md authoring protocol).
#
# MEASUREMENT SOURCES (evidence/ bundle, all reproducible):
#  - evidence/css-facts.json + the site's OWN custom-property token sheet mined
#    from the captured CSS: --light-theme-* / --dark-theme-* literal palette
#    (105 tokens per scheme), --cl-font-* type registers, --cl-border-radius-*
#    (4/8/16px), --cl-button-padding-* (8x16 / 12x24 / 16x40), --cl-section-padding-*
#    (24/40/64/96), --cl-section-gutter 16px, --button-transition 0.15s
#  - evidence/computed-styles.json — JS-off getComputedStyle at 1440x900 + the
#    1920/1440/960/375 tier ladder: chrome bars (header 128px white, footer
#    #1f1f1f), container 1080px at every tier, 48 action families
#  - targeted JS-off element measures @1440 (hero h1 80/95 serif 500; section h2
#    48/55.4 and 40/44 serif 500; body 16/28 w300; card h3 18/28 + 24/34 sans 500;
#    tab pill 14/22 w500 r16 wash; footer link 12px w500 62%-cream)
#  - evidence/motion-audit.json — 59 transition rules, 6 animation rules,
#    9 keyframes, 7 motion custom properties, duration/easing censuses
#  - evidence/grounding/*.yaml — 12 per-section VISION grounding files
#    (claude-opus-4-8): surfaces w/ parents, per-section type + component
#    inventory, verbatim copy, media creative direction
#  - runs/hubspot-v2/assets/source-chrome.v2.json — offline browser chrome
#    contract + 5 measured OPEN mega/dropdown panels (evidence/chrome-states/)
#
# HubSpot reads as a WARM EDITORIAL SaaS system: a warm off-white canvas
# (#fcfcfa) with cream accents (#f8f5ee), ONE vivid orange (#ff4800) carrying
# every primary action and accent period, serif display headings (HubSpot Serif,
# weight 500, sentence case) over a light sans body (HubSpot Sans at weight 300),
# soft 8px-radius squared buttons (never pills), white cards on hairline borders,
# warm peach/pink gradient art bands, and TWO dark surfaces: a deep-teal
# conversion band (#042729) and the near-black footer (#1f1f1f).

version: "1.1"

brand:
  name: "HubSpot"
  sourceUrl: "https://www.hubspot.com/"
  baseStyle: corporate-saas-warm-editorial
  snapshot:
    value: >-
      A warm, editorial SaaS marketing system on an off-white canvas (#fcfcfa — the
      site's own light-theme background-01 token) accented in cream (#f8f5ee) and led
      by a single vivid orange (#ff4800 — the brand token that fills every primary
      button, checkmark, underline accent, and the wordmark itself). Display headings
      are HubSpot Serif at weight 500, sentence case, frequently closing with an
      orange period accent; the hero runs an 80px serif register over a full-bleed
      photograph with cream ink. Body copy is HubSpot Sans at the LIGHT weight (300),
      16px/28px. Buttons are soft 8px-radius rectangles with a 2px border slot at
      three sizes (8x16 / 12x24 / 16x40): filled orange primary (hover darkens
      #c93700, pressed #9f2800), white secondary outlined 2px orange whose hover
      washes #fcece6, an ink-outlined tertiary, and near-black neutral chrome pills
      only in mega-panel CTAs. Text links are INK (#1f1f1f) — often decorated with an
      orange underline (the site's text-link-underline token) — and card text-arrows
      slide 5px right on hover. Cards are white on hairline rgba(0,0,0,0.11) borders
      at radius 8 (product grid) or 16 (feature carousels, banner panels); media
      wells inside agent cards ride a warm sand (#ece6d9). Section seams and feature
      bands carry warm peach/pink gradient art (accent fills #fcc6b1, #fcc3dc,
      #ffa581). Proof rides real logo vectors, G2 badge art, tabbed case-study
      quotes with serif stat numerals. Two dark surfaces only: the deep-teal
      closing CTA band (#042729, dark-theme background-01) and the near-black
      footer (#1f1f1f) with cream 62%-alpha links.
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-07-10T20:00:00Z", action: created, from: null,
          to: "warm editorial serif-display orange-action system (fresh capture ground truth)",
          by: creation, signalId: null,
          note: "first extraction for the hubspot-v2 lane — evidence-first from the site's own --light-theme/--dark-theme/--cl-* token sheet + JS-off measures + 12 vision groundings" }

meta:
  # P1.1 canonical-tier discipline (validator C14): every canonical value in this
  # file (sizeRem.base, spacing value:, radius value:) refers to the 1440px measured
  # tier unless a tier ladder says otherwise. The measure stage sampled the saved
  # page at 1920/1440/960/375 (evidence/computed-styles.json `tiers`).
  canonicalTier:
    viewport: 1440
    label: base
    note: "sizeRem.base == computed @1440; the source's registers are stable from
      960 through 1920 (container caps at 1080px from 1080w up; only the hero
      display and body step down at 375)"
    measuredTiers: [1920, 1440, 960, 375]
    source: computed
    provenance: [evidence/computed-styles.json]

indexes:
  assetsTagged:     "./assets-tagged.json"
  savedPageHtml:    "../../../screenshots/hubspot-v2/hubspot.html"
  savedPageAssets:  "../../../screenshots/hubspot-v2/hubspot_files/"
  sourceScreenshot: "../../../screenshots/hubspot-v2/hubspot-fullpage.png"
  voice:            "./voice.md"
  layoutLibrary:    "./layout-library.yaml"
  sectionCopy:      "./section-copy.yaml"
  evidenceBundle:   "./evidence/"
  cssFacts:         "./evidence/css-facts.json"
  computedStyles:   "./evidence/computed-styles.json"
  domCensus:        "./evidence/dom-sections.json"
  motionAudit:      "./evidence/motion-audit.json"
  visionGrounding:  "./evidence/grounding/"
  chromeContract:   "../assets/source-chrome.v2.json"
  chromeStates:     "./evidence/chrome-states/"
  interactionStates: "./evidence/interaction-states/"

tokens:
  colors:
    # ── ink / neutrals — the site's own light-theme scale
    ink/primary:      { value: "#1f1f1f", role: "heading + body + nav-link ink (--light-theme-text-01 / link-01 / border-01 / icon-01; measured body color rgb(31,31,31))", status: mapped, source: [saved-css, computed], provenance: [hero, product-grid, testimonial-tabs, navbar] }
    ink/secondary:    { value: "rgba(0, 0, 0, 0.62)", role: "muted ink (--light-theme-text-02): quieter captions, tertiary-button hover fill, pressed-link states", status: mapped, source: saved-css, provenance: [testimonial-tabs, footer] }
    ink/placeholder:  { value: "rgba(0, 0, 0, 0.4)", role: "placeholder / disabled text (--light-theme-text-placeholder-01)", status: mapped, source: saved-css }
    ink/icon:         { value: "#292929", role: "secondary icon ink (--light-theme-icon-02; social-button fill idle)", status: mapped, source: saved-css, provenance: [footer] }
    # ── surfaces (light scheme steps)
    neutral/canvas:   { value: "#fcfcfa", role: "page canvas (--light-theme-background-01; body background measured rgb(252,252,250))", status: mapped, source: [saved-css, computed], provenance: [logo-wall, product-grid, testimonial-tabs] }
    neutral/cream:    { value: "#f8f5ee", role: "warm cream (--light-theme-background-02/03): raised band tint, dark-surface INK (text-01 on dark = this cream), mega-CTA surface family", status: mapped, source: saved-css, provenance: [hero, closing-cta, footer] }
    neutral/card:     { value: "#ffffff", role: "card/panel surface (--light-theme-container-01): product cards, agent cards, banner panel, mega panels, chrome bar", status: mapped, source: saved-css, provenance: [product-grid, agent-carousel, integration-banner, navbar] }
    # ── orange action family — the brand's ONE accent (site brand token)
    action/primary:          { value: "#ff4800", role: "primary CTA fill (--light-theme-button-primary-fill-idle == --light-theme-hubspot-brand-01 == text-brand-01 == border-brand-01 == checkmark fill: buttons, wordmark, checkmarks, underline accents, heading period accents)", status: mapped, source: [saved-css, computed], provenance: [hero, product-grid, closing-cta, navbar] }
    action/primary-hover:    { value: "#c93700", role: "primary CTA hover fill (--light-theme-button-primary-fill-hover / hover-brand-01); secondary-button hover ink", status: mapped, source: saved-css, provenance: [hero] }
    action/primary-active:   { value: "#9f2800", role: "primary CTA pressed fill (--light-theme-button-primary-fill-pressed / pressed-brand-01)", status: mapped, source: saved-css, provenance: [hero] }
    action/secondary-wash:   { value: "#fcece6", role: "secondary (outlined) button hover wash (--light-theme-button-secondary-fill-hover)", status: mapped, source: saved-css, provenance: [hero] }
    action/secondary-pressed: { value: "#fcc6b1", role: "secondary button pressed fill (--light-theme-button-secondary-fill-pressed — the peach accent-fill-02 step)", status: mapped, source: saved-css, provenance: [hero] }
    action/neutral:          { value: "#1f1f1f", role: "neutral filled control (--light-theme-button-tertiary-fill-idle): skip-link pill, dark utility fills; hover rgba(0,0,0,0.62), pressed rgba(0,0,0,0.47)", status: mapped, source: saved-css, provenance: [navbar] }
    state/focus:             { value: "#2f7579", role: "focus ring + 'free' semantic teal (--light-theme-focus-01 / free-01 / border-highlight-01)", status: mapped, source: saved-css }
    state/disabled-fill:     { value: "rgba(0, 0, 0, 0.02)", role: "disabled button fill (--light-theme-disabled-02; label rgba(0,0,0,0.2) disabled-01)", status: mapped, source: saved-css }
    state/error:             { value: "#d9002b", role: "error semantic (--light-theme-error-01; wash #fcc5be)", status: mapped, source: saved-css }
    state/success:           { value: "#00823a", role: "success semantic (--light-theme-success-01; wash #bde7cb)", status: mapped, source: saved-css }
    # ── warm art family — accent fills/decorations (gradient bands, seams, chips)
    accent/peach:      { value: "#fcc6b1", role: "peach accent fill (--light-theme-accent-fill-02 = badge-brand-fill-01): gradient-band art, secondary-pressed, loading fills", status: mapped, source: [saved-css, vision], provenance: [product-grid, agent-carousel] }
    accent/pink:       { value: "#fcc3dc", role: "pink accent (accent-decoration-08 / background-accent-03): gradient-band art partner", status: mapped, source: [saved-css, vision], provenance: [product-grid, agent-carousel] }
    accent/coral:      { value: "#ffa581", role: "coral decoration step (--light-theme-accent-decoration-02): warm gradient midpoints", status: mapped, source: [saved-css, vision], provenance: [agent-carousel] }
    accent/sand:       { value: "#ece6d9", role: "sand media-well fill inside cards (--light-theme-accent-fill-05; vision read #f2ece4 on the agent-card wells)", status: mapped, source: [saved-css, vision], provenance: [agent-carousel] }
    accent/sage:       { value: "#b9cdbe", role: "sage accent fill (--light-theme-accent-fill-04 / background-accent-01)", status: mapped, source: saved-css }
    accent/stone:      { value: "#cfcccb", role: "stone neutral fill (--light-theme-accent-fill-01 / neutral-background-01 / hover-03)", status: mapped, source: saved-css }
    accent/lilac:      { value: "#d7cdfc", role: "lilac accent fill (--light-theme-accent-fill-06; platform-illustration layer family)", status: mapped, source: [saved-css, vision], provenance: [platform-carousel] }
    accent/aqua:       { value: "#b2e9eb", role: "aqua accent fill (--light-theme-accent-fill-07)", status: mapped, source: saved-css }
    # ── dark scheme (the site's own dark-theme scope — two REAL dark surfaces)
    surface/deep-teal:     { value: "#042729", role: "deep-teal dark band (--dark-theme-background-01 / container-01: the closing CTA band; vision read #0a2a28)", status: mapped, source: [saved-css, vision], provenance: [closing-cta] }
    surface/deep-teal-raised: { value: "#093436", role: "raised step on the deep teal (--dark-theme-background-02/03)", status: mapped, source: saved-css, provenance: [closing-cta] }
    surface/footer:        { value: "#1f1f1f", role: "near-black footer band (--light/dark-theme-background-footer-01; measured footer bg rgb(31,31,31))", status: mapped, source: [saved-css, computed], provenance: [footer] }
    # ── interaction / borders
    text/link:             { value: "#1f1f1f", role: "text links are INK (--light-theme-link-01) — never orange text; hover holds ink (hover-link-01) and rides underline/arrow devices", status: mapped, source: saved-css, provenance: [product-grid, integration-banner] }
    text/link-deep:        { value: "#124548", role: "mega-panel link ink (--light-theme-link-02; measured mega panel link rgb(18,69,72))", status: mapped, source: [saved-css, computed], provenance: [navbar] }
    text/link-underline:   { value: "#ff4800", role: "the ORANGE underline decoration under ink text links (--light-theme-text-link-underline-01) — signature device", status: mapped, source: saved-css, provenance: [integration-banner, testimonial-tabs] }
    border/hairline:       { value: "rgba(0, 0, 0, 0.11)", role: "hairline card/divider border (--light-theme-border-03 / divider-01; product cards, banner panel, testimonial card, mega CTA border)", status: mapped, source: [saved-css, computed], provenance: [product-grid, integration-banner, testimonial-tabs] }
    border/strong:         { value: "rgba(0, 0, 0, 0.47)", role: "strong hairline (--light-theme-border-02; mega-panel top rule measured 1px rgba(0,0,0,0.47))", status: mapped, source: [saved-css, computed], provenance: [navbar] }
    overlay/hover-wash:    { value: "rgba(0, 0, 0, 0.05)", role: "wash on light surfaces (--light-theme-hover-01; tab pills idle bg, round-control hover)", status: mapped, source: [saved-css, computed], provenance: [testimonial-tabs, platform-carousel] }
    overlay/scrim:         { value: "rgba(0, 0, 0, 0.81)", role: "overlay scrim (--light-theme-overlay-01 / hover-inverse-01)", status: mapped, source: saved-css }
    # ── canonical render-role ALIASES — the shared renderers resolve these EXACT names.
    surface/primary:            { value: "#fcfcfa", role: "ALIAS of neutral/canvas — canonical page-canvas role", status: mapped, source: saved-css, provenance: [logo-wall, product-grid] }
    surface/panel:              { value: "#ffffff", role: "ALIAS of neutral/card — canonical panel/card role (white cards on the warm canvas)", status: mapped, source: saved-css, provenance: [product-grid, agent-carousel] }
    surface/raised:             { value: "#f8f5ee", role: "ALIAS of neutral/cream — canonical raised-light role (warm cream)", status: mapped, source: saved-css }
    surface/inverse:            { value: "#042729", role: "ALIAS of surface/deep-teal — canonical dark band role (closing CTA)", status: mapped, source: saved-css, provenance: [closing-cta] }
    surface/inverse-strong:     { value: "#1f1f1f", role: "ALIAS of surface/footer — the near-black chrome dark (footer band)", status: mapped, source: saved-css, provenance: [footer] }
    accent/highlight:           { value: "#ff4800", role: "ALIAS of action/primary — canonical accent role (the one orange; legal on light AND dark surfaces: buttons keep the same fill family in both schemes)", status: mapped, source: saved-css, provenance: [hero, closing-cta] }
    accent/highlight-on-inverse: { value: "#ff4800", role: "accent ON dark surfaces — the orange family is scheme-stable (dark-theme button-primary-fill-idle is the same #ff4800)", status: mapped, source: saved-css, provenance: [closing-cta] }
    text/on-primary:            { value: "#1f1f1f", role: "ALIAS of ink/primary — canonical ink-on-light role", status: mapped, source: saved-css }
    text/on-primary-muted:      { value: "rgba(0, 0, 0, 0.62)", role: "ALIAS of ink/secondary — canonical muted-ink-on-light role (--light-theme-text-02)", status: mapped, source: saved-css }
    text/on-inverse:            { value: "#f8f5ee", role: "canonical ink-on-dark role (--dark-theme-text-01 — the CREAM, not pure white; hero-on-photo + closing band + footer headings all measured rgb(248,245,238))", status: mapped, source: [saved-css, computed], provenance: [hero, closing-cta, footer] }
    text/on-inverse-muted:      { value: "rgba(255, 255, 255, 0.62)", role: "canonical muted-ink-on-dark role (--dark-theme-text-02; footer links measured rgba(255,255,255,0.62))", status: mapped, source: [saved-css, computed], provenance: [footer] }
    color/photo-tint:           { value: "#55453e", role: "sampled average of the photographic hero band's ink-bearing region (the copy-region tone of the tinted art) — the band's fallback canvas while the photo paints; generic photographic-surface tint role", status: mapped, source: screenshot, provenance: [hero] }
    text/on-accent:             { value: "#ffffff", role: "label color on the orange primary fill (--light-theme-button-primary-text-color / text-on-color-01)", status: mapped, source: saved-css, provenance: [hero, closing-cta] }
    text/ghost-on-primary:      { value: "rgba(0, 0, 0, 0.05)", role: "canonical ghost-on-light role — HubSpot has NO ghost-type device; bound to the measured light hover wash so any fallback stays on-palette", status: mapped, source: saved-css }
    border/hairline-on-primary: { value: "rgba(0, 0, 0, 0.11)", role: "ALIAS of border/hairline — canonical hairline-on-light role", status: mapped, source: saved-css, provenance: [product-grid] }
    border/hairline-on-inverse: { value: "rgba(255, 255, 255, 0.11)", role: "hairline-on-dark role (--dark-theme divider family rgba(255,255,255,0.0784–0.11): footer social-row rules)", status: mapped, source: saved-css, provenance: [footer] }
  type:
    # FLAT role shape so each role can declare a loadable renderProxy.
    # HubSpot Sans + HubSpot Serif are the brand's OWN faces, captured as woff2 in
    # this lane (screenshots/hubspot-v2/hubspot_files/fonts/) and SELF-HOSTED via
    # the selfHostedFonts registry (assets/fonts/). renderProxy declares the
    # measured fallback: Lexend Deca appears in the source's own body stack
    # ("HubSpot Sans","Lexend Deca",…); Source Serif 4 proxies the serif when the
    # local faces cannot load.
    # Weights follow the source @font-face masters: Sans Book = 300–400,
    # Sans Medium = 500–600, Serif Book = 300 (also the page-header display face),
    # Serif Medium = 400–600. Headings measure w500; body measures w300.
    display-hero:
      { family: "HubSpot Serif", renderProxy: "Source Serif 4", sizeRem: { base: 5, tablet: 5, mobileL: 3, mobile: 3 }, lineHeight: "1.19em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 80, source: computed }, w1440: { px: 80, source: computed }, w960: { px: 80, source: computed }, w375: { px: 48, source: computed } },
        note: "hero h1 measured 80px/95px @1440 (the page-header face maps every weight onto the Serif BOOK master — hence weight 400 here so the self-hosted Book file renders it); 48px @375; heading closes with an orange period accent" }
    h1:
      { family: "HubSpot Serif", renderProxy: "Source Serif 4", sizeRem: { base: 3, tablet: 3, mobileL: 2.5, mobile: 2.5 }, lineHeight: "1.15em", weight: 500, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 48, source: computed }, w1440: { px: 48, source: computed }, w960: { px: 48, source: computed }, w375: { px: 40, source: saved-css } },
        note: "the large section register: platform h2 + closing-cta h2 measured 48px/55.4px serif w500 @1440 (== the site's own --cl-font-size-h1 3rem); 2.5rem small register below (--cl-font-size-h1-small)" }
    h2:
      { family: "HubSpot Serif", renderProxy: "Source Serif 4", sizeRem: { base: 2.5, tablet: 2.5, mobileL: 2, mobile: 2 }, lineHeight: "1.1em", weight: 500, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 40, source: computed }, w1440: { px: 40, source: computed }, w960: { px: 40, source: computed }, w375: { px: 32, source: saved-css } },
        note: "the standard section heading: product/agent/case-study h2 measured 40px/44px serif w500 @1440 (== --cl-font-size-h2 2.5rem; 2rem small register); platform slide h3 rides this same 40px serif register" }
    h3:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 1.5, tablet: 1.5, mobileL: 1.375, mobile: 1.375 }, lineHeight: "1.42em", weight: 500, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 24, source: computed }, w1440: { px: 24, source: computed }, w960: { px: 24, source: saved-css }, w375: { px: 22, source: saved-css } },
        note: "sans card heading, large register: agent-card h3 measured 24px/34px sans w500 (== --cl-font-size-h3 1.5rem)" }
    h4:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 1.375, tablet: 1.375, mobileL: 1.125, mobile: 1.125 }, lineHeight: "1.45em", weight: 500, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 22, source: computed }, w1440: { px: 22, source: computed }, w960: { px: 22, source: saved-css }, w375: { px: 18, source: saved-css } },
        note: "standalone sans statement heading: logo-strip '299,000+ customers…' measured 22px/32px w500 @1440; badge-row + integration-banner headings ride it (== --cl-font-size-h4 1.375rem)" }
    h5:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 1.125, tablet: 1.125, mobileL: 1, mobile: 1 }, lineHeight: "1.56em", weight: 500, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 18, source: computed }, w1440: { px: 18, source: computed }, w960: { px: 18, source: saved-css }, w375: { px: 16, source: saved-css } },
        note: "compact card heading: product-grid card h3 measured 18px/28px sans w500 (== --cl-font-size-h5 1.125rem)" }
    h6:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 1, tablet: 1, mobileL: 1, mobile: 1 }, lineHeight: "1.5em", weight: 500, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 16, source: saved-css }, w1440: { px: 16, source: saved-css }, w960: { px: 16, source: saved-css }, w375: { px: 16, source: saved-css } },
        note: "smallest heading register (--cl-font-size-h6 1rem); footer column headings ride a 14px chrome variant (see footer.measured.heading)" }
    eyebrow:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 0.875, tablet: 0.875, mobileL: 0.875, mobile: 0.875 }, lineHeight: "1.57em", weight: 500, letterSpacing: "0.04em", case: uppercase,
        tiers: { w1920: { px: 14, source: computed }, w1440: { px: 14, source: computed }, w960: { px: 14, source: computed }, w375: { px: 14, source: computed } },
        note: "uppercase microlabel — hero tagline measured 14px/22px w500 uppercase (cream on the hero photo; == --cl-font-size-microheading 0.875rem, --cl-font-weight-microheading medium). The OTHER eyebrow register is the bordered PILL (sentence case 16px w300 in a 1px hairline box, radius 8 — 'Powered by AI', 'Case Studies'): see blocks.header.slots.eyebrow" }
    body:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 1, tablet: 1, mobileL: 1, mobile: 0.9 }, lineHeight: "1.75em", weight: 300, case: sentence,
        tiers: { w1920: { px: 16, source: computed }, w1440: { px: 16, source: computed }, w960: { px: 16, source: computed }, w375: { px: 14.4, source: computed } },
        note: "body measured 16px/28px w300 (the Sans BOOK master; --cl-font-weight-p-medium = light 300) — LIGHT body is a brand signature; 14.4px @375" }
    body-lg:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 1.125, tablet: 1.125, mobileL: 1, mobile: 1 }, lineHeight: "1.6em", weight: 300, case: sentence,
        tiers: { w1920: { px: 18, source: saved-css }, w1440: { px: 18, source: saved-css }, w960: { px: 18, source: saved-css }, w375: { px: 16, source: saved-css } },
        note: "large body register (--cl-font-size-large / p-large 1.125rem, weight light): hero supporting paragraph (vision read ~20px on the retina crop; the token register is 18px)" }
    body-sm:
      { family: "HubSpot Sans", renderProxy: "Lexend Deca", sizeRem: { base: 0.875, tablet: 0.875, mobileL: 0.875, mobile: 0.875 }, lineHeight: "1.57em", weight: 300, case: sentence,
        tiers: { w1920: { px: 14, source: computed }, w1440: { px: 14, source: computed }, w960: { px: 14, source: saved-css }, w375: { px: 14, source: saved-css } },
