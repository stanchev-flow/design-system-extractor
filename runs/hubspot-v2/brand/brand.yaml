    confidence: high
  pricing-card:
    notObserved: true
    note: "no pricing device on the captured homepage (pricing lives on its own route)"
  banner:
    origin: extracted
    use: conversion-moments
    anatomy: "inset 16px-radius white panel on the canvas: sans statement heading + orange-underlined ink link LEFT, colorful app-logo collage RIGHT (grounding section-06)"
    provenance: [integration-banner]
    confidence: high
  modal:
    notObserved: true
    note: "no modal renders on the captured page (cookie-banner embed excluded from brand evidence)"
  dropdown-menu:
    origin: extracted
    anatomy: "nav mega panels: full-width white panels under the bar (measured 1400px wide, 8px radius on compact dropdowns, 1px rgba(0,0,0,0.47) top rule), link ink #124548 deep-teal 14px w500 pad 8x15; product tiles w/ descriptions + neutral CTA buttons (#fcfcfa fill, 2px rgba(0,0,0,0.11) border); Solutions panel adds a left sidebar of pill tabs + a promo aside card"
    motion: { panel: "opacity .2s ease-out in / .2s ease-in out + visibility .3s (.1s delay)", chevron: "transform .3s ease (--global-nav-dropdown-toggle-transition)", source: "motion-audit + chrome contract megaPanel.motion" }
    provenance: [navbar]
    confidence: high
  breadcrumb:
    notObserved: true
    note: "no breadcrumb on the captured homepage"
  pagination:
    origin: extracted
    use: carousel-progress
    anatomy: "carousel dot rail: ~8px dots, active dot ink-filled, inactive light gray (platform carousel, logo rail)"
