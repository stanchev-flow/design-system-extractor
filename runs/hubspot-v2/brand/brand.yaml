# ── self-hosted font registry ──────────────────────────────────────────────────────
# The capture DOWNLOADED the brand's own woff2 masters from the page's @font-face
# URLs (screenshots/hubspot-v2/hubspot_files/fonts/) and they are copied into
# assets/fonts/. Weight mapping follows the source's own @font-face blocks:
#   HubSpot Sans  — Book master w300–400, Medium master w500–600
#   HubSpot Serif — Book master w300 + the page-header display face (all weights),
#                   Medium master w400–600
# display-hero is authored at weight 400 mapped to the SERIF BOOK master because
# the source's "HubSpot Serif Page Header Human" face maps every hero weight onto
# the Book file — that is the glyph weight the hero actually shows.
selfHostedFonts:
  - family: HubSpot Serif
    faces:
      - weight: 400
        files: [HubSpotSerif-Book.woff2]
      - weight: 500
        files: [HubSpotSerif-Medium.woff2]
      - weight: 600
        files: [HubSpotSerif-Medium.woff2]
  - family: HubSpot Sans
    faces:
      - weight: 300
        files: [HubSpotSans-Book.woff2]
      - weight: 400
        files: [HubSpotSans-Book.woff2]
      - weight: 500
        files: [HubSpotSans-Medium.woff2]
      - weight: 600
        files: [HubSpotSans-Medium.woff2]

