# BRAND SIGNATURES (pass1 2026-07; brand-schema §4.7) — the 3-5 moves that make
# HubSpot recognizable, each a MACHINE-CHECKABLE always/never rule verified by
# brand_pipeline/signature_audit.py on every gated page. Generic kinds, brand
# values; every entry cites the evidence that licenses it.
signatures:
  - id: action-orange-scope
    kind: accent-scope
    mode: never
    claim: >-
      The action orange (#ff4800 family) is a CONTROL ink: button fills, secondary
      button ink/borders, eyebrow accents, link glyphs and the mark. It never paints
      body copy, headings, or section surfaces — accent-wash bands ride the SEPARATE
      warm peach family, never the action orange.
    check:
      colors: ["#ff4800", "#c93700"]
      allowedRoles: [action, link, glyph, eyebrow, mark]
      maxPaintSharePct: 2.0
    evidence:
      - "computed-styles.json actionGroups: primary fill rgb(255,72,0), hover #c93700 (buttons.primary/secondary facts)"
      - "grounding sections 01/03/05: filled-primary + outlined action pairs; no orange body/heading ink anywhere in the census"
      - "tokens.colors avoid-orange-text rule (saved-css): orange is fills/underlines/marks/accents only"
      - "measured accent paint share: replica 0.46% of page paint, gallery heroes 0.27-0.90% — budget 2.0% is ~4x the replica share"
    confidence: high
    source: [computed, saved-css, vision]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block — authored from existing captured evidence, no re-extraction" }
  - id: serif-display-sans-body
    kind: type-treatment
    mode: always
    claim: >-
      Display ranks speak the serif (HubSpot Serif / proxy Source Serif 4); running
      text and controls speak the sans (HubSpot Sans / proxy Lexend Deca). The serif
      voice IS the brand's editorial register — a sans display or serif body breaks it.
    check:
      probes:
        - { "on": display, familyIncludesAny: ["HubSpot Serif", "Source Serif"] }
        - { "on": body, familyIncludesAny: ["HubSpot Sans", "Lexend Deca"] }
        - { "on": button, familyIncludesAny: ["HubSpot Sans", "Lexend Deca"] }
    evidence:
      - "computed-styles.json headings: h1 'HubSpot Serif Page Header Human' 80px; body 'HubSpot Sans' 16px"
      - "tokens.type: display-hero/h1/h2 family HubSpot Serif; h3-h6/body/eyebrow HubSpot Sans"
    confidence: high
    source: [computed, saved-css]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block" }
  - id: rounded-8-controls
    kind: shape-motif
    mode: always
    claim: >-
      Controls and cards corner at 8px (panels 16px) — soft rectangles, NEVER pills.
      The 8px radius is the working surface rounding across buttons, cards and inputs.
    check:
      buttons: { radiusPx: 8, tolerancePx: 1.5 }
      neverPill: true
    evidence:
      - "tokens.radius: button/card 0.5rem, panel 1rem, small 0.25rem (computed census)"
      - "buttons.primary/secondary/tertiary radius 0.5rem (saved-css --cl-border-radius-medium)"
      - "avoid-pill-buttons rule: fully-rounded pill CTAs are off-brand (only tab chips/carousel controls curve further)"
    confidence: high
    source: [computed, saved-css]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block" }
  - id: deep-teal-dark-family
    kind: surface-habit
    mode: never
    claim: >-
      Dark surfaces come ONLY from the licensed dark family — deep teal #042729 (+
      raised #093436), the near-black footer #1f1f1f, and the photo-hero underlay
      #55453e. Never a generic black, navy, or any other dark hue as a section surface.
    check:
      darkMaxLuminance: 0.25
      darkAllowedColors: ["#042729", "#093436", "#1f1f1f", "#55453e"]
    evidence:
      - "tokens.surfaces: inverse #042729, inverse-strong #1f1f1f, photo-hero #55453e (schemeMode Inverse)"
      - "surfaceGrammar.pageRhythm changelog: canvas family everywhere, dark only at section 10 (teal) and the footer (near-black)"
      - "replica section census @1440: sec-9 rgb(4,39,41), sec-10 rgb(31,31,31), hero underlay rgb(85,69,62) — no other dark section paint"
    confidence: high
    source: [computed, vision]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block" }

