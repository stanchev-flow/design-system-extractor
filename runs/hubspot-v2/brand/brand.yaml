  # fix1 2026-07 item-12a/c/d: EXPLICIT utility-TIER contract (brand-schema
  # `navbar.utilityTier`). The renderer gates the distinct thin bar on THIS key —
  # never on `twoTier` alone (Remote also declares twoTier: true but measured
