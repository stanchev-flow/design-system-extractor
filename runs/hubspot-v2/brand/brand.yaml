    # carries 3px/12px/48px/1rem literals from cookie-banner embed noise — not
    # brand rungs.
    small:  { value: "0.25rem", var: "--cl-border-radius-small / --cl-border-radius-input (4px)", role: "photos inside testimonial cards, form inputs", status: mapped, source: [saved-css, vision] }
    button: { value: "0.5rem",  var: "--cl-border-radius-medium (8px); measured on every cl-button + the mega panel", role: "ALL buttons at every size + compact cards (product grid) + mega dropdown panels + eyebrow pills", status: mapped, source: [saved-css, computed] }
    card:   { value: "0.5rem",  var: "--cl-border-radius-medium / --cl-border-radius-container-small (8px)", role: "compact card plates: product cards, testimonial card frame", status: mapped, source: [saved-css, vision] }
    panel:  { value: "1rem",    var: "--cl-border-radius-container / -container-medium (16px)", role: "large panels: agent cards, integration banner card, tab pills (measured r16)", status: mapped, source: [saved-css, computed] }
    circle: { value: "50%",     var: "border-radius: 50% (radiusCensus 10x)", role: "round carousel controls (48px --cl-carousel-controls-button-size), avatar crops", status: mapped, source: [saved-css, computed] }
  shadow:
    # Cards are FLAT — idle AND hover. Hover feedback is a background tint + a
