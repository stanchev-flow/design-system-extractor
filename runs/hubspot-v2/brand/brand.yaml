    anatomy: "THREE registers: (1) logo rail (static spaced row at rest, round controls in DOM); (2) platform showcase — copy+illustration frames swapped by round neutral prev/next (48px, --cl-carousel-controls-button-size) + 3-dot rail, prev dimmed at first frame; (3) agent track — infinite AUTOPLAY edge-cut card track w/ round white prev/next + pause control"
