    surfaceIntent: surface/primary
    useCase: "Award proof: 22px sans heading LEFT ('Voted #1 in 526 G2 Reports') beside a row of 6 G2 badge images (~90px)."
    whenToUse: "Third-party validation."
    slots:
      - { name: "heading", type: content, role: "sans heading (left)" }
      - { name: "media",   type: media,   role: "media row — 6 G2 award badge marks (~90px, right)", assets: [ "048-badge-leader-small-business.png", "049-badge-most-implementable.png", "050-badge-best-relationships-small-business.png", "051-badge-best-support-enterprise.png", "052-badge-best-results-mid-market.png", "053-badge-best-usability-enterprise.png" ] }
