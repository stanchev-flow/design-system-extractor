# CONTEXTUAL header-alignment grammar (brand-schema §4.4b). The observed rule:
# a header standing alone atop a stacked section centers ONLY in the hero and
# platform sections; every rail/split header anchors left with the CTA riding the
# rail's far right.
layoutGrammar:
  headerContext:
    splitColumn:
      anchor: left
      counterweight: media
      evidence: "all 5 split patterns anchor the copy column left with a media/cards counterweight (layout-library: product-grid-split, integration-collage-banner, case-study-header-rail, testimonial-tab-stats, award-badge-row: alignment.value=left + counterweight media/cards)"
    standaloneStack:
      anchor: centered
      evidence: "hero + logo strip + platform header center block+text (grounding sections 01/02/03: alignment center); the agent-carousel and closing-cta standalone headers anchor left as explicit pattern facts, which outrank this default by resolution order (AS-18)"
    confidence: high
    source: [vision, computed]
    scope: design-language
    changelog:
      - { ts: "2026-07-10T20:00:00Z", action: created, from: null, to: "splitColumn=left / standaloneStack=centered", by: creation, signalId: null, note: "derived from the 10 grounded patterns' measured header alignment by layout context" }
  # fix2 2026-07 (brand-schema §4.4f): measured multi-action row layout. JS-off
  # computed geometry on the capture @1440: hero .wf-page-header_content-ctas gap
  # 16px mt 40px (centered hero context); powered-by-ai .cl-cta-group gap 16px
  # wrap, left, body→group seam 40px; closing .wf-elevated-cta__ctas gap 24px
  # (per-pattern override on closing-cta-dark), mt 40px, left. All three seams
  # land the same 40px rung ⇒ marginAbove rides the ladder (body-to-cta 2.5rem).
  actionGroup:
    gap: 1rem
    orientation: row
    wrap: wrap
    align: start
    marginAbove: ladder
    registers: [primary, secondary]
    source: computed
    provenance: [hero, powered-by-ai, closing-cta]
    confidence: high
    changelog:
      - { ts: "2026-07-13T10:30:00Z", action: created, from: null, to: "gap 1rem / wrap / start / marginAbove ladder", by: fix2-action-groups, signalId: null, note: "playwright computed on capture: hero+pbai groups gap 16, closing 24 (pattern override); every body→group seam 40px" }

buttons:
  renderHint: { useFilledButton: true, note: "Renderer MUST emit real FILLED buttons. HubSpot primary CTAs are solid orange 8px-radius rectangles; text links are a separate ink device with an orange underline. THREE measured size registers shared by every family: small 14px/22 pad 8x16 h42 (nav CTAs), medium 16px/28 pad 12x24 h56 (section CTAs — the canonical register authored below), large 18px/32 pad 16x40 h68 (hero CTAs)." }
  primary:
    style: filled
    bg: "#ff4800"              # --light-theme-button-primary-fill-idle (identical in the dark scheme)
    bgHover: "#c93700"         # --light-theme-button-primary-fill-hover
    fgHover: "#ffffff"         # label stays white through the darken
    bgPressed: "#9f2800"       # --light-theme-button-primary-fill-pressed
    bgDisabled: "rgba(0, 0, 0, 0.02)"   # --light-theme-disabled-02 (label rgba(0,0,0,0.2))
    fg: "#ffffff"              # --light-theme-button-primary-text-color
    border: "2px solid transparent"     # --cl-border-width-heavy slot keeps geometry stable across variants
    radius: "0.5rem"           # --cl-border-radius-medium (8px) — measured on every button
    padding: "0.75rem 1.5rem"  # medium register (12x24); small 8x16, large 16x40
    height: "3.5rem"           # 56px measured on every medium button (small 42, large 68)
    font: "HubSpot Sans"
    weight: 500
    sizeRem: 1                 # 16px medium register @1440
    focus: "outline 2px solid #2f7579; outline-offset 2px"   # --light-theme-focus-01
    confidence: high
    source: [saved-css, computed, vision]
    provenance: [hero, product-grid, closing-cta, navbar]
    note: "Measured .cl-button.-primary: bg rgb(255,72,0), white label, r8, border 2px transparent; hover/pressed from the site's own light-theme button tokens; identical fill family on dark surfaces (dark-theme tokens repeat #ff4800/#c93700/#9f2800)."
  secondary:
    style: outline
    bg: "#ffffff"                 # --light-theme-button-secondary-fill-idle
    border: "2px solid #ff4800"   # --light-theme-button-secondary-border; measured 2px solid rgb(255,72,0)
    fg: "#ff4800"                 # measured 'Get started free' color rgb(255,72,0)
    bgHover: "#fcece6"            # --light-theme-button-secondary-fill-hover (soft orange wash)
    fgHover: "#c93700"            # --light-theme-button-secondary-text-color-hover
    bgPressed: "#fcc6b1"          # --light-theme-button-secondary-fill-pressed (peach)
    radius: "0.5rem"
    padding: "0.75rem 1.5rem"
    height: "3.5rem"              # 56px measured (medium register)
    font: "HubSpot Sans"
    weight: 500
    sizeRem: 1
    onInverse: { border: "2px solid #f8f5ee", fg: "#f8f5ee", bg: "transparent", bgHover: "rgba(0, 0, 0, 0.2)", fgHover: "#f8f5ee", note: "dark-surface variant (--dark-theme-button-secondary-border/-text: cream outline on the deep-teal band — grounding section-10 outlined white); hover affordance is the dark bg wash, the cream label HOLDS (without fgHover the family's light-surface hover ink #c93700 leaks in at 3.29:1 on the deep teal)" }
    confidence: high
    source: [saved-css, computed, vision]
    provenance: [hero, product-grid, closing-cta, navbar]
    note: "'Get started free' family — white fill + 2px orange border + orange label on light; cream outline on dark bands."
  tertiary:
    style: outline-ink
    bg: "transparent"
    border: "2px solid #1f1f1f"   # measured 'Explore Breeze Agents' (.cl-button.-tertiary-outline): 2px rgb(31,31,31)
    fg: "#1f1f1f"
    bgHover: "rgba(0, 0, 0, 0.05)"   # hover wash (--cl-color-hover-01)
    fgHover: "#1f1f1f"
    bgPressed: "rgba(0, 0, 0, 0.06)"
    radius: "0.5rem"
    padding: "0.75rem 1.5rem"
    height: "3.5rem"           # 56px measured ('Explore Breeze Agents' medium register)
    font: "HubSpot Sans"
    weight: 500
    sizeRem: 1
    confidence: high
    source: [saved-css, computed]
    provenance: [agent-carousel, case-study-header]
    note: "the quiet ink-outlined family ('Explore Breeze Agents', 'See all case studies'); the FILLED near-black neutral (#1f1f1f fill, white label — skip-link + tertiary-fill tokens) exists as its chrome sibling."
  textCta:
    style: text-link-arrow
    fg: "#1f1f1f"              # --light-theme-link-01 — ink, NEVER orange text
    fgHover: "#1f1f1f"         # hover holds ink (--light-theme-hover-link-01); the device moves instead
    decoration: "orange underline (--light-theme-text-link-underline-01 #ff4800) on standing links; card text-arrows are clean w/ a trailing arrow glyph that slides 5px right on hover"
    radius: "0"
    font: "HubSpot Sans"
    weight: 500
    sizeRem: 1
    # fix2 2026-07: the trailing glyph is the site's own sprite arrow, not a Unicode
    # character — every .cl-textLink renders <use href="#cl-icon-next"> (32×32 symbol)
    # in a 16px .cl-textLink-icon.-small box. Harvested to assets/icon-next.svg
    # (viewBox corrected 24->32 to match the sprite symbol's own).
    glyph: { asset: icon-next.svg, size: 1rem, source: computed }
    confidence: high
    source: [saved-css, computed, vision]
    provenance: [product-grid, integration-banner, testimonial-tabs]
    note: "'Learn more →' card links (arrow translateX(5px) hover); 'See all app integrations' / 'Read full case study' standing links w/ the orange underline device."

contracts:
  primitives: "../../../brand_pipeline/contracts/primitives.yaml"
  blocks:     "../../../brand_pipeline/contracts/blocks.yaml"

primitives:
  heading:
    origin: extracted
    use: always
    rules: [ "display headings are HubSpot Serif weight 500 sentence-case (the hero rides the Serif Book master at its 80px register); card headings swap to HubSpot Sans 500 — hierarchy comes from SIZE + FAMILY, never weight jumps or caps", "landmark headings may close with an orange period accent (hero, closing CTA)" ]
    provenance: [hero, platform-carousel, product-grid, closing-cta]
    confidence: high
  eyebrow:
    origin: extracted
    use: always
    rules: [ "TWO eyebrow registers: (1) uppercase 14px w500 microlabel (hero, cream on photo); (2) bordered PILL — sentence-case 16px w300 label in a 1px hairline box, radius 8 ('Powered by AI', 'Case Studies'), often joined by a dotted rule to a right-aligned CTA" ]
    provenance: [hero, product-grid, case-study-header, agent-carousel]
    confidence: high
  paragraph:
    origin: extracted
    use: always
    rules: [ "HubSpot Sans LIGHT (300), 16px/28px, ink #1f1f1f on light surfaces; cream #f8f5ee on photo/dark bands; 18px large register in the hero" ]
    provenance: [hero, product-grid, agent-carousel]
    confidence: high
  button:
    origin: extracted
    use: always
    variant: filled-primary
    rules: [ "PRIMARY actions are FILLED orange (#ff4800) 8px-radius rectangles with white labels — never typographic; secondary is white w/ 2px orange border + orange label (cream outline on dark bands); tertiary is ink-outlined; all buttons carry a 2px border slot and hug content at three insets (8x16/12x24/16x40)" ]
    provenance: [hero, product-grid, closing-cta, navbar]
    confidence: high
  link:
    origin: extracted
    use: text-links-only
    rules: [ "text links are INK (#1f1f1f) w500 — orange appears as the UNDERLINE decoration or the arrow affordance, never as link text color; card text-arrows slide the arrow 5px right on hover" ]
    provenance: [product-grid, integration-banner, testimonial-tabs]
    confidence: high
  image:
    origin: extracted
    use: always
    rules: [ "photography = warm human workplace scenes (full-bleed hero w/ dark tint; portrait case-study shots at 4px radius); product story = layered isometric illustration + UI mockups on sand media-wells; icons = orange line-icons ~24px; proof = real logo vectors + badge art" ]
    provenance: [hero, platform-carousel, agent-carousel, testimonial-tabs]
    confidence: high
  logo:
    origin: extracted
    use: always
    rules: [ "customer logos are REAL brand vectors (~30px tall, mixed full-color/mono as shipped) in one spaced row; award badges are ~90px art images; never text names" ]
    provenance: [logo-wall, badge-row]
    confidence: high
  input:
    origin: extracted
    use: forms
    rules: [ "4px-radius boxed fields (--cl-border-radius-input); focus ring teal #2f7579; error #d9002b w/ #fcc5be wash (token evidence only — no form renders on the captured homepage)" ]
    provenance: [popup-forms]
    confidence: medium

blocks:
  # C2 coverage: every contract block type attempted — extracted evidence or an
  # explicit notObserved marker (source: grounding components[] + dom/css census).
  header:
    origin: extracted
    slots:
      eyebrow: { use: optional, note: "uppercase microlabel OR bordered pill register (see primitives.eyebrow)" }
      heading: { use: require }
      cta:     { use: optional, note: "filled orange primary (+ optional secondary)" }
    provenance: [hero, product-grid, case-study-header]
    confidence: high
  content-block:
    origin: extracted
    use: always
    slots:
      eyebrow: { use: optional }
      heading: { use: require }
      body:    { use: optional }
      actions: { use: optional }
    provenance: [hero, product-grid, agent-carousel, closing-cta]
    confidence: high
    note: "eyebrow → heading → body → actions stacks (relational ladder: 24/32/56 at 1440)."
  card:
    origin: extracted
    use: always
    anatomy: "white plate on a hairline rgba(0,0,0,0.11) border; TWO radius registers: compact 8px (product cards) and large 16px (agent cards, banner panel); FLAT idle AND hover — hover = wash tint + 1px ring, no elevation; internal stack: icon/media → heading (sans 500) → body/checklist → ink text-arrow"
    variants:                    # C10 coverage — the observed card registers
      - { id: icon-checklist, note: "product card: 24px orange line icon + 18px sans heading row → 2-item checkmark list (orange checks, 14px light body) → 'Learn more' text-arrow (grounding section-04, 10 observed)" }
      - { id: media-well,     note: "agent card: sand (#ece6d9) media well w/ product-UI mockup on top → 24px sans heading → body → optional underlined link (grounding section-05, radius 16)" }
      - { id: quote-photo,    note: "testimonial card: hairline frame, photo left (4px radius) / quote + author + stats right (grounding section-08)" }
      - { id: banner-panel,   note: "integration banner: 16px-radius white panel, copy left / logo collage right (grounding section-06)" }
    slots:
      media:   { use: optional, note: "sand media well (agent) or photo (testimonial)" }
      icon:    { use: optional, placement: heading-row, size: "1.5rem", note: "orange product line-icon ~24px seated BESIDE the card heading in one row (grounding section-04: 'icon + 18px sans heading row')" }
      heading: { use: require, register: h5, note: "compact cards ride the 18px sans register (h5); large agent cards ride 24px (h3)" }
      body:    { use: optional }
      action:  { use: optional, note: "ink text-arrow link" }
    motion: { hover: "background wash + 1px ring on the state tier (150ms); text-arrow slides 5px right", source: "motion-audit: .cl-card.-hoverable:hover, .cl-textLink:hover" }
    provenance: [product-grid, agent-carousel, testimonial-tabs, integration-banner]
    confidence: high
  form:
    origin: extracted
    designedFrom: { note: "input tokens measured in the captured sheets (radius-input 4px, focus teal, error family); no form renders on the captured homepage" }
    overridable: true
    confidence: medium
  testimonial:
    origin: extracted
    use: always
    anatomy: "tabbed case-study card: 3 pill tabs above; hairline-bordered card w/ workplace photo left (4px radius) / quote body (16px light) + bold author name + role caption + orange-underlined 'Read full case study' link right; 50/50 serif-stat row under the quote, split by a vertical hairline"
    provenance: [testimonial-tabs]
    confidence: high
  stat-block:
    origin: extracted
    use: proof-moments
    anatomy: "large serif numeral (~44px, weight 400) over a 14–15px sans caption; pairs sit side-by-side divided by a vertical hairline rule (inside the testimonial card)"
    provenance: [testimonial-tabs]
    confidence: high
  navbar:
    origin: extracted
    provenance: [navbar]
    confidence: high
  footer:
    origin: extracted
    provenance: [footer]
    confidence: high
  accordion:
    notObserved: true
    note: "no accordion device on the captured homepage (the burger-menu disclosure toggles in the mobile nav census are chrome, not a content accordion)"
  accordion-item:
    notObserved: true
    note: "no accordion device on the captured homepage"
  tabs:
    origin: extracted
    use: audience-switch
    anatomy: "pill tabs: 14px w500 labels in 16px-radius pills, idle bg rgba(0,0,0,0.05) wash, pad 8px 16px; active pill darkens; the mega-menu sidebar reuses the same pill register vertically (By Use Case / By Team Size / Why HubSpot?)"
    motion: { switch: "content swap on the reveal tier (300ms ease); pill wash on the state tier (150ms)", source: "motion-audit: cl-tab-button family + carousel/tab shared timing" }
    provenance: [testimonial-tabs, navbar]
    confidence: high
  logo-bar:
    origin: extracted
    use: always
    anatomy: "two registers measured: (1) customer proof — centered 22px sans stat heading over ONE row of 5 real logo vectors ~30px tall, ~130px gaps, hover dims to 55%; (2) award proof — 22px sans heading left beside a row of 6 G2 badge images ~90px"
    provenance: [logo-wall, badge-row]
    confidence: high
  feature-item:
