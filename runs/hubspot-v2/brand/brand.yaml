        tiers: { w1920: { px: 44, source: vision }, w1440: { px: 44, source: vision }, w960: { px: 44, source: vision }, w375: { px: 32, source: vision } },
        note: "serif stat numerals in the testimonial stats row (grounding section-08: ~44px serif '12' / '5' over sans captions)" }
    # emphasis-inside-heading law: no <strong>/<b> renders inside any h1–h6 at any
    # measured tier (computed tier ladder headingEmphasis: zero hits). Hierarchy is
    # size + family (serif display vs sans card registers), never inline bolding.
    headingEmphasis: { notObserved: true, reason: "0 strong/b-in-heading hits at 1920/1440/960/375 (computed tier ladder)", source: computed }
    # counter-display / ghost-watermark / footer-sitemap-link tiers: ABSENT BY
    # MEASUREMENT (no counter device, no ghost type, no display-size footer links
    # anywhere on the page). Their absence disables those devices.
  spacing:
    # The site's own section ladder: --cl-section-padding-none/extra-small/small/
    # medium/large = 0 / 16→24 / 24→40 / 40→64 / 64→96 px (base→≥breakpoint pairs
    # mined from the captured sheets). Sections compose them per-edge via
    # -padding-top-*/-padding-bottom-* modifiers (dom census).
    section-padding-light: { value: "4rem",  role: "the workhorse vertical section rhythm (--cl-section-padding-medium 64px at desktop; most sections ride -padding-top-md/-padding-bottom-md)", modeLadder: { base: "4rem", tablet: "4rem", mobileL: "2.5rem", mobile: "2.5rem" }, status: mapped, source: saved-css }
    section-y-sm:          { value: "2.5rem", role: "short section tier (--cl-section-padding-small 40px at desktop; badges row rides -padding-top-s)", modeLadder: { base: "2.5rem", tablet: "2.5rem", mobileL: "1.5rem", mobile: "1.5rem" }, status: mapped, source: saved-css }
    section-y-xs:          { value: "1.5rem", role: "extra-short tier (--cl-section-padding-extra-small 24px at desktop; integration banner bottom)", modeLadder: { base: "1.5rem", tablet: "1.5rem", mobileL: "1rem", mobile: "1rem" }, status: mapped, source: saved-css }
    section-y-lg:          { value: "6rem",  role: "spacious tier (--cl-section-padding-large 96px at desktop; badge row bottom = -padding-bottom-lg; hero pads ~210/200 ride its own photo band)", modeLadder: { base: "6rem", tablet: "6rem", mobileL: "4rem", mobile: "4rem" }, status: mapped, source: saved-css }
    module-gap-editorial:  { value: "4rem",  role: "ALIAS of section-padding-light — preview/composer module rhythm", status: mapped, source: saved-css }
    # ── relational ladder (P1.1, validator C15): named gaps BETWEEN content roles.
    # The source has no structured-text custom properties; the ladder is authored
    # from the vision groundings' relational reads at 1440 (three+ sections each),
    # snapped to the 8px system grid.
    eyebrow-to-heading:    { value: "1.5rem", role: "eyebrow→heading gap (hero grounding 24px; the product rail reads 40px under its pill register — the pill carries its own inset)", modeLadder: { base: "1.5rem", tablet: "1.5rem", mobileL: "1rem", mobile: "1rem" }, status: mapped, source: vision }
    heading-to-body:       { value: "2rem",  role: "heading→body gap (groundings: hero 40, product 32, platform 20 — canonical 32 at the split/product register)", modeLadder: { base: "2rem", tablet: "2rem", mobileL: "1.5rem", mobile: "1.5rem" }, status: mapped, source: vision }
    body-to-cta:           { value: "2.5rem", role: "body→actions gap (fix2: JS-off computed rect seams on the capture — hero 40, powered-by-ai 40, closing 40; the earlier vision 56/60 were ink-to-ink over-reads)", modeLadder: { base: "2.5rem", tablet: "2.5rem", mobileL: "2rem", mobile: "2rem" }, status: mapped, source: computed }
    block-to-block:        { value: "2.5rem", role: "header-stack→content rhythm inside sections (grounding gapPx 32–40 between the header row and card tracks/split rows)", modeLadder: { base: "2.5rem", tablet: "2.5rem", mobileL: "2rem", mobile: "2rem" }, status: mapped, source: vision }
    column-to-column:      { value: "5rem",  role: "split-row column gutter (platform grounding 80px copy↔illustration; case-study header 60px; product split 32 rides grid-gap)", modeLadder: { base: "5rem", tablet: "3rem", mobileL: "2rem", mobile: "2rem" }, status: mapped, source: vision }
    grid-gap:              { value: "2rem",  role: "card grid gap (product grid + agent track grounding gapPx 32; testimonial card internal split 40)", status: mapped, source: vision }
    panel-padding:         { value: "2rem",  role: "card/panel inset (product cards 32px measured pad; agent cards 28x40 vision; --cl-card-interactive-padding 1.5rem for compact cards)", status: mapped, source: [saved-css, vision] }
    stack-md:              { value: "1.25rem", role: "intra-stack gap (heading→body inside cards, grounding 16–20px)", status: mapped, source: vision }
    stack-lg:              { value: "2rem",  role: "content→actions inside cards/rails", status: mapped, source: vision }
    list-item-gap:         { value: "1rem",  role: "checkmark-list row rhythm inside product cards (14px rows w/ 22px line, ~16px stride read from the crop)", status: mapped, source: vision }
    button-inset:          { value: "0.75rem 1.5rem", role: "MEDIUM button inset 12x24 (--cl-button-padding-medium; small 8x16, large 16x40 — see buttons.sizes)", status: mapped, source: [saved-css, computed] }
    container-max:         { value: "67.5rem", role: "content max-width 1080px measured at EVERY tier (nav/content/footer contentMaxWidth 1080; --cl-section-content-max-width)", status: mapped, source: computed }
    container-span:        { value: "min(100vw - 2rem, 67.5rem)", role: "the container LAW as one CSS expression: 1080px cap, 16px side gutters below the cap (--cl-section-gutter 16px; tier facts: used 1080 @1440/1920 = 0.75/0.563 fraction, full-width minus gutters @960/375)", status: mapped, source: computed }
    badge-tier:            { value: "5.625rem", role: "award badge tier (~90px G2 shields, grounding section-09)", status: mapped, source: vision }
    logo-tier:             { value: "1.875rem", role: "customer logo tier (~30px wordmark vectors in the proof strip, grounding section-02)", status: mapped, source: vision }
    radius-global:         { value: "0.5rem", role: "ALIAS of radius/button — the brand's working surface rounding (8px --cl-border-radius-medium)", status: mapped, source: saved-css }
  radius:
    # The site's own radius tokens: --cl-border-radius-small/medium/container =
