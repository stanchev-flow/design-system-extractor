    card-hover-ring: { value: "0 0 0 1px rgba(0,0,0,0.11)", role: "hoverable-card hover ring (.cl-card.-hoverable:hover: bg wash + box-shadow 0 0 0 1px var(--cl-card-border-hover-color)) — a RING, not a drop shadow", status: mapped, source: saved-css }
  motion:
    # Authored from evidence/motion-audit.json (59 transition rules, 6 animation
    # rules, 9 keyframes, 7 timing custom properties). Durations are the census
    # ladder; easings the mined curves. Selectors are PROVENANCE, never names.
    durations:
      state:      { value: "150ms", role: "THE control tier — button color/background/border (--button-transition '0.15s color ease-out, 0.15s background-color ease-out, …'; nav link background/color .15s linear)", census: 6, source: motion-audit }
      move:       { value: "200ms", role: "small fades (mega panel opacity .2s ease-out/.2s ease-in with .1s delay pairing)", census: 8, source: motion-audit }
      reveal:     { value: "300ms", role: "the DOMINANT tier — carousel slide (--cl-carousel-animation-duration 300ms ease), nav dropdown chevron (transform .3s ease), footer column collapse (all .3s ease), underline-offset shifts", census: 31, source: motion-audit }
      settle:     { value: "400ms", role: "page-header image fade-in (--wf-page-header-image-loaded-speed 400ms ease-out)", census: 1, source: motion-audit }
      emphasis:   { value: "500ms", role: "larger state swaps (a11y contrast toggle 0.5s ease-in-out family)", census: 10, source: motion-audit }
      slow:       { value: "1000ms", role: "long choreography tier (carousel autoplay-adjacent timing census)", census: 5, source: motion-audit }
    easings:
      - { value: "ease", use: "the default curve — carousel easing (--cl-carousel-easing), dropdown transforms, footer collapse", census: 17, source: motion-audit }
      - { value: "ease-in-out", use: "toggles + underline shifts (text-underline-offset .3s ease-in-out, contrast toggle)", census: 17, source: motion-audit }
      - { value: "ease-out", use: "ENTER — button state family (--button-transition), panel fade-in, header image settle", census: 8, source: motion-audit }
      - { value: "ease-in", use: "EXIT — panel fade-out pairing", census: 6, source: motion-audit }
      - { value: "linear", use: "nav link background/color micro-shift (.15s linear)", census: 6, source: motion-audit }
      - { value: "linear(0,0.006,0.023 2.2%,…,1)", use: "TWO spring-like linear() curves (modern spring easing) on decorative reveals — evidence of a spring register, used sparingly", census: 2, source: motion-audit }
    signatureMoves:
      - name: text-arrow-nudge
        move: "card text-links slide their arrow icon 5px right on hover (transform: translateX(5px) on the icon span)"
        timing: "rides the 150ms state tier"
        sourceSelectors: [".wf-product-platform__card-textlink.cl-textLink:hover>.cl-textLink…", ".cl-textLink:hover"]
      - name: button-state-fade
        move: "buttons shift fill/ink/border together on one custom property (color, background-color, border-color .15s ease-out)"
        timing: "150ms ease-out (--button-transition)"
        sourceSelectors: ["--button-transition", ".cl-button:hover/:focus-visible"]
      - name: mega-panel-fade
        move: "nav dropdown panels fade in (opacity .2s ease-out + visibility .3s, .1s delay) and out (.2s ease-in); the trigger chevron rotates 180° on the reveal tier"
        timing: "panel 200/300ms; chevron transform 300ms ease (--global-nav-dropdown-toggle-transition)"
        sourceSelectors: [".global-nav-dropdown…", "--global-nav-dropdown-toggle-transition"]
      - name: carousel-slide
        move: "carousel trains translate on the reveal tier; dots swap active fill; round controls wash on hover (--cl-color-hover-01)"
        timing: "300ms ease (--cl-carousel-animation-duration/-easing)"
        sourceSelectors: [".cl-carousel-train", ".cl-round-button:hover"]
      - name: logo-dim
        move: "logo-strip logos dim to 55% opacity on hover"
        timing: "opacity transition on the state tier"
        sourceSelectors: [".csol-logo-carousel-logo-container:is(a):hover"]
      - name: card-hover-ring
        move: "hoverable cards tint their background (--cl-card-hover-background-color = hover-01 wash) and raise a 1px ring (box-shadow 0 0 0 1px) — flat, no elevation"
        timing: "state tier"
        sourceSelectors: [".cl-card.-hoverable:hover"]
      - name: header-image-settle
        move: "the hero photograph fades/settles in once loaded (opacity, 400ms ease-out)"
        timing: "400ms ease-out (--wf-page-header-image-loaded-speed/-easing-function)"
        sourceSelectors: ["--wf-page-header-image-loaded-*", ".wf-page-header.-image-loaded"]
    reducedMotion: { value: "declared", role: "prefers-reduced-motion guards measured in the captured sheets (mediaBreakpoints census: no-preference gates on decorative motion)", source: motion-audit }
    provenance: [evidence/motion-audit.json]
    confidence: high
    source: saved-css
    scope: design-language
    changelog:
      - { ts: "2026-07-10T20:00:00Z", action: created, from: null, to: "evidence-derived motion tokens (6-tier duration ladder, 6 easings, 7 signature moves)", by: creation, signalId: null, note: "P0.1 motion axis from the mine-motion stage output" }
  imagery:
    aspectPalette:
      wide:      { value: "16 / 9", role: "full-bleed hero photography + platform illustrations", provenance: [hero, platform-carousel], source: vision }
      landscape: { value: "3 / 2",  role: "agent-card media wells (product-UI mockups on sand wells)", provenance: [agent-carousel], source: vision }
      portrait:  { value: "3 / 4",  role: "testimonial case-study photographs (left half of the quote card)", provenance: [testimonial-tabs], source: vision }
      square:    { value: "1 / 1",  role: "product icons (~24px), app-logo collage tiles, badge art", provenance: [product-grid, integration-banner, badge-row], source: vision }
  surfaces:
    # LIGHT surfaces carry NO textAccent (composer dark-surface heuristic). The
    # page runs light end-to-end until the closing sequence: deep-teal CTA band,
    # then the near-black footer. Warm gradient art rides ON the light canvas as
    # band/seam art, not a scheme change.
    surface/primary:        { bg: "#fcfcfa", schemeMode: "base (Primary)", intent: "warm off-white page canvas (--light-theme-background-01)", textPrimary: text/on-primary, textAccent: null, provenance: [logo-wall, platform-carousel, product-grid, testimonial-tabs, badge-row] }
    surface/panel:          { bg: "#ffffff", schemeMode: "Container",      intent: "white card/panel on the canvas (radius 8 compact / 16 large; hairline rgba(0,0,0,0.11) border; FLAT idle and hover — hover is a wash + 1px ring)", textPrimary: text/on-primary, textAccent: null, provenance: [product-grid, agent-carousel, integration-banner, testimonial-tabs] }
    surface/raised:         { bg: "#f8f5ee", schemeMode: "Secondary",      intent: "warm cream raised band (--light-theme-background-02; subtle warm step off the canvas)", textPrimary: text/on-primary, textAccent: null, provenance: [logo-wall] }
    surface/accent-wash:    { bg: "#fcc6b1", schemeMode: "base (Primary)", intent: "warm gradient ART band (peach #fcc6b1 -> pink #fcc3dc -> coral #ffa581 family): the agent-carousel band + product-grid bottom seam; DARK ink stays legal on it; white cards float on it", textPrimary: text/on-primary, textAccent: null, overlay: none, blur: none, provenance: [agent-carousel, product-grid] }
    # fix1 2026-07 item-10: `controls: onInverse` — a surface-level fact that the
    # brand's measured dark-surface BUTTON variants (buttons.<family>.onInverse)
    # apply on this surface (generic reusable pattern: dark bands swap the outline
    # family to the surface's own ink). photo-hero does NOT declare it: its measured
    # secondary is the LIGHT white-fill variant (computed 'Get started free' on the
    # hero: white bg + orange border/ink).
    surface/inverse:        { bg: "#042729", schemeMode: "Inverse",        intent: "deep-teal conversion band (--dark-theme-background-01): cream ink, orange primary stays orange, secondary button swaps to cream outline", textPrimary: text/on-inverse, textAccent: accent/highlight-on-inverse, controls: onInverse, provenance: [closing-cta] }
    surface/inverse-strong: { bg: "#1f1f1f", schemeMode: "Inverse",        intent: "near-black chrome dark (--*-theme-background-footer-01): the footer directory; cream headings, 62%-cream links", textPrimary: text/on-inverse, textAccent: accent/highlight-on-inverse, controls: onInverse, provenance: [footer] }
    surface/photo-hero:     { bg: "#55453e", schemeMode: "Inverse",        intent: "full-bleed photographic hero band (warm interior office scene behind a measured rgba(0,0,0,0.4) scrim; #55453e = color/photo-tint, the sampled copy-region average of the scrimmed art) — CREAM ink on it, orange + white buttons", textPrimary: text/on-inverse, textSecondary: text/on-inverse, textAccent: accent/highlight-on-inverse, overlay: "flat CSS scrim rgba(0,0,0,0.4) (measured ::after)", blur: none, note: "the sub + eyebrow measured FULL cream rgb(248,245,238) on the photo (18px/14px) — no 62% muted register exists on this band, so textSecondary rides the same cream role; the hero's measured secondary button stays the LIGHT white-fill variant (no controls: onInverse here)", provenance: [hero] }

