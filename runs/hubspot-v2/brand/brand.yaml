    widthRules: { container: "contained", measure: "1080px" }

compositionRules:
  - id: one-orange-action-system
    statement: "ONE vivid orange (#ff4800 — the site's own brand token) carries every primary action, checkmark, underline accent, heading period, and the wordmark. It never becomes body/link text color and never appears as a section background; dark bands keep the SAME orange fill family (the button tokens are scheme-stable)."
    value: { accent: "#ff4800", hover: "#c93700", pressed: "#9f2800", deployment: "actions + marks + accents only" }
    confidence: high
    source: [saved-css, computed]
    scope: design-language
    changelog: []
  - id: serif-display-sans-body
    statement: "Display voice is HubSpot Serif at weight 500 sentence case (Book master at the hero's 80px register); working voice is HubSpot Sans — headings 500, body LIGHT 300. Hierarchy comes from size + family swaps, never weight jumps, caps, or inline bolding."
    value: { display: "HubSpot Serif 500 sentence", body: "HubSpot Sans 300 16/28", cardHeadings: "HubSpot Sans 500" }
    confidence: high
    source: computed
    scope: design-language
    changelog: []
  - id: orange-period-accent
    statement: "Landmark serif headings may CLOSE with an orange period accent (hero 'go to grow.', closing band 'impossibly easy, with HubSpot.') — a punctuation-accent device, one per heading, landmark bands only."
    value: { device: "trailing period in accent/highlight", scope: "hero + closing landmarks" }
    confidence: high
    source: vision
    scope: design-language
    changelog: []
  - id: soft-rect-buttons
    statement: "Every button is a soft 8px-radius RECTANGLE (never a pill) with a 2px border slot and three insets (8x16 / 12x24 / 16x40 at 14/16/18px labels). Hover swaps FILL/INK on a 150ms ease-out; geometry never changes."
    value: { radius: "0.5rem", borderSlot: "2px", sizes: [small, medium, large] }
    confidence: high
    source: [saved-css, computed]
    scope: design-language
    changelog: []
  - id: ink-links-orange-underline
    statement: "Text links are INK (#1f1f1f, w500). The brand's link decoration is the ORANGE UNDERLINE token (#ff4800) on standing links, and a trailing arrow that slides 5px right on card links. Link text itself never turns orange."
    value: { ink: "#1f1f1f", underline: "#ff4800", arrowNudge: "translateX(5px)" }
    confidence: high
    source: [saved-css, vision]
    scope: design-language
    changelog: []
  - id: flat-cards-hairline-borders
    statement: "Cards are white plates on hairline rgba(0,0,0,0.11) borders — FLAT at idle AND hover (hover = background wash + 1px ring, no drop shadows anywhere). Compact cards round 8px; large feature cards and panels round 16px."
    value: { border: "1px rgba(0,0,0,0.11)", radiusCompact: "0.5rem", radiusLarge: "1rem", elevation: none }
    confidence: high
    source: [saved-css, computed, vision]
    scope: design-language
    changelog: []
  - id: warm-gradient-band-art
    statement: "Section art is a WARM GRADIENT family (peach #fcc6b1 → pink #fcc3dc → coral #ffa581 — the site's own accent-fill/decoration steps) deployed as full section bands or bottom seams on the light run; dark ink stays legal on it and white cards float on it."
    value: { family: ["#fcc6b1", "#fcc3dc", "#ffa581"], deployment: "bands + seams on the light run" }
    confidence: high
    source: [saved-css, vision]
    scope: design-language
    changelog: []
  - id: dark-closing-sequence
    statement: "Dark surfaces appear ONLY as the closing sequence: the deep-teal conversion band (#042729, the site's dark-theme background token) then the near-black footer (#1f1f1f). Ink on dark is CREAM (#f8f5ee), not pure white; the secondary button swaps to a cream outline."
    value: { teal: "#042729", footer: "#1f1f1f", inkOnDark: "#f8f5ee" }
    confidence: high
    source: [saved-css, computed]
    scope: design-language
    changelog: []
  - id: pill-rail-header-device
    statement: "Editorial sections open with a RAIL: a bordered eyebrow pill (hairline box, radius 8, sentence case) joined by a DOTTED horizontal rule to a right-aligned quiet CTA (ink-outlined button) — one rail per section, feature/proof sections only."
    value: { pill: "1px hairline box r8", rule: "dotted 1px", cta: "tertiary outlined right" }
    confidence: high
    source: vision
    scope: design-language
    changelog: []
  - id: proof-is-real-artifacts
    statement: "Proof renders REAL artifacts: customer logo vectors (~30px, as-shipped colors), G2 badge art (~90px), tabbed verbatim quotes with workplace photography and serif stat numerals. Logos and badges are never text names."
    value: { logos: "real vectors ~30px", badges: "art images ~90px", stats: "serif numerals over sans captions" }
    confidence: high
    source: [vision, saved-css]
    scope: design-language
    changelog: []
  - id: dark-footer-directory
    statement: "The footer is a near-black directory: 5 headed columns (14px cream headings, 12px 62%-cream links), a 7-glyph social row between hairlines, a centered cream wordmark, and an underlined legal row. Hover: links brighten to cream + underline + demi-bold."
    value: { bg: "#1f1f1f", columns: 5, linkSize: "12px", social: 7 }
    confidence: high
    source: [saved-css, computed]
    scope: design-language
    changelog: []

