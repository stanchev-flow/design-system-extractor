    whenToUse: "Always — global chrome."
    slots:
      - { name: "linkcols", type: content, role: "5 grouped link columns (14px headings, 12px 62%-cream links)" }
      - { name: "social",   type: content, role: "7 monochrome social glyphs in a centered row" }
      - { name: "legal",    type: content, role: "copyright + 5 underlined policy links" }
