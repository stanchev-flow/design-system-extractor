    widthRules: { container: "contained" }
  - id: closing-cta
    archetype: stack
    index: 10
    patternRef: { lib: project, id: closing-cta-dark }
    surfaceMode: { mode: "Inverse", note: "full-bleed deep-teal band (#042729)" }
    surfaceIntent: surface/inverse
    useCase: "Closing conversion: LEFT-aligned 48px serif cream heading w/ orange period + filled-orange and cream-outlined buttons on the deep-teal band."
    whenToUse: "Page close, before footer."
    slots:
      - { name: "heading", type: content, role: "48px serif cream heading" }
      - { name: "actions", type: content, role: "filled primary + cream-outlined secondary" }
    gridRules:  { columns: "single", justify: "start", align: center }
    widthRules: { container: "contained" }
  - id: footer
    archetype: grid
    index: 11
    surfaceMode: { mode: "Inverse", note: "near-black #1f1f1f" }
