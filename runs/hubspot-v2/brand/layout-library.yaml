      # #ff4800 under the selected label; the page's committed-accent law collapses
      # --c-accent to ink on this band, so the device needs the measured fact).
      - { kind: tabs, target: tabs, sanctioned: true, activeUnderline: "rgb(255, 72, 0)", note: "captured states (tab-03/04/05): active tab = bolder ink + accent-highlight underline (#ff4800); wash rgba(0,0,0,0.05) on hover/press (the measured cl-tab-button base r16 pad 8px); first tab active is the JS-off truth" }
      - { kind: stat-rule, target: stats, sanctioned: true, note: "vertical hairline divider between the two stats (grounding section-08)" }
