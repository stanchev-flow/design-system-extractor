    intent: >-
      Tabbed case-study proof: a row of three pill tabs (Enterprise / Mid-Sized
      Business / Small Business — active tab carries the darker wash), then a
      hairline-bordered card split photo LEFT (rounded 4px, workplace portrait) /
      quote RIGHT — quotation body, bold author name, role caption, and a 'Read
