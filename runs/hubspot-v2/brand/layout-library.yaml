        # 1.5rem) — fraction 0.56, not the 0.35 first authored from the crop eyeball.
        # media semantics 2026-07: the media SWAPS with the selected tab — the
        # generalized state-swap arrangement (trigger: tab); each panel's photograph
        # binds by its tab label (layoutCopy …panels carries the quote/stat swaps).
        - name: media
          role: ACTIVE panel case-study photograph (rounded 4px)
          mediaAspect: landscape
          mediaScale: { of: container, fraction: 0.56 }
          width: half
          z: front
          assets: [045-unipart-1.png]
          mediaComposition:
            mode: state-swap
            trigger: tab
            layers:
              - { assetRef: client-photo-enterprise-tab, forItem: Enterprise }
              - { assetRef: client-photo-midsize-tab, forItem: Mid-Sized Business }
              - { assetRef: client-photo-smallbiz-tab, forItem: Small Business }
        - { name: support-statement, role: supporting statement — quotation + bold author + role + underlined link, textLen: long, sizeClass: body, width: half, z: front }
        - { name: stat-rows, role: ruled stat list — 2 serif numerals w/ sans descriptions, split by vertical rule, textLen: short, sizeClass: display, width: half, z: front }
      # the switcher's other two panels (Mid-Sized / Small Business photos 046/047 +
      # quotes + stats) are preserved verbatim in section-copy layoutCopy.…panels.
