      alignment: { value: left, inheritance: block-inherits, counterweight: media, rule: "photo column left; quote + stats right" }
      # fix1 2026-07: measured band padding (section-rects: -padding-top-s /
      # -padding-bottom-xs = 40px top / 24px bottom at desktop; band h 714px).
      bandPadding: { top: 2.5rem, bottom: 1.5rem }
      slots:
        # fix1 2026-07 item-9: re-authored to the CAPTURED anatomy — the interaction
        # captures (tab-03/04/05) show TEXT tabs: idle = transparent muted-ink label,
        # ACTIVE = bolder ink + accent underline, wash only as the hover/pressed
        # state. The prior "pill run w/ wash bg" prose described the harvested
        # cl-tab-button base (r16, wash rgba(0,0,0,0.05)) as the resting look —
        # contradicted by the captures (reported in changes.md).
