    widthBehavior: fixed
    approxPaddingPx: 8 10
    radiusPx: 8
  surfaceApprox: '#ffffff'
  inkApprox: '#1b1d1f'
  caseTreatment: upper
copy:
  eyebrow: INTELLIGENT INFRASTRUCTURE
