  items:
  - heading: Payroll engine
    body: UK · monthly cycle £312,540 / DE · monthly cycle €487,210 / BR · 13th salary R$ 891k
    meta: RUNNING
  - heading: Compliance layer
    body: SOC 2 Type II / ISO 27001 / GDPR Aligned
    meta: VERIFIED
  logosLegible: []
media:
- kind: product-ui
  treatment: stacked white UI cards with grid backdrop, payroll + compliance + avatar column
  aspect: landscape
  approxFractionOfSection: 0.5
confidence: high
notes:
- Avatar caption names (Ana Silva, Pedro Nik, Luna Choi) are illustrative UI labels
- left product-UI sits on faint grid texture within canvas
