# brand.yaml — canonical design language for Remote (remote.com)
# Phase D re-extraction (2026-07-07): authored by the extraction agent from the FRESH
# live capture (screenshots/remote-v2/, Playwright 1440x900, scripts stripped) through
# the evidence-first flow (run_brand_extraction.py mine-dom → mine-css → measure →
# slice → ground → curate; spec/layout-analyst-skill.md authoring protocol).
#
# MEASUREMENT SOURCES (evidence/ bundle, all reproducible):
#  - evidence/css-rules.json + css-facts.json — the site's OWN token sheet: the "zora"
#    custom-property system (:root + [data-zora-theme=*] scopes) with exact palette
#    steps (neutral 50–900, sea-blue 25–900, red-brand 25–900, sea-green, purple,
#    yellow), radius tiers x1–x4 (2/4/10/40px), spacing scale x1–x9 (4→80px),
#    hover pairs, letter-spacing tokens, font stacks (Inter + Bossa + JetBrains Mono)
#  - evidence/computed-styles.json — JS-off getComputedStyle at 1440x900: chrome bars,
#    heading ramp (h1 46/h2 36/h3 18/p 18), nav trigger 18px w500, footer link 14px,
#    action-family census (pill h=48 r=40 pad 0 24)
#  - evidence/dom-sections.json — DOM census: 66 module-section candidates, 8 footer
#    link groups, button-class census, nav menu structure
#  - evidence/grounding/*.yaml — 11 per-section VISION grounding files (opus,
#    extraction-grounding-prompt.md): surfaces w/ parents, per-section type+component
#    inventory, verbatim copy, creative direction
#  - runs/remote/assets/source-chrome.v2.json — offline browser chrome contract
#    (extract_chrome_saved.py over the fresh capture)
#
# Remote reads as the corpus's third pole: an ALL-LIGHT canvas system (no dark page
# bands — dark lives INSIDE cards/panels as deep jewel-tone backdrops), fully-rounded
# pill CTAs on a 40px radius token, a single-weight (400) geometric display face at
# every heading tier, uppercase theme-colored eyebrows, white 12–16px cards that only
# elevate on hover, and pastel noise/gradient art surfaces bookending the page.

version: "1.1"

brand:
  name: "Remote"
  sourceUrl: "https://remote.com"
  baseStyle: corporate-saas-clean
  snapshot:
    value: >-
      A light, systematic SaaS marketing system on a cool gray canvas (#eff0f0) led by a
      single vivid blue (#0564ff — the site's own sea-blue-500 token). Every heading tier
      is Bossa (a geometric grotesque) at weight 400, sentence case; hierarchy comes from
      size, not weight. Inter carries body, UI, buttons, and the footer. All CTAs are
      fully-rounded 48px-tall pills (40px radius token): blue filled primary, outlined
      secondary in deep blue (#003284) that FILLS blue on hover, near-black neutral pill
      for chrome (nav CTA), and blue arrow text-links. Eyebrows are uppercase tracked
      microlabels color-coded by the section's theme scope (sea-blue #0047bc-family,
      red-brand crimson #a52d44, neutral gray #595b5f). Content sits in pure-white
      rounded cards that are FLAT at idle and gain a soft shadow + tint only on hover.
      Dark surfaces never appear as section bands: deep navy (#00235c, the sea-blue-800
      accent step) backs media wells INSIDE white cards, and deep maroon (#511621,
      red-brand-800) inverts the active item of the feature accordion. The hero sits on
      an inset 10px-rounded panel painted with a pastel grey-green-blue noise-gradient;
      the closing CTA repeats the gradient as a full-bleed band; text on both stays dark
      ink. The footer is LIGHT (#f6f7f8): an 8-group link directory in 6 visual columns,
      ink links that soften + underline on hover, circular social icons, app badges.
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-07-03T16:40:00Z", action: created, from: null,
          to: "all-light pill-CTA noise-panel system (saved-page ground truth)",
          by: creation, signalId: null,
          note: "first extraction — local capture (DOM + 22 CSS + inline instance styles + assets)" }
      - { ts: "2026-07-07T12:30:00Z", action: refined, from: "hand extraction (remote-e2e)",
          to: "evidence-first re-extraction (Phase D live capture + zora token sheet)",
          by: creation, signalId: null,
          note: "fresh capture 2026-07-07; corrected body ink (#383a3d not #595b5f), footer link ink (#141415), secondary-button family (deep-blue outline that fills blue on hover), pressed/focus states from the site's own token scopes; nav measured sticky+transparent; +3 patterns; full blocks coverage" }

meta:
  # P1.1 canonical-tier discipline (validator C14): every canonical value in this file
  # (sizeRem.base, spacing value:, radius value:) refers to the 1440px measured tier
  # unless a tier ladder says otherwise. The measure stage sampled the saved page at
  # 1920/1440/960/375 (evidence/computed-styles.json `tiers`); per-role stamps ride
  # in tokens.type.<role>.tiers. The source is mobile-first with min-width register
  # swaps at 768/1024/1440/1920 — the authored max-width ladder (base >991 / tablet
  # ≤991 / mobileL ≤767 / mobile ≤479) projects those registers; the 992–1023 window
  # is a known projection seam (source still shows its <1024 register there).
  canonicalTier:
    viewport: 1440
    label: base
    note: "sizeRem.base == computed @1440 (the 1440–1919 source register); the 1920+
      register is stamped per-role under tiers.w1920, not a sizeRem key"
    measuredTiers: [1920, 1440, 960, 375]
    source: computed
    provenance: [evidence/computed-styles.json]

indexes:
  assetsTagged:     "./assets-tagged.json"
  assetsTaggedMd:   "./assets-tagged.md"
  savedPageHtml:    "../../../screenshots/remote-v2/remote-com.html"
  savedPageAssets:  "../../../screenshots/remote-v2/remote-com_files/"
  sourceScreenshot: "../../../screenshots/remote-v2/remote-com-fullpage.png"
  voice:            "./voice.md"
  layoutLibrary:    "./layout-library.yaml"
  sectionCopy:      "./section-copy.yaml"
  evidenceBundle:   "./evidence/"
  cssRuleCorpus:    "./evidence/css-rules.json"
  cssFacts:         "./evidence/css-facts.json"
  computedStyles:   "./evidence/computed-styles.json"
  domCensus:        "./evidence/dom-sections.json"
  visionGrounding:  "./evidence/grounding/"
  chromeContract:   "../assets/source-chrome.v2.json"
  priorCapture:     "../../../screenshots/remote/"

tokens:
  colors:
    # ── ink / neutrals — the site's own neutral scale (--zora-neutral-50..900)
    ink/primary:      { value: "#141415", role: "heading + nav-link + footer-link ink (neutral-900; h1–h6, nav triggers, footer links)", status: mapped, source: saved-css, provenance: [hero, accordion-features, workflow-cards, navbar, footer] }
    ink/body:         { value: "#383a3d", role: "body copy default (neutral-700 = --zora-text-secondary; measured p{color} rgb(56,58,61))", status: mapped, source: [saved-css, computed], provenance: [hero, infra-panel, testimonials] }
    ink/secondary:    { value: "#595b5f", role: "quieter ink (neutral-600): gray eyebrow family, footer group headings (--zora-footer-header-text), footer-link hover", status: mapped, source: saved-css, provenance: [logo-wall, footer] }
    ink/muted:        { value: "#777a7e", role: "neutral-500: disabled-button label, muted labels on accent parents", status: mapped, source: saved-css, provenance: [testimonials] }
    ink/faint:        { value: "#b3b5b7", role: "neutral-400: disabled text, faint hairlines", status: mapped, source: saved-css, provenance: [footer] }
    # ── surfaces (neutral scale steps)
    neutral/canvas:   { value: "#eff0f0", role: "page canvas (--zora-bg-surface-01 = neutral-100; body{background} measured rgb(239,240,240))", status: mapped, source: [saved-css, computed], provenance: [hero, accordion-features, testimonials, navbar] }
    neutral/raised:   { value: "#f6f7f8", role: "raised light band (neutral-50): footer bg (--zora-footer-bg), nav-open bg, card hover tint, accordion idle hover", status: mapped, source: [saved-css, computed], provenance: [footer, navbar, testimonials] }
    neutral/card:     { value: "#ffffff", role: "card surface (--zora-bg-surface-02 = neutral-white): white content cards, nav hover pill, testimonial slides", status: mapped, source: saved-css, provenance: [testimonials, workflow-cards, navbar] }
    # ── blue action family — the sea-blue theme scope ([data-zora-theme=sea-blue])
    action/primary:          { value: "#0564ff", role: "primary CTA fill (sea-blue-500 = themed --zora-btn-bg), text links (--zora-link), blue eyebrow family", status: mapped, source: saved-css, provenance: [hero, banner-cta, closing-cta, infra-panel] }
    action/primary-hover:    { value: "#0047bc", role: "primary CTA hover fill (sea-blue-600 = themed --zora-btn-bg-hover); link hover color", status: mapped, source: saved-css, provenance: [hero] }
    action/primary-active:   { value: "#003284", role: "primary CTA pressed fill (sea-blue-700 = themed --zora-btn-bg-active)", status: mapped, source: saved-css, provenance: [hero] }
    action/primary-disabled: { value: "#ccdfff", role: "primary CTA disabled fill (sea-blue-100 = themed --zora-btn-bg-disabled; label #67a1ff sea-blue-300)", status: mapped, source: saved-css, provenance: [hero] }
    action/focus-ring:       { value: "#9bc1ff", role: "focus-visible outline (sea-blue-200 = themed --zora-btn-border-focused; 2px solid, 2px offset)", status: mapped, source: saved-css, provenance: [hero] }
    # ── secondary (outlined) family — deep-blue outline that FILLS on hover
    action/secondary-ink:    { value: "#003284", role: "outlined-pill label + border (sea-blue-700 = themed --zora-btn-border-secondary / --zora-btn-text-dark; measured 'Sign up' color rgb(0,50,132))", status: mapped, source: [saved-css, computed], provenance: [hero, partner-logos, testimonials, badge-strip] }
    action/secondary-hover-fill: { value: "#0564ff", role: "outlined-pill hover FILLS with sea-blue-500 (themed --zora-btn-bg-hover-secondary) and the label goes light — outline melts (box-shadow inset -> transparent)", status: mapped, source: saved-css, provenance: [hero] }
    # ── neutral action family (nav CTA, default .button outside the theme scope)
    action/neutral:        { value: "#232325", role: "neutral filled pill (neutral-800 = :root --zora-btn-bg; the nav 'Book demo')", status: mapped, source: saved-css, provenance: [navbar] }
    action/neutral-hover:  { value: "#595b5f", role: "neutral pill hover fill (neutral-600 = :root --zora-btn-bg-hover)", status: mapped, source: saved-css, provenance: [navbar] }
    action/neutral-active: { value: "#383a3d", role: "neutral pill pressed fill (neutral-700 = :root --zora-btn-bg-active)", status: mapped, source: saved-css, provenance: [navbar] }
    # ── deep jewel-tone panel family (INSET dark surfaces — never section bands)
    surface/deep-navy:       { value: "#00235c", role: "deep navy media-well backdrop inside white cards (sea-blue-800 — the themed --zora-bg-accent step); vision ~#0a1f56", status: mapped, source: [saved-css, vision], provenance: [workflow-cards] }
    surface/deep-accent:     { value: "#511621", role: "deep maroon inset panel (red-brand-800 — the red theme's --zora-bg-accent): ACTIVE feature-accordion item, white ink on it", status: mapped, source: [saved-css, vision], provenance: [accordion-features] }
    surface/deep-accent-hover: { value: "#742030", role: "deep maroon hover fill (red-brand-700 — --zora-acc-bg-active-hover under the red theme)", status: mapped, source: saved-css, provenance: [accordion-features] }
    accent/warm-wash:        { value: "#fceef1", role: "soft pink wash (red-brand-50): idle accordion-item hover in the red-themed section", status: mapped, source: saved-css, provenance: [accordion-features] }
    accent/crimson:          { value: "#a52d44", role: "crimson eyebrow family (red-brand-600 = red-themed --zora-label); vision ~#a01f38", status: mapped, source: [saved-css, vision], provenance: [accordion-features] }
    accent/eyebrow-blue-deep: { value: "#0047bc", role: "blue eyebrow family (sea-blue-600 = sea-blue-themed --zora-label); vision reads #1d5ce0-ish", status: mapped, source: [saved-css, vision], provenance: [infra-panel, workflow-cards] }
    accent/periwinkle:       { value: "#9bc1ff", role: "muted blue-on-navy family (sea-blue-200): links/accents on the deep-navy media wells", status: mapped, source: saved-css, provenance: [workflow-cards] }
    accent/pale-blue-chip:   { value: "#ccdfff", role: "pale blue chip fill (sea-blue-100): icon chips, badge tints on light panels", status: mapped, source: saved-css, provenance: [hero, infra-panel] }
    # ── interaction / state
    text/link:              { value: "#0564ff", role: "text links are BLUE (--zora-link = sea-blue-500); idle clean, hover underlines + darkens", status: mapped, source: saved-css, provenance: [workflow-cards, testimonials] }
    text/link-hover:        { value: "#0047bc", role: "link hover color (--zora-link-hover = sea-blue-600)", status: mapped, source: saved-css }
    text/link-on-inverse:   { value: "#9bc1ff", role: "link color on accent/dark surfaces (--zora-link-on-bg-accent = sea-blue-200)", status: mapped, source: saved-css }
    text/link-hover-on-inverse: { value: "#ccdfff", role: "link hover on dark surfaces (--zora-link-hover-on-bg-accent = sea-blue-100)", status: mapped, source: saved-css }
    overlay/hover-wash:     { value: "#e7e8e9", role: "hover wash on light surfaces (neutral-200 = --zora-tab-nav-bg-hover: nav trigger pills, language switcher)", status: mapped, source: saved-css, provenance: [navbar] }
    overlay/hover-wash-white: { value: "#ffffff", role: "nav dropdown item hover wash (--zora-nav-item-bg-hover = neutral-white)", status: mapped, source: saved-css, provenance: [navbar] }
    border/input:           { value: "#232325", role: "form input active border (--zora-input-border-active = neutral-800)", status: mapped, source: saved-css }
    state/disabled-fill:    { value: "#d2d3d5", role: "neutral disabled fill (neutral-300 = :root --zora-btn-bg-disabled)", status: mapped, source: saved-css }
    state/error:            { value: "#d3433c", role: "form error border (--zora-peach-500 / --zora-border-alert)", status: mapped, source: saved-css }
    surface/art-pastel:     { value: "#dae2e8", role: "pastel noise-gradient art surface's average color (sampled from the bg-noise art asset) — palette-legal stand-in wherever the art itself cannot ship", status: mapped, source: computed, provenance: [hero, closing-cta] }
    # ── canonical render-role ALIASES — the shared renderers resolve these EXACT names.
    surface/primary:            { value: "#eff0f0", role: "ALIAS of neutral/canvas — canonical page-canvas role", status: mapped, source: saved-css, provenance: [hero, testimonials] }
    surface/panel:              { value: "#ffffff", role: "ALIAS of neutral/card — canonical panel/card role (white cards ON the gray canvas)", status: mapped, source: saved-css, provenance: [testimonials, workflow-cards] }
    surface/inverse:            { value: "#00235c", role: "ALIAS of surface/deep-navy — canonical dark role. NOTE: on the real page this navy is an INSET surface (media wells inside cards), never a full-width band", status: mapped, source: saved-css, provenance: [workflow-cards] }
    surface/inverse-strong:     { value: "#00235c", role: "ALIAS — Remote has ONE dark family; strong == inverse (#00235c)", status: mapped, source: saved-css, provenance: [workflow-cards] }
    accent/highlight:           { value: "#0564ff", role: "ALIAS of action/primary — canonical accent role (vivid blue; legal on light surfaces: buttons, links, eyebrows)", status: mapped, source: saved-css, provenance: [hero, closing-cta] }
    accent/highlight-on-inverse: { value: "#9bc1ff", role: "accent variant ON deep-navy surfaces (periwinkle, sea-blue-200); full-strength blue is reserved for light surfaces", status: mapped, source: saved-css, provenance: [workflow-cards] }
    text/on-primary:            { value: "#141415", role: "ALIAS of ink/primary — canonical ink-on-light role (headings; body uses the muted role)", status: mapped, source: saved-css }
    text/on-primary-muted:      { value: "#383a3d", role: "ALIAS of ink/body — canonical muted-ink-on-light role (the real body ink, --zora-text-secondary)", status: mapped, source: [saved-css, computed] }
    text/on-inverse:            { value: "#ffffff", role: "canonical ink-on-dark role (--zora-text-on-bg-accent): white text on deep-navy/deep-maroon panels", status: mapped, source: saved-css, provenance: [accordion-features, workflow-cards] }
    text/on-inverse-muted:      { value: "#9bc1ff", role: "canonical muted-ink-on-dark role — periwinkle family on navy (links/labels on accent surfaces)", status: mapped, source: saved-css, provenance: [workflow-cards] }
    text/on-accent:             { value: "#ffffff", role: "label color on the blue primary fill (--zora-btn-text-light)", status: mapped, source: saved-css, provenance: [hero, closing-cta] }
    text/ghost-on-primary:      { value: "#e7e8e9", role: "canonical ghost-on-light role — Remote has NO ghost-type device; bound to the measured light hover wash so any fallback stays on-palette", status: mapped, source: saved-css }
    border/hairline-on-primary: { value: "rgba(179,181,183,0.4)", role: "canonical hairline-on-light role — neutral-400 at 40% (footer divider family)", status: mapped, source: saved-css, provenance: [footer] }
    border/hairline-on-inverse: { value: "rgba(255,255,255,0.4)", role: "hairline-on-dark role — derived: white at the light-hairline alpha; no solid hairline is measured on navy", status: derived, source: saved-css }
  type:
    # FLAT role shape so each role can declare a loadable renderProxy.
    # Bossa is a self-hosted commercial face (site CDN woff2, NOT saved in the capture);
    # closest loadable proxy: Lexend Deca (geometric grotesque, single-story a/g).
    # Sizes are the 1440-viewport computed ramp (evidence/computed-styles.json):
    # h1 46/55.2, h2 36/43.2, h3 18/27, p 18/27. Weight 400 at EVERY heading tier
    # (fontWeightCensus: --zora-font-weight-regular dominates 61x; computed h1/h2/h3
    # all 400 — single-weight display system).
    # P1.1: every sized role carries its measured tier ladder — sizeRem is the authored
    # max-width projection (canonical base == @1440, meta.canonicalTier); `tiers` are the
    # per-viewport stamps (w<viewport>: px) from the measure ladder (computed) or the
    # source's own typography-module class registers (saved-css, mobile-first swaps at
    # 768/1024/1440/1920). h1–h6 covered: h1–h4 render on the page; h5/h6 are authored
    # from the brand's class registers (no on-page instance at any measured tier).
    display-hero:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 2.875, tablet: 2.25, mobileL: 1.75, mobile: 1.75 }, lineHeight: "1.2em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 56, source: computed }, w1440: { px: 46, source: computed }, w960: { px: 28, source: computed }, w375: { px: 28, source: computed } },
        note: "hero h1 measured 46px/55.2px @1440 (Bossa 400); 1920+ register measured 56px (7xl)" }
    h1:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 2.875, tablet: 2.25, mobileL: 1.75, mobile: 1.75 }, lineHeight: "1.2em",  weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 56, source: computed }, w1440: { px: 46, source: computed }, w960: { px: 28, source: computed }, w375: { px: 28, source: computed } },
        note: "h1 == hero register (46px @1440; 56px @1920; 28px below 1024)" }
    h2:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 2.25,  tablet: 1.75, mobileL: 1.375, mobile: 1.375 }, lineHeight: "1.2em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 46, source: computed }, w1440: { px: 36, source: computed }, w960: { px: 22, source: computed }, w375: { px: 22, source: computed } },
        note: "36px/43.2px measured @1440 (section headings; 46px @1920; vision reads 40–48px on retina crops)" }
    h3:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 1.75,  tablet: 1.375, mobileL: 1.25, mobile: 1.25 }, lineHeight: "1.2em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 36, source: saved-css }, w1440: { px: 28, source: saved-css }, w960: { px: 20, source: saved-css }, w375: { px: 20, source: saved-css } },
        note: "28px tier from the typography-module h3 register (m→l→xl→3xl swaps); the page's FIRST h3 element rides the smaller card-title register (18px @1440 measured) — class register is the h3 contract" }
    h4:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 1.375, tablet: 1.25, mobileL: 1.125, mobile: 1.125 }, lineHeight: "1.2em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 28, source: saved-css }, w1440: { px: 22, source: saved-css }, w960: { px: 18, source: saved-css }, w375: { px: 18, source: saved-css } },
        note: "22px tier; card headings (vision: 20–23px); register swaps s→m→l→xl" }
    h5:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 1.25, tablet: 1.125, mobileL: 1, mobile: 1 }, lineHeight: "1.5em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 22, source: saved-css }, w1440: { px: 20, source: saved-css }, w960: { px: 16, source: saved-css }, w375: { px: 16, source: saved-css } },
        note: "typography-module h5 register (xs→s→m→l swaps); on-page instances: workflow card headings (<h3 class=typography…__h5>, measured 20px/30px @1440 — see blocks.card slots.heading.register)" }
    h6:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 1.125, tablet: 1, mobileL: 1, mobile: 1 }, lineHeight: "1.5em", weight: 400, letterSpacing: "0em", case: sentence,
        tiers: { w1920: { px: 20, source: saved-css }, w1440: { px: 18, source: saved-css }, w960: { px: 16, source: saved-css }, w375: { px: 16, source: saved-css } },
        note: "typography-module h6 register (xs→s→m swaps at 1440/1920 only); NO on-page instance at any measured tier — class-register evidence only" }
    eyebrow:
      { family: "Bossa", renderProxy: "Lexend Deca", sizeRem: { base: 0.875, tablet: 0.75, mobileL: 0.75, mobile: 0.75 }, lineHeight: "1.5em", weight: 400, letterSpacing: "0.05em", case: uppercase,
        tiers: { w1920: { px: 14, source: saved-css }, w1440: { px: 14, source: saved-css }, w960: { px: 12, source: saved-css }, w375: { px: 12, source: saved-css } },
        note: "uppercase microlabel — the label-small register (3xs→2xs swap at 1440: 12px→14px; vision reads 14–15px on the @1440 crops), tracking --zora-letter-spacing-l (.05em); COLOR comes from the section's theme scope (--zora-label: sea-blue-600 / red-brand-600 / neutral-600)" }
    body:
      { family: "Inter", renderProxy: "Inter", sizeRem: { base: 1.125, tablet: 1, mobileL: 1, mobile: 1 }, lineHeight: "1.5em", weight: 400, case: sentence,
        tiers: { w1920: { px: 18, source: computed }, w1440: { px: 18, source: computed }, w960: { px: 16, source: computed }, w375: { px: 16, source: computed } },
        note: "p measured 18px/27px @1440 AND @1920 (paragraph register swaps at 1440 only), 16px below; ink #383a3d; Inter is a Google face — proxy loads the true family" }
    body-sm:
      { family: "Inter", renderProxy: "Inter", sizeRem: { base: 1, tablet: 0.875, mobileL: 0.875, mobile: 0.875 }, lineHeight: "1.5em", weight: 400, case: sentence,
        tiers: { w1920: { px: 16, source: saved-css }, w1440: { px: 16, source: saved-css }, w960: { px: 14, source: saved-css }, w375: { px: 14, source: saved-css } },
        note: "16px secondary body — the paragraph-small register (2xs→xs swap at 1440)" }
    control-text:
      { family: "Inter", renderProxy: "Inter", sizeRem: { base: 1.125, tablet: 1, mobileL: 1, mobile: 1 }, lineHeight: "1.5em", weight: 500, letterSpacing: "0em", case: none,
        tiers: { w1920: { px: 18, source: saved-css }, w1440: { px: 18, source: computed }, w960: { px: 16, source: saved-css }, w375: { px: 16, source: saved-css } },
        note: "UI control register — nav triggers measured Inter 18px w500 @1440; button labels ride the same register (button-module label: xs→s swap at 1440, 16px→18px)" }
    # emphasis-inside-heading law: measured across the full tier ladder — no <strong>/<b>
    # renders inside any h1–h6 on the page; hierarchy is size-only (weight 400 everywhere)
    headingEmphasis: { notObserved: true, reason: "0 strong/b-in-heading hits at 1920/1440/960/375 (computed tier ladder headingEmphasis)", source: computed }
    # counter-display / ghost-watermark / footer-sitemap-link tiers: ABSENT BY MEASUREMENT
