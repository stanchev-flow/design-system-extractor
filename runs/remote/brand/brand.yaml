# ── self-hosted font registry ──────────────────────────────────────────────────────
# Bossa is a commercial face served from the site CDN and NOT saved in this capture:
# no @font-face is emitted and the type stack falls through to the measured
# renderProxy (Lexend Deca). Drop licensed Bossa-Regular.woff2 into
# runs/remote/brand/assets/fonts/ and the display face renders real with no
# pipeline change.
selfHostedFonts:
  - family: Bossa
    faces:
      - weight: 400
        files: [Bossa-Regular.woff2, Bossa-Regular.woff]
    # P2 audit (2026-07-07): the woff2/woff files are NOT in either saved capture —
    # the source @font-face URLs point to ../media/ paths the save never downloaded
    # (checked screenshots/remote-v2/remote-com_files/ and the older
    # screenshots/remote/ capture; no font binaries on disk). Self-hosting stays
    # pending a re-capture that includes the media/ font payloads; headings render
    # in the declared fallback stack until then. Do not fetch from the network.
    note: font files absent from saved captures; registry kept for provenance, render degrades to fallback stack

