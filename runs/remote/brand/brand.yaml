# fid11 2026-07: CONTEXTUAL header-alignment grammar (brand-schema §4.4b). The source's
# one header component (label + headline + optional description/actions) aligns by its
# LAYOUT CONTEXT, not per-section whim: START-aligned whenever it sits inside a column
# of a split row, CENTERED (block + text, the source's opt-in `textCentered` modifier:
# text-align:center + align-self:center + align-items:center) when it stands alone
# atop a stacked/grid section. Generation consumes this as the brand-DEFAULT alignment
# layer: explicit section/pattern alignment facts still win (AS-18 resolution order).
layoutGrammar:
  headerContext:
    splitColumn:
      anchor: left
      counterweight: media
      evidence: "all 3 observed split patterns align the header column left with a media counterweight (layout-library: hero-inset-noise-panel, feature-accordion-deep-accent, infra-proof-split contentShape.alignment.value=left + counterweight=media); the source header component's default stance is start-aligned (css-rules: .base-header header = plain flex column; centering is the opt-in textCentered modifier)"
    standaloneStack:
      anchor: centered
      evidence: "6 of 7 observed standalone headers center block+text (layout-library: logo-marquee-strip, cta-inline-banner, partner-proof-row, badge-award-strip, cta-closing-noise value=center; testimonial-card-row header centered self-only); the ONE left standalone header (features-card-grid-navy-media) rides its own explicit pattern fact + cards counterweight, which outranks this default by resolution order"
    confidence: high
    source: [saved-css, vision]
    scope: design-language
    changelog:
      - { ts: "2026-07-09T09:55:00Z", action: created, from: null, to: "splitColumn=left / standaloneStack=centered", by: fid11, signalId: null, note: "derived from the 10 grounded patterns' measured header alignment by layout context + the source base-header module's default/textCentered mechanics" }
  # fix2 2026-07 (brand-schema §4.4f): measured multi-action row layout. The ONE
  # multi-CTA group on the capture (hero base-ctas: 'Book demo' + 'Sign up') runs
  # gap 16px, flex-wrap wrap, left-anchored in its column. Its body→group seam
  # measured 48px = the hero register rung (stack-lg x6–x7), while the module rung
  # is body-to-cta 2rem — marginAbove rides the ladder rather than freezing one
  # band's hero-register seam into the site-wide law.
  actionGroup:
    gap: 1rem
    orientation: row
    wrap: wrap
    align: start
    marginAbove: ladder
    registers: [primary, secondary]
    source: computed
    provenance: [hero]
    confidence: high
    changelog:
      - { ts: "2026-07-13T10:30:00Z", action: created, from: null, to: "gap 1rem / wrap / start / marginAbove ladder", by: fix2-action-groups, signalId: null, note: "playwright computed on capture @1440: hero .base-ctas gap 16px wrap left; seam above 48px (hero stack-lg register — the replica's hero foot currently rides the 2rem module rung: pre-existing, reported not churned)" }

buttons:
  renderHint: { useFilledButton: true, note: "Renderer MUST emit real FILLED pill buttons. Remote primary CTAs are solid blue pills; text links are a separate blue arrow device." }
  primary:
    style: filled
    bg: "#0564ff"              # sea-blue-500 — themed --zora-btn-bg ([data-zora-theme=sea-blue])
    bgHover: "#0047bc"         # sea-blue-600
    fgHover: "#ffffff"         # label stays light through the fill darken (--zora-btn-text-light both states)
    bgPressed: "#003284"       # sea-blue-700 — themed --zora-btn-bg-active
    bgDisabled: "#ccdfff"      # sea-blue-100 (label #67a1ff sea-blue-300)
    fg: "#ffffff"              # --zora-btn-text-light
    border: "none"
    radius: "2.5rem"           # --zora-radius-x4 / --zora-btn-radius-pill (40px)
    padding: "0 1.5rem"        # 0 24px measured; FIXED height 3rem (--zora-spacing-x7 = 48px)
    height: "3rem"
    font: "Inter"
    weight: 500
    sizeRem: 1.125             # 18px control register @1440
    focus: "outline 2px solid #9bc1ff; outline-offset 2px"   # themed --zora-btn-border-focused (sea-blue-200)
    confidence: high
    source: [saved-css, computed, vision]
    provenance: [hero, banner-cta, closing-cta]
    note: "Measured .button-module .primary under [data-zora-theme=sea-blue]: fill sea-blue-500, hover 600, pressed 700, disabled 100/300; pill h48 r40 pad 0 24 (computed census); label swap animation on hover (::after translate, --zora-btn-duration tokens)."
  secondary:
    style: outline
    bg: "transparent"
    border: "1px solid #003284"   # sea-blue-700 — themed --zora-btn-border-secondary (inset box-shadow ring)
    fg: "#003284"                 # themed --zora-btn-text-dark; measured 'Sign up' rgb(0,50,132)
    bgHover: "#0564ff"            # hover FILLS with sea-blue-500 (themed --zora-btn-bg-hover-secondary)
    fgHover: "#ffffff"            # label inverts to light as the fill slides in; outline melts (inset shadow -> transparent)
    bgPressed: "#0047bc"          # themed --zora-btn-bg-active-secondary (sea-blue-600)
    radius: "2.5rem"
    padding: "0 1.5rem"
    height: "3rem"
    font: "Inter"
    weight: 500
    sizeRem: 1.125
    confidence: high
    source: [saved-css, computed, vision]
    provenance: [hero, partner-logos, testimonials, badge-strip]
    note: "Hero 'Sign up' + the quiet proof-section pills ('Become a Partner', 'Hear from our customers', '4,000+ reviews'). Vision reads the quiet pills with near-ink labels — same outlined family on neutral scope (border/label #141415-family); the sea-blue scope yields the deep-blue variant."
  tertiary:
    style: filled-neutral
    bg: "#232325"              # neutral-800 — :root --zora-btn-bg (outside the theme scope)
    bgHover: "#595b5f"         # neutral-600
    fgHover: "#ffffff"         # label unchanged — white on both neutral fills (--zora-btn-text-light)
    bgPressed: "#383a3d"       # neutral-700 — :root --zora-btn-bg-active
    bgDisabled: "#d2d3d5"      # neutral-300 (label #b3b5b7)
    fg: "#ffffff"
    radius: "2.5rem"
    padding: "0 1.5rem"
    height: "3rem"
    font: "Inter"
    weight: 500
    sizeRem: 1.125
    confidence: high
    source: [saved-css, computed]
    provenance: [navbar]
    note: "The default .button at :root scope — near-black neutral pill (nav 'Book demo', measured white label + r40 + h48)."
  textCta:
    style: text-link-arrow
    fg: "#0564ff"              # --zora-link (sea-blue-500)
    fgHover: "#0047bc"         # --zora-link-hover (sea-blue-600)
    decoration: "no underline idle; hover darkens to #0047bc; trailing arrow glyph rides inline"
    radius: "0"
    font: "Inter"
    weight: 500
    sizeRem: 1
    # fix2 2026-07: the trailing glyph is the site's own inline SVG (link-module
    # arrowIcon, 16×16 viewBox, currentColor path) — harvested verbatim from the
    # capture to assets/icon-arrow-link.svg. width/height 16px measured on the
    # rendered links.
    glyph: { asset: icon-arrow-link.svg, size: 1rem, source: computed }
    confidence: high
    source: [saved-css, vision]
    provenance: [workflow-cards, testimonials]
    note: "'Learn more →' / 'See all integrations →' / 'Read customer story →' links (link-module + testimonial-card link: hover color --zora-link-hover). 16px w500."

contracts:
