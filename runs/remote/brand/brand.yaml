    list-item-inset:       { value: "1.5rem", role: "disclosure item inset — --accordion-item-padding (x4=16px base → x5=24px ≥1440; the trigger row's own padding inside the item box)", modeLadder: { base: "1.5rem", tablet: "1rem", mobileL: "1rem", mobile: "1rem" }, status: mapped, source: saved-css }
    mark-to-quote:         { value: "1.5rem", role: "quote-card mark→quote seam — testimonial card root gap (x5=24px ≥768; the logo mark to quote-body seam inside the card column)", status: mapped, source: saved-css }
    quote-to-attribution:  { value: "4rem",  role: "quote-card body→attribution seam — testimonial card frame gap (x6=32px base → x7=48px ≥1024 → x8=64px ≥1440; quote body to author row)", modeLadder: { base: "4rem", tablet: "3rem", mobileL: "2rem", mobile: "2rem" }, status: mapped, source: saved-css }
    strip-gap:             { value: "4rem",  role: "logo/badge strip inter-mark gap — --zora-s-p-logos-container-column-gap (x6=32px base → x7=48px ≥768 → x8=64px ≥1440)", modeLadder: { base: "4rem", tablet: "3rem", mobileL: "2rem", mobile: "2rem" }, status: mapped, source: saved-css }
