layouts:
  - id: navbar
    archetype: nav
    index: 0
    surfaceMode: { mode: "base (Primary)" }
    useCase: "Top nav riding the canvas color (transparent sticky bar): wordmark left, pill-hover nav triggers center, Login + language switcher + near-black 'Book demo' pill right. A dismissible promo utility banner may sit above."
    whenToUse: "Always — global chrome."
    slots:
      - { name: "brand",    type: media,   role: "Remote wordmark", asset: "remote-wordmark.svg" }
      - { name: "navlinks", type: content, role: "primary nav triggers (pill hover wash #e7e8e9, radius 40)" }
      - { name: "actions",  type: content, role: "Login link + neutral filled Book demo pill" }
    gridRules:  { columns: "auto", justify: "space-between", align: center }
    widthRules: { container: "contained", measure: "1216px content max" }
  - id: hero
    archetype: split
    index: 1
    patternRef: { lib: project, id: hero-inset-noise-panel }
    surfaceMode: { mode: "base (Primary)", note: "inset ~20px-rounded noise-art panel on the canvas" }
    useCase: "Hero: left content stack (h1 → body → blue filled pill + outlined pill) beside a right globe illustration with floating product-UI status cards, all inside the rounded pastel noise panel."
    whenToUse: "Page opener."
    slots:
      - { name: "heading", type: content, role: "display heading (Bossa 400 sentence)" }
      - { name: "body",    type: content, role: "supporting paragraph" }
      - { name: "actions", type: content, role: "primary filled pill + secondary outlined pill" }
      - { name: "media",   type: media,   role: "globe/product illustration", assets: [ "hero-globe-illustration.webp" ] }
    gridRules:  { columns: "1fr 1fr", justify: "space-between", align: center }
    widthRules: { container: "wide", measure: "content ~50%" }
  - id: logo-wall
    archetype: stack
    index: 2
    patternRef: { lib: project, id: logo-marquee-strip }
    eyebrowRegister: ink/secondary  # gray family — grounding section-01 eyebrow ~#6b7078
    surfaceMode: { mode: "base (Primary)" }
    useCase: "Customer-proof strip: uppercase gray eyebrow caption over a single row of monochrome customer logo vectors (~40px, 64–100px gaps)."
    whenToUse: "Directly after the hero."
    slots:
      - { name: "caption", type: content, role: "uppercase microlabel ('GLOBAL COMPANIES GROW WITH REMOTE')" }
      - { name: "logos",   type: media,   role: "12 monochrome ink logo SVGs, spaced row", assets: [ "logo-anthropic.svg", "logo-box.svg", "logo-byd.svg", "logo-datadog.svg", "logo-gitlab.svg", "logo-heineken.svg", "logo-kfc.svg", "logo-lovable.svg", "logo-mercury.svg", "logo-miro.svg", "logo-mizuho.svg", "logo-vercel.svg" ] }
    gridRules:  { columns: "logo row", justify: "center", align: center }
    widthRules: { container: "full-bleed row", measure: "64–100px column gap" }
  - id: feature-accordion
    archetype: split
    index: 3
    patternRef: { lib: project, id: feature-accordion-deep-accent }
    eyebrowRegister: accent/crimson  # red theme scope — grounding section-02 eyebrow ~#a01f38
    surfaceMode: { mode: "base (Primary)" }
    useCase: "Product accordion (red theme scope): crimson eyebrow + h2, left accordion list (idle: hairline rows; hover: pink wash; ACTIVE: deep-maroon inset panel w/ white ink + circle-arrow) beside right product-UI media on a grid-lined well."
    whenToUse: "Primary feature exploration."
    slots:
      - { name: "eyebrow", type: content, role: "crimson uppercase label ('HOW WE DO IT')" }
      - { name: "heading", type: content, role: "section h2" }
      - { name: "list",    type: content, role: "accordion items w/ deep-accent active state" }
      - { name: "media",   type: media,   role: "product UI collage (profile card + task list)" }
    gridRules:  { columns: "1fr 1fr", justify: "space-between", align: start }
    widthRules: { container: "contained", measure: "two-col holder, 140px gap" }
  - id: infra-panel
    archetype: split
    index: 4
    patternRef: { lib: project, id: infra-proof-split }
    eyebrowRegister: accent/eyebrow-blue-deep  # blue theme scope — grounding section-03 eyebrow ~#1d5ce0
    surfaceMode: { mode: "base (Primary)" }
    useCase: "Deep-dive proof split: product-UI card stack LEFT (payroll/compliance white cards on a grid-lined well), blue eyebrow + h2 + long proof body RIGHT."
    whenToUse: "Trust/architecture narrative."
    slots:
      - { name: "media",   type: media,   role: "stacked product-UI proof cards", assets: [ "panel-infrastructure-ui-snippet.webp" ] }
      - { name: "eyebrow", type: content, role: "blue uppercase label ('INTELLIGENT INFRASTRUCTURE')" }
      - { name: "heading", type: content, role: "section h2" }
      - { name: "body",    type: content, role: "supporting copy w/ compliance proof terms" }
    gridRules:  { columns: "1fr 1fr", justify: "space-between", align: center }
    widthRules: { container: "contained" }
  - id: banner-cta
    archetype: stack
    index: 5
    patternRef: { lib: project, id: cta-inline-banner }
    surfaceMode: { mode: "base (Primary)", note: "rounded inset panel w/ soft green glow at the bottom edge" }
    useCase: "Inline conversion banner: centered h2 question + ONE filled blue pill on a rounded inset panel."
    whenToUse: "Mid-page conversion moment."
    slots:
      - { name: "heading", type: content, role: "centered h2 (question form)" }
      - { name: "action",  type: content, role: "single filled blue pill" }
    gridRules:  { columns: "single", justify: "center", align: center }
    widthRules: { container: "contained", measure: "centered, generous inner padding" }
  - id: workflow-cards
    archetype: cards
    index: 6
    patternRef: { lib: project, id: features-card-grid-navy-media }
    eyebrowRegister: accent/eyebrow-blue-deep  # blue theme scope — grounding section-05 eyebrow ~#1c50d8
    surfaceMode: { mode: "base (Primary)" }
    useCase: "White card grid (3 col, ~33px gap): deep-navy media well on top (product art), then blue eyebrow label, heading, body. Section header: blue eyebrow ('INTEGRATIONS, API, AND MCP') + h2."
    whenToUse: "Feature/workflow sets."
    slots:
      - { name: "heading", type: content, role: "section header stack (eyebrow + heading)" }
      - { name: "cards", type: content, role: "white cards w/ navy media wells", assets: [ "card-api-first.webp", "card-integrations.webp", "card-mcp-agents.webp" ] }
    gridRules:  { columns: "repeat(3)", gap: "2rem" }
    widthRules: { container: "contained" }
  - id: partner-logos
    archetype: stack
    index: 7
    patternRef: { lib: project, id: partner-proof-row }
    eyebrowRegister: ink/secondary  # gray family — grounding section-06 eyebrow ~#6b6f6c
    surfaceMode: { mode: "base (Primary)" }
    useCase: "Partner proof: gray eyebrow + h2 + body centered, row of 4 colored partner logos (~40–64px tier, one in a bordered white card), one outlined pill."
    whenToUse: "Ecosystem/partnership proof."
    slots:
      - { name: "heading", type: content, role: "centered header stack ('THE GLOBAL PAYROLL BACKBONE')" }
      # asset ORDER is source order (grounding section-06 + crop: Workday card first,
      # then Gusto, BambooHR, Personio) — not filename order.
      - { name: "logos",   type: media,   role: "4 partner logos (colored)", assets: [ "logo-workday-certified.webp", "logo-gusto.webp", "logo-bamboohr.webp", "logo-personio.webp" ] }
      - { name: "action",  type: content, role: "outlined pill ('Become a Partner')" }
    gridRules:  { columns: "centered row", justify: "center" }
    widthRules: { container: "contained" }
  - id: testimonials
    archetype: cards
    index: 8
    patternRef: { lib: project, id: testimonial-card-row }
    surfaceMode: { mode: "base (Primary)" }
    useCase: "Testimonial carousel: centered h2 + subhead, 3-up white cards (company mark top, quote, circle avatar + divider + name/role, hover-revealed 'Read customer story →' link), edge cards cut at viewport; centered outlined pill below."
    whenToUse: "Social proof."
    slots:
      - { name: "heading", type: content, role: "centered header ('A word from our customers')" }
      - { name: "cards",   type: content, role: "quote cards w/ avatars + company marks", assets: [ "avatar-luke-mckinlay.webp", "avatar-marisol-jimenez.webp", "avatar-maria-shkaruppa.webp", "logo-fountain.svg", "logo-reversetech.svg", "logo-homeproject.svg", "logo-semrush.svg" ] }
      - { name: "action",  type: content, role: "outlined pill ('Hear from our customers')" }
    gridRules:  { columns: "3-up carousel", gap: "2rem" }
    widthRules: { container: "contained" }
  - id: badge-strip
    archetype: stack
    index: 9
