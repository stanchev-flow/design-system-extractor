    variants:                    # C10 coverage — the two observed card registers
      - { id: media-well, note: "inverse-surface inset media panel on top (product art, contained), then the text stack (grounding sections 03/05)" }
      - { id: text-only,  note: "same white panel without the media well — eyebrow/heading/body/arrow only (feature grids, accordion siblings)" }
