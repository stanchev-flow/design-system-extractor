      - name: marquee-scroll
        move: "logo strip track scrolls continuously left by half its doubled width (translateX(var(--sp-offset,-50%))), linear, infinite"
        timing: "duration is JS-set via --sp-duration (CSS fallback 0s) — see motion-audit jsTimingNotes; static capture renders the strip paused"
        # fid2 2026-07: the JS-computed duration IS recoverable — the saved DOM
        # serialized the rendered inline style on the strip track:
        # style="--sp-duration: 36s" (screenshots/remote-v2/remote-com.html).
        measured: { durationS: 36, source: saved-dom-inline-style, note: "one full -50% loop of the doubled track = 36s as computed by the site's own JS at 1440" }
        sourceSelectors: ["@keyframes social-proof-module…sp-scroll", ".social-proof-module…stripTrack", "stripTrack[style*='--sp-duration']"]
      - name: mega-menu-reveal
        move: "nav dropdown panel fades+slides open (opacity/transform/visibility) while entry-card images and descriptions unfold via grid-template-rows"
        timing: "300ms across panel, card image and description (no easing declared — browser ease)"
        sourceSelectors: [".site-navigation-module…desktopPanel", ".site-navigation-module…navEntryCardImageInner", ".site-navigation-module…navEntryCardDescription"]
      - name: hover-card-reveal
        move: "work-culture image cards: hidden link row slides open (height/margin-top/opacity) while the image well shrinks and the image zooms — the brand's most expressive move"
        timing: "800ms cubic-bezier(.16, 1, .3, 1) on every property"
        sourceSelectors: [".image-grid-card-module…card:hover …", ".image-grid-card-module…imageWrap", ".image-grid-card-module…link"]
      - name: card-elevation-wash
        move: "testimonial cards raise a ::before plate on hover: surface tint to #f6f7f8 + 0 12px 24px rgba(0,0,0,.08) shadow + plate extends 8px past the bottom edge"
        timing: "500ms (no easing declared — browser ease)"
        sourceSelectors: [".testimonial-card-module…card:before", ".testimonial-card-module…cardHasLink:hover…"]
      - name: modal-pop
        move: "form modal: backdrop fades in; popup scales .97→1 while translating 8px up (sheet evidence only — no modal renders on the captured page)"
        timing: "backdrop 300ms / popup 250ms"
        sourceSelectors: ["@keyframes form-modal-module…backdropIn", "@keyframes form-modal-module…popupIn"]
      - name: accordion-state-shift
        move: "feature accordion: trigger background/ink/corner-rounding shift on the state tier, chevron rotates on the move tier, panel height animates on the move tier"
        timing: "trigger 150ms; chevron + panel height 200ms"
        sourceSelectors: [".accordion-module…trigger", ".accordion-module…triggerChevron", ".accordion-module…panel"]
