    provenance: [hero, infra-panel, testimonials]
    confidence: high
  button:
    origin: extracted
    use: always
    variant: filled-primary
    rules: [ "PRIMARY actions are FILLED blue pills with white labels — never typographic; secondary is a deep-blue outlined pill that FILLS blue on hover; neutral near-black pill for chrome CTAs; all pills 48px tall, 40px radius, content-hugging" ]
    provenance: [hero, banner-cta, closing-cta, navbar]
    confidence: high
  link:
    origin: extracted
