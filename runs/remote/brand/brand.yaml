# BRAND SIGNATURES (pass1 2026-07; brand-schema §4.7) — the 3-5 moves that make
# Remote recognizable, each a MACHINE-CHECKABLE always/never rule verified by
# brand_pipeline/signature_audit.py on every gated page. Generic kinds, brand
# values; every entry cites the evidence that licenses it.
signatures:
  - id: action-blue-scope
    kind: accent-scope
    mode: never
    claim: >-
      The sea-blue action family (#0564ff / #0047bc / #003284) is a CONTROL ink:
      pill fills, secondary pill ink/borders, inline links + arrow glyphs, and the
      deep-blue eyebrow register. It never paints body copy, headings, or section
      surfaces.
    check:
      colors: ["#0564ff", "#0047bc", "#003284"]
      allowedRoles: [action, link, glyph, eyebrow, mark]
      maxPaintSharePct: 2.0
    evidence:
      - "buttons.primary: fill sea-blue-500 #0564ff, hover 600, pressed 700 (saved-css + computed census)"
      - "tokens.colors: text/link #0564ff, accent/eyebrow-blue-deep #0047bc — link + eyebrow are licensed blue ink roles"
      - "measured accent paint share: replica 0.40% of page paint, event-genlaunch 0.30% — budget 2.0% is ~5x the replica share"
    confidence: high
    source: [computed, saved-css]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block — authored from existing captured evidence, no re-extraction" }
  - id: pill-controls
    kind: shape-motif
    mode: always
    claim: >-
      Every button is a PILL — fixed 48px height, fully-rounded 40px radius, 0/24px
      inset. The pill silhouette is the brand's most recognizable control shape.
    check:
      buttons: { pill: true }
    evidence:
      - "buttons.primary/secondary/tertiary: radius 2.5rem, height 3rem, padding 0 1.5rem — measured on every CTA in the census (hero, banner-cta, closing-cta)"
      - "tokens.radius.button 2.5rem (--zora pill register); never-typographic-primary rule"
    confidence: high
    source: [computed, saved-css]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block" }
  - id: single-display-family-light-weights
    kind: type-treatment
    mode: always
    claim: >-
      One display family end to end — every heading rank speaks Bossa (proxy Lexend
      Deca) at weight ≤ 500; running text and controls speak Inter. No rank ever
      goes bold(700): hierarchy is size, never weight.
    check:
      probes:
        - { "on": display, familyIncludesAny: ["Bossa", "Lexend Deca"], weightMax: 500 }
        - { "on": heading, familyIncludesAny: ["Bossa", "Lexend Deca"], weightMax: 500 }
        - { "on": body, familyIncludesAny: ["Inter"] }
        - { "on": button, familyIncludesAny: ["Inter"], weightMax: 500 }
    evidence:
      - "computed-styles.json: h1 Bossa 46px w400; tokens.type h1-h6/display/eyebrow family Bossa"
      - "tokens.type.body family Inter w400; buttons.* font Inter w500 (computed census)"
    confidence: high
    source: [computed]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block" }
  - id: crimson-never-actions
    kind: accent-scope
    mode: never
    claim: >-
      The crimson/maroon family (#a52d44 / #511621 / #742030) is the STORYTELLING
      emphasis family — the one inverted deep-maroon card, icon strokes, warm wash
      chips. It never paints an action control: conversion stays blue.
    check:
      colors: ["#a52d44", "#511621", "#742030"]
      forbiddenRoles: [action]
    evidence:
      - "tokens.colors: accent/crimson #a52d44, surface/deep-accent #511621 (+hover #742030) — the accordion's ONE inverted card (voice.md emphasis devices)"
      - "buttons.* facts carry no crimson state at any tier — every measured CTA is the blue family"
    confidence: high
    source: [computed, vision]
    changelog:
      - { ts: "2026-07-14T15:00:00Z", action: created, from: null, to: authored, by: user, signalId: null, note: "pass1 signatures block" }
  - id: light-canvas-sections
    kind: surface-habit
    mode: always
    claim: >-
      Sections live on ONE continuous light canvas (#eff0f0 / #f6f7f8 / #ffffff /
      pastel noise-art #dae2e8) — separation is breathing room, never a surface cut.
      Deep navy and crimson appear only as NESTED plates (media windows, the one
      maroon card), never as a section surface.
    check:
      sectionMinLuminance: 0.5
    evidence:
      - "surfaceGrammar.pageRhythm: hero-noise -> primary x8 -> hero-noise -> raised — no dark band in the brand's own rhythm"
      - "replica section census @1440: every sec-N bg #eff0f0/#f6f7f8; deep-navy #00235c appears only inside workflow-card media windows (nesting: inverse <- panel)"
      - "voice.md creative direction: 'One continuous light canvas end-to-end; sections separated by breathing room, never by surface cuts'"
    confidence: high
