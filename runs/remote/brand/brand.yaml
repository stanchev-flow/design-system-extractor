    # Authored from evidence/motion-audit.json (mine-motion stage: per-selector
    # transition/animation/@keyframes audit of the fresh capture's module CSS —
    # 102 transition rules, 20 animation rules, 22 keyframes, 8 timing custom
    # properties). Durations are the census ladder (counts cited); easings are the
    # mined curves; signature moves cite their source selectors. Selectors are
    # PROVENANCE (the source site's classnames), never names to reuse.
    durations:
      micro:      { value: "100ms", role: "hover washes on dense option lists (select/multi-select .option background .1s)", census: 4, source: motion-audit }
      state:      { value: "150ms", role: "THE state tier — color/background-color/border state shifts (nav links, accordion triggers, button ink, language items)", census: 46, source: motion-audit }
      move:       { value: "200ms", role: "small transforms + fades (chevron rotate .2s, accordion panel height .2s, opacity fades, skip-link slide)", census: 23, source: motion-audit }
      collapse:   { value: "250ms", role: "structural collapse + hover-out exits (footer group grid-rows .25s, menu toggle bars, --zora-btn-duration-hover-out .25s, modal popupIn)", census: 19, source: motion-audit }
      reveal:     { value: "300ms", role: "panel/menu reveals + hover-in enters (nav desktopPanel opacity/transform .3s, nav entry-card grid-rows .3s, --zora-btn-duration-hover-in .3s, modal backdropIn)", census: 38, source: motion-audit }
      elevation:  { value: "500ms", role: "card hover plate (testimonial card ::before background/box-shadow/bottom .5s — the tint+shadow wash)", census: 4, source: motion-audit }
      expressive: { value: "800ms", role: "large hover card reveals (image-grid link row height/margin/opacity .8s + image zoom .8s — always paired with the expo-out curve)", census: 8, source: motion-audit }
    easings:
      - { value: "cubic-bezier(0, 0, .2, 1)",  use: "ENTER (decelerate) — --zora-btn-easing-enter + --zora-btn-easing-press", census: 25, source: motion-audit }
      - { value: "cubic-bezier(.4, 0, 1, 1)",  use: "EXIT (accelerate) — --zora-btn-easing-exit", census: 14, source: motion-audit }
      - { value: "cubic-bezier(.16, 1, .3, 1)", use: "EXPRESSIVE expo-out — reserved for the 800ms card reveals", census: 8, source: motion-audit }
      - { value: "ease", use: "browser default on the short state tier (most 150/200ms transitions leave easing unspecified) + 3 explicit uses", census: 3, source: motion-audit }
      - { value: "linear", use: "marquee track only (sp-scroll keyframes, infinite)", census: 1, source: motion-audit }
    signatureMoves:
      - name: cta-arrow-swap
        move: "CTA arrow icon exits right by --zora-btn-arrow-travel (16px) fading out, then re-enters from the left (opacity swap at the 45%/45.1% keyframes); hover-in 300ms enter curve, hover-out 250ms exit curve"
