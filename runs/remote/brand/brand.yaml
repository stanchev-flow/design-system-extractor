      media:   { use: optional, note: "deep-navy media well (surface/inverse INSET)" }
      eyebrow: { use: optional, note: "uppercase theme-colored label" }
      heading: { use: require, register: h5, note: "card headings ride the h5 type register — measured 20px/30px Bossa 400 @1440 (saved-capture DOM: <h3 class=typography…__h5> on the workflow cards)" }
      body:    { use: optional }
      action:  { use: optional, note: "blue text-link with trailing arrow" }
    provenance: [workflow-cards, testimonials, infra-panel]
    confidence: high
  form:
