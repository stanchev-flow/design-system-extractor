# ── HERO DISPLAY LAW — the brand's committed hero-only display treatment (added with the
#    cross-brand contamination fix so this frozen snapshot keeps re-rendering its arms
#    byte-identically: compose_page now emits the #sec-0 brand-over-style override only
#    when the brand declares it, instead of unconditionally for every styled page).
heroDisplay:
  align: centered
  color: accent
  weightRole: display-hero

# ── self-hosted font registry — mirrors runs/woodwave/brand/brand.yaml (added with the
#    cross-brand contamination fix: the pipeline's legacy module-level Melodrama registry
#    was deleted, so this frozen snapshot must declare its own faces to keep re-rendering
#    byte-identically). Files live under assets/fonts/, woff2 preferred + ttf kept.
selfHostedFonts:
  - family: Melodrama
    faces:
      - weight: 300
        files: [Melodrama-Light.woff2, Melodrama-Light.ttf]
      - weight: 400
        files: [Melodrama-Regular.woff2, Melodrama-Regular.ttf]
      - weight: 500
        files: [Melodrama-Medium.woff2, Melodrama-Medium.ttf]
      - weight: 600
        files: [Melodrama-Semibold.woff2, Melodrama-Semibold.ttf]
      - weight: 700
        files: [Melodrama-Bold.woff2, Melodrama-Bold.ttf]

# ── CANONICAL LAYOUTS — archetype + surface intent + slots (blocks/media) + intent blockMapping.
#    Webflow scaffold/component ids live under targetMappings.webflow.layouts.<id>.
layouts:
  - id: opening-bookend
    archetype: stack          # composite hero: display-text-over-media + media-over-media via absolute offsets (SIGN-OFF #5)
    surfaceIntent: surface/inverse
    slots:
      - { name: "main", role: "display title over layered photo collage", fill: [logo, header, image] }
    gridRules:   { columns: 1, stagger: true, overlap: true, gap: { value: "module" }, confidence: high, source: creation, scope: design-language, changelog: [] }
    widthRules:  { container: "full-bleed", measure: "centered display title; media wide", confidence: high, source: creation, scope: design-language, changelog: [] }
    overlapRules: { types: [ display-text-over-media, media-over-media ], zOrder: [ media, text ], offsets: { titleOverMediaTop: "~-2.75rem", secondMediaAnchor: "center-right", secondMediaCrossesBottom: "~50%" }, confidence: high, source: creation, scope: design-language, changelog: [] }
    blockMapping:
      - { slot: "main", role: "wordmark (nav)",      contract: "logo",    usage: { variant: inverse } }
      - { slot: "main", role: "display title",       contract: "header",  usage: { heading: "WOODWAVE GALLERY", level: display, case: upper } }
      - { slot: "main", role: "hero photography",    contract: "image",   usage: { ratio: landscape, radius: "0" } }
      - { slot: "main", role: "overlap photography", contract: "image",   usage: { ratio: portrait, radius: "0" } }
    patternRef: { lib: project, id: hero-display-over-staggered-media }   # -> layout-library.yaml (§4.4)
    confidence: high
    provenance: [opening-bookend]
  - id: editorial-collage
    archetype: collage          # composite — no single scaffold; compose from primitives + absolute offsets
    surfaceIntent: surface/primary
    slots:
      - { name: "main", role: "loose single-column field of [media + micro-caption + offset paragraph] modules", fill: [content-block] }
    gridRules:   { columns: 1, stagger: "alternating-anchors", overlap: "ghost-watermark-behind", gap: { value: "7.5rem" }, confidence: high, source: creation, scope: design-language, changelog: [] }
    widthRules:  { container: "wide", measure: "~1/3 container for body", confidence: high, source: creation, scope: design-language, changelog: [] }
    overlapRules: { types: [ text-over-ghost-watermark ], zOrder: [ ghost-watermark, media, text ], confidence: high, source: creation, scope: design-language, changelog: [] }
    blockMapping:
      - { slot: "main", role: "module media",     contract: "image",     usage: { radius: "0" } }
      - { slot: "main", role: "micro-caption",    contract: "eyebrow",   usage: { case: upper } }
      - { slot: "main", role: "offset paragraph", contract: "paragraph", usage: { measure: "~1/3 container" } }
    patternRef: { lib: project, id: editorial-ghostword-collage }   # -> layout-library.yaml (§4.4)
    confidence: high
    provenance: [about-run]
  - id: info-band
    archetype: split
    surfaceIntent: surface/inverse
    slots:
      - { name: "media", role: "flush hard-edged photo", fill: [image] }
      - { name: "panel", role: "cream panel with title + ruled action rows", fill: [header, link] }
    gridRules:   { columns: 2, stagger: false, overlap: false, gap: { value: "0" }, confidence: high, source: creation, scope: design-language, changelog: [] }
    widthRules:  { container: "standard", measure: "split halves", confidence: high, source: creation, scope: design-language, changelog: [] }
    overlapRules: { types: [], zOrder: [ media, panel, text ], confidence: medium, source: creation, scope: design-language, changelog: [] }
    blockMapping:
      - { slot: "media", role: "photo",       contract: "image",  usage: { radius: "0" } }
      - { slot: "panel", role: "panel title", contract: "header", usage: { level: h3 } }
      - { slot: "panel", role: "action row",  contract: "link",   usage: { label: "Buy Tickets", variant: arrow } }
    patternRef: { lib: project, id: features-flush-split-panel }   # -> layout-library.yaml (§4.4)
    confidence: high
    provenance: [info-band]
  - id: conversion-stack
    archetype: stack
    surfaceIntent: surface/primary
    slots:
      - { name: "main", role: "centered narrow column: eyebrow -> heading -> underline input", fill: [header, form] }
    gridRules:   { columns: 1, stagger: false, overlap: false, gap: { value: "1.5rem" }, confidence: high, source: creation, scope: design-language, changelog: [] }
    widthRules:  { container: "narrow", measure: "narrow centered", confidence: high, source: creation, scope: design-language, changelog: [] }
    overlapRules: { types: [], zOrder: [ text ], confidence: high, source: creation, scope: design-language, changelog: [] }
    blockMapping:
      - { slot: "main", role: "eyebrow", contract: "eyebrow", usage: {} }
      - { slot: "main", role: "heading", contract: "header",  usage: { level: h2 } }
      - { slot: "main", role: "newsletter form (underline only)", contract: "form", usage: { variant: underline } }
    patternRef: { lib: project, id: cta-underline-conversion-stack }   # -> layout-library.yaml (§4.4)
    confidence: high
    provenance: [conversion]

compositionRules:
  - id: overlap-primary-ornament
    statement: "Overlap is the brand's primary ornament. Sanctioned types only: display-text-over-media, media-over-media, panel-over-media, media-over-seam."
    value: { sanctioned: [ display-text-over-media, media-over-media, panel-over-media, media-over-seam ] }
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "4 sanctioned overlap types", by: creation, signalId: null, note: "" } ]
  - id: z-order
    statement: "ghost watermark (back, aria-hidden) -> media rectangles -> panels -> text. Text never trapped beneath media."
    value: [ ghost-watermark, media, panels, text ]
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "z-order ladder", by: creation, signalId: null, note: "" } ]
  - id: stagger-anchors
    statement: "Consecutive collage modules alternate horizontal anchors (far-left -> center-right -> left); offsets ~1/3 of container, not subtle."
    value: { pattern: alternating, offset: "~1/3 container" }
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "alternating anchors", by: creation, signalId: null, note: "" } ]
  - id: composite-via-offsets
    statement: "Composite archetypes (collage/overlay/band) are realized with absolute offsets inside the nearest scaffold slot; no dedicated composite components are created."
    value: { mechanism: "absolute-offset-in-stack", newComponents: false }
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-15T00:00:00Z", action: created, from: null, to: "offsets-in-stack, no new components", by: creation, signalId: null, note: "SIGN-OFF #5" } ]
  - id: seam-bridging-photo
    statement: "A small foreground photo may straddle a dark->light seam. Optional device, not default; never on every seam."
    value: { default: false }
    confidence: low
    source: creation
    scope: one-off
    changelog: [ { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "optional seam bridge", by: creation, signalId: null, note: "observed once; low confidence as repeatable pattern" } ]

# ── THREE RULE LISTS: do[] (positive house style) / avoid[] (soft) / neverDo[] (hard).
# do[]: POSITIVE house style only. Rows that merely INVERT a neverDo (e.g. the former
# `typographic-actions` = no-buttons, `uppercase-didone-display` = no-default-fonts) were
# removed as redundant — the neverDo (+ primitive use/variant/remapFrom bindings) are the
# single source of truth. Primitive/block `designedFrom.do` tags may still name those ids
# descriptively.
do:
  - { id: margin-captions,       statement: "Photo captions live in the margin as uppercase eyebrows.", value: true, confidence: high, source: creation, scope: design-language,
      changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "margin captions", by: creation, signalId: null, note: "v0 split: implied by no-text-on-photos + snapshot" } ] }
  - { id: overlap-as-ornament,   statement: "Use overlap as the primary ornament (sanctioned types only).", value: true, confidence: high, source: creation, scope: design-language,
      changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "overlap as ornament", by: creation, signalId: null, note: "v0 split: from compositionRules.overlap-primary-ornament" } ] }
  - { id: surface-flip-hierarchy, statement: "Carry hierarchy with type size, surface flips, and overlap — not interface chrome.", value: true, confidence: high, source: creation, scope: design-language,
      changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "surface-flip hierarchy", by: creation, signalId: null, note: "v0 split: from snapshot" } ] }

avoid:
  # `prefer-asymmetry` is KEPT: it is the soft form of no-centered-everything AND the brand
  # corroboration the gate reads to bless the hero #sec-0 centered override
  # (onbrand_check.detect_brand_overrides). `accent-sparingly` was removed as redundant —
  # it is fully covered by neverDo.no-accent-on-light.
  - { id: prefer-asymmetry,      statement: "Prefer anchored/asymmetric editorial runs; reserve centering for bookend/conversion stacks.", value: true, confidence: medium, source: creation, scope: design-language,
      changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "prefer asymmetry", by: creation, signalId: null, note: "v0 split: soft form of no-centered-everything" } ] }

neverDo:
  - { id: no-buttons,           statement: "No filled, outlined, or pill buttons - all actions are typographic with arrows/slashes.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-radius,            statement: "No rounded corners anywhere (radius globally 0).", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-shadows,           statement: "No drop shadows, borders, or mats on media or panels - separation is fill contrast only.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-gradients,         statement: "No gradients, tints, or fade transitions between sections - hard cuts only.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-cards-on-cream,    statement: "No cards on the cream canvas - light-canvas content is open collage, never boxed.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-accent-on-light,   statement: "No accent color on light surfaces; no accent-colored links or icons.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-boxed-inputs,      statement: "No boxed/filled form inputs - underline only, inline text submit.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-text-on-photos,    statement: "No text overlaid directly on photographs (captions live in the margin). Display title over media in the bookend is the sanctioned exception.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-section-hairlines, statement: "No hairline rules between sections.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-default-fonts,     statement: "No default/system or generic sans for display - all display tiers use the self-hosted didone display face (Melodrama; Playfair Display / serif fallback).", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
  - { id: no-centered-everything, statement: "Centering is reserved for conversion and bookend stacks; editorial runs are anchored/asymmetric.", value: true, confidence: high, source: creation, scope: design-language, changelog: [] }

voice:
  ref: "./voice.md"
  # ── MOTION spec (authored, DEFINED) — calm/editorial, NO playful bounce. Concrete values
  #    are consumed by the composer (component_render.motion_vars_css -> --c-* vars) and
  #    projected into brand.md (render_brand_md §Motion). Inspired by Claude's design guide.
  motionSpec:
    state: defined
    easing:
      primary: "cubic-bezier(.22, 1, .36, 1)"   # expressive ease-out; no overshoot/spring
    durations:
      fast: "320ms"   # micro-interactions (arrow nudge, small-link underline draw)
      base: "480ms"   # default link underline draw-in / hover transitions
      slow: "620ms"   # scroll-reveal fade + translateY
    # link/scrollReveal carry VALUES only; the behavioral description of each (and the
    # forbidden bounce/spring/overshoot/snap list) lives in the base style Motion section —
    # not restated here (single source of truth).
    link:
      mode: color-shift                       # measured: nav/footer links swap to the gold link-hover (#edd580)
      value: "color-shift-to-gold"
    scrollReveal:
      value: "fade-translateY"
      translateY: "16px"   # within the authored ~12-24px range
    reducedMotion: "respect"   # honor prefers-reduced-motion: reduce — disable transitions/reveals
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-07-01T00:00:00Z", action: created, from: null,
          to: "authored motion spec (ease + 320/480/620ms + draw-in underline + fade-translateY reveal; reduced-motion respected)",
          by: creation, signalId: null, note: "borrowed concrete motion spec (inspired by Claude's design guide); calm/editorial, no bounce" }
  dials:
    variance: { value: high, confidence: high, source: creation, scope: design-language, changelog: [] }
    motion:   { value: low,  confidence: high, state: defined, source: creation, scope: design-language, changelog: [ { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: low, by: creation, signalId: null, note: "hover behavior inferred, not observed" }, { ts: "2026-07-01T00:00:00Z", action: updated, from: "low (medium confidence, inferred)", to: "low (high confidence, DEFINED)", by: creation, signalId: null, note: "intensity stays calm/low but is now an authored spec (voice.motionSpec), not inferred" } ] }
    density:  { value: low,  confidence: high, source: creation, scope: design-language, changelog: [] }

recipePolicy:
  scaffoldFirst:         { value: true, confidence: high, source: creation, scope: design-language, changelog: [] }
