# brand.yaml — canonical, library-AGNOSTIC design language for WoodWave Gallery
# Authored by the Layout Analyst (brand-layout-analyst), owned by the Art Director
# (brand-art-director). source: creation. This file is CANONICAL; brand.md is a rendered
# projection — run render_brand_md.py. (SIGN-OFF #6) This file INDEXES the existing build
# artifacts under `indexes`; it references them and does NOT supersede or replace them.
#
# v0 schema (brand-schema.md): tokens carry INTENT + value only (library-agnostic);
# all Webflow-specific ids live under the optional, non-canonical `targetMappings:` block,
# consumed later only by the DEFERRED Webflow Assembler. The build target NOW is
# Tailwind/shadcn (intent -> classes). Rules are three lists: do[] / avoid[] / neverDo[].

version: "2.0"

brand:
  name: "WoodWave Gallery"
  sourceUrl: "https://woodwavegallery.webflow.io"
  snapshot:
    value: >-
      A warm, two-tone editorial system for a photography gallery. Signature motifs:
      a single high-contrast didone serif set uppercase at every display tier; a cream
      canvas with deep warm-brown bookend bands; enormous ghost watermark words behind
      content; a staggered photographic collage with marginal micro-captions; and a
      muted gold accent reserved for dark surfaces.
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-12T00:26:00Z", action: created, from: null,
          to: "editorial two-tone didone system", by: creation, signalId: null,
          note: "first-pass extraction from live site" }

# Shared universal vocabulary (defined ONCE, never redefined per-brand).
contracts:
  primitives: "../../../brand_pipeline/contracts/primitives.yaml"
  blocks:     "../../../brand_pipeline/contracts/blocks.yaml"

# (SIGN-OFF #6) brand.yaml sits ABOVE these artifacts as a referencing index.
indexes:
  variableMapping:  "./variable-mapping.md"      # token -> Webflow variable bridge (authoritative ids)
  sectionRecipe:    "./section-recipe.md"         # validated per-section build recipe + role map
  webflowVariables: "./webflow-variables.json"    # proposed brand variables (pre-bridge)
  voice:            "./voice.md"                   # canonical voice doc
  sourceScreenshot: "../../../screenshots/woodwave/woodwave.webp"

# ── CANONICAL TOKENS — intent + value only (library-agnostic). Webflow ids: targetMappings.
tokens:
  colors:
    surface/primary:        { value: "#FAF0E8", role: "cream canvas background", provenance: [opening-bookend, about-run, conversion] }
    surface/panel:          { value: "#F7EFE6", role: "slightly warmer cream panel (child of inverse only)", provenance: [info-band, map-composite] }
    surface/inverse:        { value: "#3A2F23", role: "deep warm-brown bookend/band background", provenance: [opening-bookend, info-band] }
    surface/inverse-strong: { value: "#1B150F", role: "near-black strong footer band", provenance: [closing-bookend] }
    accent/highlight:       { value: "#edd580", role: "muted gold accent — dark surfaces only (aligned to the measured link-hover gold)", provenance: [opening-bookend, closing-bookend] }
    text/on-primary:        { value: "#1F1A14", role: "body/display text on cream", provenance: [about-run] }
    text/on-inverse:        { value: "#F5EDE2", role: "text on dark bands", provenance: [opening-bookend] }
    text/on-primary-muted:  { value: "#4A4239", role: "secondary/muted text on cream", provenance: [about-run] }
    text/on-inverse-muted:  { value: "#C9BFB2", role: "secondary/muted text on dark", provenance: [info-band] }
    text/ghost-on-primary:  { value: "rgba(31, 26, 20, 0.06)", role: "ghost watermark wordmark on cream", provenance: [about-run] }
    border/hairline-on-primary: { value: "rgba(31, 26, 20, 0.30)", role: "underline-input hairline on cream", provenance: [conversion] }
  type:
    display-hero:        { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 6, tablet: 4.5, mobileL: 3.5, mobile: 3 }, lineHeight: "1.05em", weight: 500, letterSpacing: "0rem", case: uppercase }
    h1:                  { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 3.5, tablet: 3, mobileL: 2.5, mobile: 2.25 }, lineHeight: "1.15em", weight: 400, letterSpacing: "0rem", case: uppercase }
    h2:                  { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 2.25, tablet: 2, mobileL: 1.875, mobile: 1.75 }, lineHeight: "1.3em", weight: 400, letterSpacing: "0rem", case: uppercase }
    h3:                  { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 1.625, tablet: 1.625, mobileL: 1.5, mobile: 1.5 }, lineHeight: "1.3em", weight: 400, letterSpacing: "0rem", case: uppercase }
    # prefix: the register's decorative text device (live eyebrows read "/ 01 — …").
    eyebrow:             { family: "Inter", sizeRem: { base: 0.6875 }, lineHeight: "1.2em", weight: 400, letterSpacing: "0.08em", case: uppercase, prefix: "/ " }
    body:                { family: "Inter", sizeRem: { base: 0.875 }, lineHeight: "1.55em", weight: 400, case: sentence }
    control-text:        { family: "Inter", sizeRem: { base: 0.875 }, lineHeight: "1.2em", weight: 400, letterSpacing: "0.08em", case: uppercase }
    counter-display:     { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 2 }, lineHeight: "1.0", weight: 400, case: none }
    ghost-watermark:     { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 26.25, tablet: 17.5, mobileL: 14, mobile: 12.5 }, lineHeight: "1.0", weight: 400, case: uppercase }
    footer-sitemap-link: { family: "Melodrama", renderProxy: "Playfair Display", sizeRem: { base: 2.5 }, lineHeight: "1.4em", weight: 400, case: uppercase }
  spacing:
    section-padding-light: { value: "6.875rem", role: "vertical section padding on cream", modeLadder: { base: "6.875rem", tablet: "5rem", mobileL: "4rem", mobile: "4rem" } }
    section-padding-dark:  { value: "6.25rem",  role: "vertical section padding on dark bands (shares light tier; minor deviation accepted)" }
    module-gap-editorial:  { value: "7.5rem",   role: "gap between collage modules" }
    caption-to-media:      { value: "0.75rem",  role: "gap between a micro-caption and its media" }
    eyebrow-to-heading:    { value: "1.5rem",   role: "gap between eyebrow and heading" }
    panel-padding:         { value: "1.75rem",  role: "inner padding of cream panels" }
    radius-global:         { value: "0rem",     role: "global corner radius — all radii zeroed" }
  surfaces:
    surface/primary:        { bg: "#FAF0E8", intent: "default cream canvas", textPrimary: text/on-primary, textAccent: null, provenance: [about-run] }
    surface/panel:          { bg: "#F7EFE6", intent: "cream panel, child of inverse only", textPrimary: text/on-primary, textAccent: null, provenance: [info-band] }
    surface/inverse:        { bg: "#3A2F23", intent: "dark bookend/band", textPrimary: text/on-inverse, textAccent: accent/highlight, provenance: [opening-bookend] }
    surface/inverse-strong: { bg: "#1B150F", intent: "strong near-black footer", textPrimary: text/on-inverse, textAccent: accent/highlight, provenance: [closing-bookend] }

surfaceGrammar:
  roles: [ surface/primary, surface/inverse, surface/inverse-strong, surface/panel ]
  pageRhythm:
    value: [ surface/inverse, surface/primary, surface/primary, surface/inverse, surface/primary, surface/inverse-strong ]
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "inverse-primary-band-primary-inverse-primary-inverse-strong", by: creation, signalId: null, note: "observed page rhythm" }
  transition:
    value: "hard-cut"
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "hard-cut", by: creation, signalId: null, note: "no gradients/fades/divider rules at seams" }
  nesting:
    - { child: surface/panel, allowedParents: [ surface/inverse ], confidence: high, source: creation, scope: design-language,
        changelog: [ { ts: "2026-06-12T00:26:00Z", action: created, from: null, to: "panel only as child of inverse", by: creation, signalId: null, note: "panel never floats on primary" } ] }

# ── BRAND PRIMITIVE OVERRIDES — FULL universal catalog (36 primitives), each marked
#    origin: extracted (observed on the WoodWave page) or designed (synthesized to be
#    brand-consistent). Each references a universal contract in contracts/primitives.yaml;
#    a brand NEVER redefines a contract — it records only this brand's usage stance.
#    extracted REQUIRES provenance[]; designed REQUIRES designedFrom{} + overridable: true.
primitives:

  # ---- EXTRACTED (observed on the page, incl. prohibition-as-signal) ----------
  heading:
    origin: extracted
    use: always
    refs: [ neverDo.no-default-fonts ]   # display tiers use the didone serif, uppercase (type tokens + neverDo)
    provenance: [opening-bookend, about-run, info-band, conversion]
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "heading override", by: creation, signalId: null, note: "v0 split: hero primitive" }
      - { ts: "2026-06-29T00:00:00Z", action: updated, from: null, to: "origin: extracted (+provenance)", by: creation, signalId: null, note: "stage-2 catalog expansion" }
  eyebrow:
    origin: extracted
    use: always
    rules: [ "micro-captions live in the margin beside media, never over photos" ]
    provenance: [about-run, info-band, conversion]
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "eyebrow override", by: creation, signalId: null, note: "v0 split: hero primitive" }
      - { ts: "2026-06-29T00:00:00Z", action: updated, from: null, to: "origin: extracted (+provenance)", by: creation, signalId: null, note: "stage-2 catalog expansion" }
  image:
    origin: extracted
    use: always
    variant: null
    refs: [ neverDo.no-radius, neverDo.no-shadows ]   # hard-edged photography: radius 0, no shadow/border/mat
    provenance: [opening-bookend, about-run, info-band]
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "image override", by: creation, signalId: null, note: "v0 split: hero primitive" }
      - { ts: "2026-06-29T00:00:00Z", action: updated, from: null, to: "origin: extracted (+provenance)", by: creation, signalId: null, note: "stage-2 catalog expansion" }
  link:
    origin: extracted
    use: always
    variant: arrow            # the brand's chosen shape from the link contract's variants
    remapFrom: cta            # WoodWave expresses the CTA role as an arrow/slash link, never a button
    refs: [ neverDo.no-buttons ]   # CTA realized as a typographic arrow/slash link (variant/remapFrom convey it); slash nav/sitemap
    provenance: [opening-bookend, info-band, conversion, closing-bookend]
    confidence: high
    source: creation
    scope: design-language
    changelog:
      - { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "link=arrow (remap of cta)", by: creation, signalId: null, note: "v0 split: WoodWave Button -> arrow-link, never filled" }
      - { ts: "2026-06-29T00:00:00Z", action: updated, from: null, to: "origin: extracted (+provenance)", by: creation, signalId: null, note: "stage-2 catalog expansion: also observed in navbar/footer slash links" }
  logo:
    origin: extracted
    use: always
    variant: inverse
    refs: [ neverDo.no-accent-on-light ]   # wordmark only; gold-on-dark (variant: inverse), never on cream
    provenance: [opening-bookend, closing-bookend]
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "logo override", by: creation, signalId: null, note: "stage-2: wordmark observed in navbar + footer" } ]
  paragraph:
    origin: extracted
    use: always
    rules: [ "body copy set narrow (~1/3 container), offset from its media; Inter, sentence case" ]
    provenance: [about-run]
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "paragraph override", by: creation, signalId: null, note: "stage-2: offset Rich Text body in editorial run" } ]
  caption:
    origin: extracted
    use: optional
    rules: [ "figure/footnote captions are muted uppercase margin micro-text, never over media" ]
    provenance: [about-run]
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "caption override", by: creation, signalId: null, note: "stage-2: margin micro-caption pattern beside collage media" } ]
  input:
    origin: extracted
    use: when-form
    variant: underline
    rules: [ "single underline rule only; inline text submit; no box or fill" ]
    provenance: [conversion]
    confidence: high
    source: creation
    scope: design-language
    conflictsWith: neverDo.no-boxed-inputs
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "input=underline", by: creation, signalId: null, note: "stage-2: ENTER YOUR EMAIL underline Lead form" } ]
  form-field:
    origin: extracted
    use: when-form
    rules: [ "label as uppercase eyebrow; underline control; no boxed rows" ]
    provenance: [conversion]
    confidence: high
    source: creation
    scope: design-language
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "form-field override", by: creation, signalId: null, note: "stage-2: underline labelled row in newsletter form" } ]
  divider:
    origin: extracted
    use: optional
    value: "only as the 1px ruled action-row bar inside panels; never as a section seam"
    rules: [ "1px ruled bars separate action/price rows inside panels; never between sections" ]
    provenance: [info-band]
    confidence: high
    source: creation
    scope: design-language
    conflictsWith: neverDo.no-section-hairlines
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "divider=ruled-action-row only", by: creation, signalId: null, note: "stage-2: ruled rows in TICKET PRICES / OPEN HOURS panel" } ]
  cta:
    origin: extracted
    use: always
    refs: [ neverDo.no-buttons ]   # CTA role always realized by the link primitive (arrow/slash), never a button
    provenance: [opening-bookend, info-band, conversion]
    confidence: high
    source: creation
    scope: design-language
    conflictsWith: neverDo.no-buttons
    changelog: [ { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "cta realized as link", by: creation, signalId: null, note: "stage-2: BUY TICKETS / SUBSCRIBE realized as arrow links" } ]
  button:
    origin: extracted              # prohibition-as-signal: the absence is a deliberate, observed brand decision
    use: never
    value: "never filled/outlined/pill; CTA role remaps to link variant=arrow"
    refs: [ neverDo.no-buttons ]   # no filled/outlined/pill buttons (use: never + value convey it)
    provenance: [opening-bookend, info-band, conversion]
    confidence: high
    source: creation
    scope: design-language
    conflictsWith: neverDo.no-buttons
    changelog:
      - { ts: "2026-06-29T00:00:00Z", action: created, from: null, to: "button=never", by: creation, signalId: null, note: "v0 split: hero prohibition" }
      - { ts: "2026-06-29T00:00:00Z", action: updated, from: null, to: "origin: extracted (prohibition-as-signal)", by: creation, signalId: null, note: "stage-2: no button anywhere on page; typographic action used instead" }

  # ---- DESIGNED (not on the page; synthesized brand-consistent from rules+tokens) --
  subheading:
    origin: designed
    use: optional
    designedFrom:
      do:      [ uppercase-didone-display, surface-flip-hierarchy ]
      neverDo: [ no-default-fonts ]
      tokens:  [ h3, text/on-primary-muted ]
      note: "no lede observed; synthesize as a smaller didone line under the heading (muted), never a generic sans sub-deck"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  label:
    origin: designed
    use: optional
    designedFrom:
      do:      [ margin-captions ]
      neverDo: [ no-default-fonts ]
      tokens:  [ eyebrow, control-text, text/on-primary-muted ]
      note: "inline labels as Inter uppercase micro-text matching the eyebrow / control-text roles"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  quote:
    origin: designed
    use: optional
    designedFrom:
      do:      [ uppercase-didone-display, surface-flip-hierarchy ]
      neverDo: [ no-cards-on-cream, no-radius, no-shadows ]
      tokens:  [ h2, text/on-primary ]
      note: "pull quote as large didone type open on the canvas; attribution as a margin eyebrow; never a boxed/quoted card"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  stat:
    origin: designed
    use: optional
    designedFrom:
      do:      [ surface-flip-hierarchy, uppercase-didone-display ]
      neverDo: [ no-cards-on-cream, no-radius ]
      tokens:  [ counter-display, ghost-watermark, text/on-primary ]
      note: "metric as a big didone numeral (counter-display) with an uppercase eyebrow label; echoes the ghost-numeral motif; open, never boxed"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  list:
    origin: designed
    use: optional
    designedFrom:
      do:      [ margin-captions ]
      neverDo: [ no-radius ]
      tokens:  [ body, border/hairline-on-primary ]
      note: "feature list as plain rows separated by 1px ruled bars (like the action rows); marker none/slash, never decorative bullets in colored chips"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  code:
    origin: designed
    use: rare
    designedFrom:
      neverDo: [ no-radius, no-shadows ]
      tokens:  [ surface/inverse-strong, text/on-inverse ]
      note: "monospace snippet on the near-black inverse-strong surface, radius 0, no border; off-brand for a gallery, so rare"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  icon-button:
    origin: designed
    use: never
    designedFrom:
      do:      [ typographic-actions ]
      neverDo: [ no-buttons, no-radius, no-shadows ]
      tokens:  [ text/on-primary ]
      note: "no icon buttons; an icon action remaps to a typographic arrow/slash link, consistent with no-buttons"
    overridable: true
    confidence: medium
    source: creation
    scope: design-language
    changelog: []
  video:
    origin: designed
    use: optional
    designedFrom:
      do:      [ overlap-as-ornament ]
      neverDo: [ no-radius, no-shadows ]
      tokens:  [ surface/inverse ]
      note: "treated exactly like image — hard-edged rectangle, radius 0, no chrome; landscape ratio"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  icon:
    origin: designed
    use: rare
    designedFrom:
      avoid:   [ accent-sparingly ]
      neverDo: [ no-accent-on-light ]
      tokens:  [ text/on-primary, text/on-inverse ]
      note: "thin monoline glyphs inheriting text color; no accent fills on light; used only where a slash/arrow can't stand in"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  avatar:
    origin: designed
    use: optional
    designedFrom:
      neverDo: [ no-radius ]
      tokens:  [ text/on-primary ]
      note: "person image as a hard-edged rectangle crop (radius 0) — the contract's round/circle default is overridden by no-radius"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  illustration:
    origin: designed
    use: rare
    designedFrom:
      do:      [ overlap-as-ornament ]
      neverDo: [ no-gradients ]
      tokens:  [ text/ghost-on-primary ]
      note: "brand uses photography + ghost-watermark type, not illustration; if needed, a flat ghost-tone graphic with no gradients"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  pill:
    origin: designed
    use: never
    designedFrom:
      neverDo: [ no-radius, no-cards-on-cream ]
      tokens:  [ eyebrow ]
      note: "no rounded chips; a tag/keyword remaps to an uppercase eyebrow label, never a pill"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  badge:
    origin: designed
    use: rare
    designedFrom:
      do:      [ surface-flip-hierarchy ]
      avoid:   [ accent-sparingly ]
      neverDo: [ no-radius, no-shadows, no-accent-on-light ]
      tokens:  [ accent/highlight, text/on-inverse ]
      note: "flat square accent-on-dark marker (gold only on dark surfaces); never rounded or shadowed"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  rating:
    origin: designed
    use: rare
    designedFrom:
      neverDo: [ no-accent-on-light, no-radius ]
      tokens:  [ counter-display, text/on-primary ]
      note: "score as small monoline glyphs or a fraction numeral (echoing the observed 1/6 counter); no colored stars on cream"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  progress:
    origin: designed
    use: rare
    designedFrom:
      neverDo: [ no-radius, no-gradients ]
      tokens:  [ border/hairline-on-primary, text/on-primary ]
      note: "thin square 1px bar with a solid fill, no rounding/gradient; spinner avoided (low motion)"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  tooltip:
    origin: designed
    use: rare
    designedFrom:
      neverDo: [ no-radius, no-shadows ]
      tokens:  [ surface/inverse, text/on-inverse ]
      note: "square dark panel, no shadow/radius, Inter micro-text; fade-free appearance (low motion)"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  spacer:
    origin: designed
    use: optional
    designedFrom:
      do:     [ overlap-as-ornament ]
      tokens: [ module-gap-editorial, section-padding-light ]
      note: "explicit gaps use the editorial module-gap ladder; whitespace is structural and generous (low density)"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  textarea:
    origin: designed
    use: when-form
    variant: underline
    designedFrom:
      neverDo: [ no-boxed-inputs, no-radius ]
      tokens:  [ border/hairline-on-primary ]
      note: "multi-line entry as a single underline rule, no box/fill, matching the Lead-form input"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  select:
    origin: designed
    use: when-form
    variant: underline
    designedFrom:
      neverDo: [ no-boxed-inputs, no-radius, no-shadows ]
      tokens:  [ border/hairline-on-primary, control-text ]
      note: "dropdown as an underline trigger with uppercase control-text; menu is a flat square panel, no rounding"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  checkbox:
    origin: designed
    use: when-form
    designedFrom:
      neverDo: [ no-radius ]
      tokens:  [ text/on-primary, border/hairline-on-primary ]
      note: "hard square box (radius 0), 1px hairline, solid check on select; no accent fill on cream"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  radio:
    origin: designed
    use: when-form
    designedFrom:
      neverDo: [ no-radius ]
      tokens:  [ text/on-primary, border/hairline-on-primary ]
      note: "rendered as a small SQUARE selector (radius 0 overrides the round default); hairline + solid fill"
    overridable: true
    confidence: low
    source: creation
    scope: design-language
    changelog: []
  toggle:
    origin: designed
    use: when-form
    designedFrom:
      neverDo: [ no-radius, no-accent-on-light ]
      tokens:  [ surface/inverse, text/on-primary ]
      note: "square sliding switch, no pill/rounding; on-state uses a flat dark fill, accent only on dark"
    overridable: true
